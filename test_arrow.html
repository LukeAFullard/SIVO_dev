<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div id="main" style="width: 600px;height:400px;"></div>
    <script>
        var myChart = echarts.init(document.getElementById('main'));
        var option = {
            xAxis: { type: 'value' },
            yAxis: { type: 'value' },
            series: [{
                type: 'line',
                data: [[0, 0], [10, 10]],
                markPoint: {
                    symbol: 'arrow',
                    symbolSize: 50,
                    data: [
                        { type: 'max', valueIndex: 0, symbolRotate: -45 },
                        { type: 'min', valueIndex: 0, symbolRotate: -90 }
                    ]
                }
            }]
        };
        myChart.setOption(option);
    </script>
</body>
</html>
