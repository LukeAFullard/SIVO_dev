<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .ring { fill: none; stroke: #e2e8f0; stroke-width: 2; stroke-dasharray: 6 6; }
            .node { fill: #ffffff; stroke-width: 4; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05)); }
            .center-node { fill: #0f172a; }
            .text-main { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 700; fill: #1e293b; text-anchor: middle; }
            .text-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #64748b; text-anchor: middle; }
            .text-center { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 28px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
            .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
        </style>

        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>

        <!-- Gradient Definitions for Nodes -->
        <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc" />
            <stop offset="100%" stop-color="#e2e8f0" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="800" class="bg" />

    <!-- Title -->
    <text x="600" y="80" class="text-main" font-size="36" fill="#0f172a">Continuous Integration Flow</text>

    <!-- Outer Decorative Ring -->
    <circle cx="600" cy="450" r="300" class="ring" />
    <circle cx="600" cy="450" r="200" class="ring" />

    <!-- Connecting Arrows -->
    <!-- Top to Right -->
    <path class="arrow" d="M 690 190 Q 820 220 860 340" />
    <!-- Right to Bottom -->
    <path class="arrow" d="M 860 560 Q 820 680 690 710" />
    <!-- Bottom to Left -->
    <path class="arrow" d="M 510 710 Q 380 680 340 560" />
    <!-- Left to Top -->
    <path class="arrow" d="M 340 340 Q 380 220 510 190" />

    <!-- Center Hub -->
    <g id="hub-center">
        <circle cx="600" cy="450" r="100" class="center-node" />
    </g>

    <!-- Node 1: Top (Discover) -->
    <g id="node-discover">
        <circle cx="600" cy="150" r="60" class="node" stroke="#3b82f6" fill="url(#gradTop)" />
        <circle cx="600" cy="150" r="45" fill="#ffffff" />
    </g>

    <!-- Node 2: Right (Design) -->
    <g id="node-design">
        <circle cx="900" cy="450" r="60" class="node" stroke="#8b5cf6" fill="url(#gradTop)" />
        <circle cx="900" cy="450" r="45" fill="#ffffff" />
    </g>

    <!-- Node 3: Bottom (Develop) -->
    <g id="node-develop">
        <circle cx="600" cy="750" r="60" class="node" stroke="#10b981" fill="url(#gradTop)" />
        <circle cx="600" cy="750" r="45" fill="#ffffff" />
    </g>

    <!-- Node 4: Left (Deploy) -->
    <g id="node-deploy">
        <circle cx="300" cy="450" r="60" class="node" stroke="#f59e0b" fill="url(#gradTop)" />
        <circle cx="300" cy="450" r="45" fill="#ffffff" />
    </g>

</svg>