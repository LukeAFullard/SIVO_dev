<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .path-line { stroke: #e2e8f0; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
            .waypoint { fill: #ffffff; stroke: #3b82f6; stroke-width: 6; filter: drop-shadow(0 8px 12px rgba(59, 130, 246, 0.15)); }
            .waypoint-inner { fill: #3b82f6; }
            .card { fill: #f8fafc; rx: 12; stroke: #e2e8f0; stroke-width: 1; }
            .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
            .text-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #64748b; }
            .header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 32px; font-weight: 800; fill: #1e293b; }
        </style>
    </defs>

    <rect width="1200" height="800" class="bg" />

    <text id="text_customer_journey_map" x="80" y="80" class="header"></text>
    <text id="text_tracking_user_experience_from_awareness_to_advocacy" x="80" y="110" class="text-desc" font-size="16"></text>

    <!-- The S-Curve Path -->
    <path class="path-line" d="M 150 250 L 900 250 C 1000 250, 1000 450, 900 450 L 300 450 C 200 450, 200 650, 300 650 L 1050 650" />

    <!-- Waypoint 1: Awareness -->
    <g id="journey-1">
        <circle cx="250" cy="250" r="24" class="waypoint" />
        <circle cx="250" cy="250" r="8" class="waypoint-inner" />
        <rect class="card" x="150" y="140" width="200" height="80" />
    </g>

    <!-- Waypoint 2: Consideration -->
    <g id="journey-2">
        <circle cx="550" cy="250" r="24" class="waypoint" stroke="#8b5cf6" />
        <circle cx="550" cy="250" r="8" fill="#8b5cf6" />
        <rect class="card" x="450" y="140" width="200" height="80" />
    </g>

    <!-- Waypoint 3: Decision -->
    <g id="journey-3">
        <circle cx="850" cy="250" r="24" class="waypoint" stroke="#10b981" />
        <circle cx="850" cy="250" r="8" fill="#10b981" />
        <rect class="card" x="750" y="140" width="200" height="80" />
    </g>

    <!-- Waypoint 4: Onboarding -->
    <g id="journey-4">
        <circle cx="700" cy="450" r="24" class="waypoint" stroke="#f59e0b" />
        <circle cx="700" cy="450" r="8" fill="#f59e0b" />
        <rect class="card" x="600" y="490" width="200" height="80" />
    </g>

    <!-- Waypoint 5: Retention -->
    <g id="journey-5">
        <circle cx="400" cy="450" r="24" class="waypoint" stroke="#ec4899" />
        <circle cx="400" cy="450" r="8" fill="#ec4899" />
        <rect class="card" x="300" y="490" width="200" height="80" />
    </g>

    <!-- Waypoint 6: Advocacy -->
    <g id="journey-6">
        <circle cx="500" cy="650" r="24" class="waypoint" stroke="#0ea5e9" />
        <circle cx="500" cy="650" r="8" fill="#0ea5e9" />
        <rect class="card" x="400" y="540" width="200" height="80" />
    </g>

    <!-- Waypoint 7: Expansion -->
    <g id="journey-7">
        <circle cx="850" cy="650" r="24" class="waypoint" stroke="#6366f1" />
        <circle cx="850" cy="650" r="8" fill="#6366f1" />
        <rect class="card" x="750" y="540" width="200" height="80" />
    </g>

</svg>