<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #f0f4f8; }
            .card { fill: #ffffff; rx: 24; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
            .metric { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 48px; font-weight: 800; fill: #1e293b; }
            .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 600; fill: #64748b; text-transform: uppercase; letter-spacing: 1.5px; }
            .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
            .trend-up { fill: #10b981; }
            .trend-down { fill: #ef4444; }
        </style>
        <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
        <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9" />
            <stop offset="100%" stop-color="#06b6d4" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="800" class="bg" />

    <!-- Header -->
    <text x="60" y="80" class="title">Performance Overview</text>
    <text x="60" y="110" class="label" fill="#94a3b8">Q3 2026 Analytics Dashboard</text>

    <!-- Bento Grid Structure -->

    <!-- Main Highlight Card -->
    <g id="card-main">
        <rect x="60" y="160" width="600" height="380" class="card" />
        <rect x="60" y="160" width="600" height="380" rx="24" fill="url(#primaryGrad)" opacity="0.05" />
        <text x="100" y="240" class="label">Total Revenue</text>
        <text x="100" y="310" class="metric">$2.4M</text>
        <!-- Placeholder for Chart -->
        <rect x="100" y="340" width="520" height="160" rx="12" fill="#e2e8f0" />
    </g>

    <!-- Secondary Card 1 -->
    <g id="card-users">
        <rect x="680" y="160" width="460" height="180" class="card" />
        <text x="720" y="210" class="label">Active Users</text>
        <text x="720" y="270" class="metric">84.2K</text>
        <path d="M 880 250 L 900 220 L 920 260 L 940 230" stroke="#10b981" stroke-width="4" fill="none" />
        <circle cx="940" cy="230" r="6" class="trend-up" />
        <text x="720" y="310" class="label" fill="#10b981" font-size="14">+12.5% vs last month</text>
    </g>

    <!-- Secondary Card 2 -->
    <g id="card-conversion">
        <rect x="680" y="360" width="460" height="180" class="card" />
        <rect x="680" y="360" width="460" height="180" rx="24" fill="url(#secondaryGrad)" opacity="0.1" />
        <text x="720" y="410" class="label">Conversion Rate</text>
        <text x="720" y="470" class="metric">4.8%</text>
        <rect x="880" y="440" width="120" height="16" rx="8" fill="#cbd5e1" />
        <rect x="880" y="440" width="80" height="16" rx="8" fill="#0ea5e9" />
    </g>

    <!-- Bottom Row Cards -->
    <g id="card-engagement">
        <rect x="60" y="560" width="350" height="180" class="card" />
        <text x="100" y="610" class="label">Avg. Engagement</text>
        <text x="100" y="680" class="metric">4m 12s</text>
    </g>

    <g id="card-bounce">
        <rect x="430" y="560" width="350" height="180" class="card" />
        <text x="470" y="610" class="label">Bounce Rate</text>
        <text x="470" y="680" class="metric">32.1%</text>
    </g>

    <g id="card-satisfaction">
        <rect x="800" y="560" width="340" height="180" class="card" />
        <text x="840" y="610" class="label">Customer Score</text>
        <text x="840" y="680" class="metric">4.9/5</text>
    </g>
</svg>