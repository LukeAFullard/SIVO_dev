<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .card { fill: #f8fafc; rx: 16; stroke: #e2e8f0; stroke-width: 1; }
            .chart-bar { fill: #3b82f6; rx: 4; }
            .chart-line { fill: none; stroke: #8b5cf6; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
            .chart-bg { fill: #f1f5f9; rx: 4; }
            .header-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 36px; font-weight: 800; fill: #0f172a; }
            .sub-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; fill: #64748b; }
            .card-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 600; fill: #1e293b; }
            .stat-number { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 40px; font-weight: 800; fill: #0f172a; }
            .badge { fill: #dcfce7; rx: 12; }
            .badge-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 600; fill: #166534; }
        </style>
        <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
        </linearGradient>
    </defs>

    <rect width="1200" height="800" class="bg" />

    <text x="80" y="80" class="header-text">Data & Analytics Overview</text>
    <text x="80" y="110" class="sub-text">A high-level look at performance metrics for 2026.</text>

    <!-- Top Stats Row -->
    <g id="stat-1">
        <rect class="card" x="80" y="150" width="320" height="140" />
        <text x="110" y="190" class="card-title">Monthly Recurring Revenue</text>
        <text x="110" y="240" class="stat-number">$124.5k</text>
        <rect class="badge" x="290" y="215" width="60" height="24" />
        <text x="300" y="232" class="badge-text">+14%</text>
    </g>

    <g id="stat-2">
        <rect class="card" x="440" y="150" width="320" height="140" />
        <text x="470" y="190" class="card-title">Active Subscriptions</text>
        <text x="470" y="240" class="stat-number">1,204</text>
        <rect class="badge" x="650" y="215" width="60" height="24" />
        <text x="660" y="232" class="badge-text">+8.2%</text>
    </g>

    <g id="stat-3">
        <rect class="card" x="800" y="150" width="320" height="140" />
        <text x="830" y="190" class="card-title">Customer Acquisition Cost</text>
        <text x="830" y="240" class="stat-number">$45.00</text>
        <rect fill="#fee2e2" rx="12" x="1010" y="215" width="60" height="24" />
        <text x="1020" y="232" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#991b1b">-2.1%</text>
    </g>

    <!-- Main Chart Area (Bar Chart Placeholder) -->
    <g id="chart-main">
        <rect class="card" x="80" y="320" width="680" height="400" />
        <text x="110" y="360" class="card-title">Revenue by Quarter</text>

        <!-- Y-Axis Lines -->
        <line x1="120" y1="420" x2="700" y2="420" stroke="#e2e8f0" stroke-width="1" />
        <line x1="120" y1="500" x2="700" y2="500" stroke="#e2e8f0" stroke-width="1" />
        <line x1="120" y1="580" x2="700" y2="580" stroke="#e2e8f0" stroke-width="1" />
        <line x1="120" y1="660" x2="700" y2="660" stroke="#cbd5e1" stroke-width="2" />

        <!-- Bars -->
        <rect class="chart-bg" x="160" y="400" width="40" height="260" />
        <rect class="chart-bar" x="160" y="520" width="40" height="140" />

        <rect class="chart-bg" x="260" y="400" width="40" height="260" />
        <rect class="chart-bar" x="260" y="480" width="40" height="180" />

        <rect class="chart-bg" x="360" y="400" width="40" height="260" />
        <rect class="chart-bar" x="360" y="450" width="40" height="210" />

        <rect class="chart-bg" x="460" y="400" width="40" height="260" />
        <rect class="chart-bar" x="460" y="410" width="40" height="250" />

        <rect class="chart-bg" x="560" y="400" width="40" height="260" />
        <rect class="chart-bar" x="560" y="550" width="40" height="110" />

        <!-- X-Axis Labels -->
        <text x="180" y="690" class="sub-text" text-anchor="middle">Q1</text>
        <text x="280" y="690" class="sub-text" text-anchor="middle">Q2</text>
        <text x="380" y="690" class="sub-text" text-anchor="middle">Q3</text>
        <text x="480" y="690" class="sub-text" text-anchor="middle">Q4</text>
        <text x="580" y="690" class="sub-text" text-anchor="middle">Q1 '27</text>
    </g>

    <!-- Side Chart Area (Area Line Chart Placeholder) -->
    <g id="chart-side">
        <rect class="card" x="800" y="320" width="320" height="400" />
        <text x="830" y="360" class="card-title">User Growth</text>

        <!-- Sparkline Area -->
        <path d="M 830 650 L 830 580 Q 880 500 930 550 T 1030 450 L 1090 400 L 1090 650 Z" fill="url(#areaGrad)" />
        <path class="chart-line" d="M 830 580 Q 880 500 930 550 T 1030 450 L 1090 400" />

        <circle cx="1090" cy="400" r="6" fill="#8b5cf6" stroke="#ffffff" stroke-width="2" />

        <!-- Y-Axis Lines -->
        <line x1="830" y1="650" x2="1090" y2="650" stroke="#cbd5e1" stroke-width="2" />
        <text x="960" y="680" class="sub-text" text-anchor="middle">Last 30 Days</text>
    </g>

</svg>