<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .card { fill: #f8fafc; rx: 16; stroke: #e2e8f0; stroke-width: 1; }
            .chart-bar { fill: #3b82f6; rx: 4; }
            .chart-line { fill: none; stroke: #8b5cf6; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
            .chart-bg { fill: #f1f5f9; rx: 4; }
            .header-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 36px; font-weight: 800; fill: #0f172a; }
            .sub-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; fill: #64748b; }
            .card-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 600; fill: #1e293b; }
            .stat-number { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 40px; font-weight: 800; fill: #0f172a; }
            .badge { fill: #dcfce7; rx: 12; }
            .badge-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 600; fill: #166534; }
        </style>
        <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
        </linearGradient>
    </defs>

    <rect width="1200" height="800" class="bg" />

    <text x="80" y="80" class="header-text">Data and Analytics Overview</text>
    <text x="80" y="110" class="sub-text">A high-level look at performance metrics for 2026.</text>

    <!-- Top Stats Row -->
    <g id="stat-1">
        <rect class="card" x="80" y="150" width="320" height="140" />
    </g>

    <g id="stat-2">
        <rect class="card" x="440" y="150" width="320" height="140" />
    </g>

    <g id="stat-3">
        <rect class="card" x="800" y="150" width="320" height="140" />
    </g>

    <!-- Main Chart Area (Bar Chart Placeholder) -->
    <g id="chart-main">
        <rect class="card" x="80" y="320" width="680" height="400" />
    </g>

    <!-- Side Chart Area (Area Line Chart Placeholder) -->
    <g id="chart-side">
        <rect class="card" x="800" y="320" width="320" height="400" />
    </g>

</svg>