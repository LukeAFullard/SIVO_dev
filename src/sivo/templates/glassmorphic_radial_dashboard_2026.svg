<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #f1f5f9; }
            .glass-panel {
                fill: rgba(255, 255, 255, 0.7);
                stroke: rgba(255, 255, 255, 0.5);
                stroke-width: 1.5;
                rx: 24;
                filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.05)) drop-shadow(0 10px 10px rgba(0, 0, 0, 0.02));
            }
            .center-ring { fill: none; stroke: url(#gradientRing); stroke-width: 8; stroke-linecap: round; }
            .dashed-ring { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 12; opacity: 0.5; }

            .placeholder-text-title { fill: #cbd5e1; rx: 8; }
            .placeholder-text-subtitle { fill: #94a3b8; rx: 4; opacity: 0.5; }
            .placeholder-text-card-title { fill: #cbd5e1; rx: 6; }
            .placeholder-text-card-value { fill: #94a3b8; rx: 8; }

            .connecting-line { stroke: #cbd5e1; stroke-width: 2; fill: none; }
        </style>

        <linearGradient id="gradientRing" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>

        <!-- Soft Mesh Gradient Blob Background for Glassmorphism effect -->
        <filter id="blurFilter">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <radialGradient id="meshGradient1" cx="30%" cy="30%" r="50%">
            <stop offset="0%" stop-color="#bfdbfe" />
            <stop offset="100%" stop-color="transparent" />
        </radialGradient>
        <radialGradient id="meshGradient2" cx="70%" cy="70%" r="50%">
            <stop offset="0%" stop-color="#e9d5ff" />
            <stop offset="100%" stop-color="transparent" />
        </radialGradient>
    </defs>

    <!-- Background Layer -->
    <rect width="1200" height="800" class="bg" />
    <circle cx="400" cy="300" r="400" fill="url(#meshGradient1)" filter="url(#blurFilter)" opacity="0.8" />
    <circle cx="800" cy="500" r="400" fill="url(#meshGradient2)" filter="url(#blurFilter)" opacity="0.6" />

    <!-- Center Radial Hub -->
    <g id="center-hub">
        <!-- Connecting Lines to Cards -->
        <path d="M 600 400 L 250 250" class="connecting-line" />
        <path d="M 600 400 L 950 250" class="connecting-line" />
        <path d="M 600 400 L 250 650" class="connecting-line" />
        <path d="M 600 400 L 950 650" class="connecting-line" />

        <circle cx="600" cy="400" r="180" class="dashed-ring" />
        <circle cx="600" cy="400" r="140" fill="#ffffff" filter="drop-shadow(0 15px 25px rgba(0,0,0,0.05))" />

        <!-- Progress Ring Overlay -->
        <circle cx="600" cy="400" r="120" class="center-ring" stroke-dasharray="750" stroke-dashoffset="150" transform="rotate(-90 600 400)" />

        <rect id="center-subtitle-placeholder" x="540" y="370" width="120" height="14" class="placeholder-text-subtitle" />
        <rect id="center-value-placeholder" x="500" y="400" width="200" height="60" class="placeholder-text-title" style="fill: #3b82f6; opacity: 0.1;" />
    </g>

    <!-- Top Left Glass Card -->
    <g id="glass-card-1">
        <rect x="120" y="150" width="280" height="140" class="glass-panel" />
        <rect id="card-1-title-placeholder" x="160" y="185" width="140" height="18" class="placeholder-text-card-title" />
        <rect id="card-1-value-placeholder" x="160" y="220" width="180" height="40" class="placeholder-text-card-value" style="fill: #3b82f6; opacity: 0.2;" />
    </g>

    <!-- Top Right Glass Card -->
    <g id="glass-card-2">
        <rect x="800" y="150" width="280" height="140" class="glass-panel" />
        <rect id="card-2-title-placeholder" x="840" y="185" width="130" height="18" class="placeholder-text-card-title" />
        <rect id="card-2-value-placeholder" x="840" y="220" width="160" height="40" class="placeholder-text-card-value" style="fill: #8b5cf6; opacity: 0.2;" />
    </g>

    <!-- Bottom Left Glass Card -->
    <g id="glass-card-3">
        <rect x="120" y="550" width="280" height="140" class="glass-panel" />
        <rect id="card-3-title-placeholder" x="160" y="585" width="120" height="18" class="placeholder-text-card-title" />
        <rect id="card-3-value-placeholder" x="160" y="620" width="140" height="40" class="placeholder-text-card-value" style="fill: #ec4899; opacity: 0.2;" />
    </g>

    <!-- Bottom Right Glass Card -->
    <g id="glass-card-4">
        <rect x="800" y="550" width="280" height="140" class="glass-panel" />
        <rect id="card-4-title-placeholder" x="840" y="585" width="150" height="18" class="placeholder-text-card-title" />
        <rect id="card-4-value-placeholder" x="840" y="620" width="170" height="40" class="placeholder-text-card-value" style="fill: #10b981; opacity: 0.2;" />
    </g>

    <!-- Header Overlay -->
    <g id="header-text">
        <rect id="header-subtitle-top-placeholder" x="500" y="65" width="200" height="16" class="placeholder-text-subtitle" />
        <rect id="header-title-top-placeholder" x="450" y="95" width="300" height="36" class="placeholder-text-title" />
    </g>

</svg>