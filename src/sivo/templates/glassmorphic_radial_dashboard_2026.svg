<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #f1f5f9; }
            .glass-panel {
                fill: rgba(255, 255, 255, 0.7);
                stroke: rgba(255, 255, 255, 0.5);
                stroke-width: 1.5;
                rx: 24;
                filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.05)) drop-shadow(0 10px 10px rgba(0, 0, 0, 0.02));
            }
            .center-ring { fill: none; stroke: url(#gradientRing); stroke-width: 8; stroke-linecap: round; }
            .dashed-ring { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 12; opacity: 0.5; }

            .text-title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; font-size: 36px; font-weight: 800; fill: #0f172a; text-anchor: middle; }
            .text-subtitle { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #64748b; text-transform: uppercase; letter-spacing: 2px; text-anchor: middle; }

            .card-title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
            .card-value { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; font-size: 40px; font-weight: 800; fill: #3b82f6; letter-spacing: -1px; }

            .connecting-line { stroke: #cbd5e1; stroke-width: 2; fill: none; }
        </style>

        <linearGradient id="gradientRing" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>

        <!-- Soft Mesh Gradient Blob Background for Glassmorphism effect -->
        <filter id="blurFilter">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <radialGradient id="meshGradient1" cx="30%" cy="30%" r="50%">
            <stop offset="0%" stop-color="#bfdbfe" />
            <stop offset="100%" stop-color="transparent" />
        </radialGradient>
        <radialGradient id="meshGradient2" cx="70%" cy="70%" r="50%">
            <stop offset="0%" stop-color="#e9d5ff" />
            <stop offset="100%" stop-color="transparent" />
        </radialGradient>
    </defs>

    <!-- Background Layer -->
    <rect width="1200" height="800" class="bg" />
    <circle cx="400" cy="300" r="400" fill="url(#meshGradient1)" filter="url(#blurFilter)" opacity="0.8" />
    <circle cx="800" cy="500" r="400" fill="url(#meshGradient2)" filter="url(#blurFilter)" opacity="0.6" />

    <!-- Center Radial Hub -->
    <g id="center-hub">
        <!-- Connecting Lines to Cards -->
        <path d="M 600 400 L 250 250" class="connecting-line" />
        <path d="M 600 400 L 950 250" class="connecting-line" />
        <path d="M 600 400 L 250 650" class="connecting-line" />
        <path d="M 600 400 L 950 650" class="connecting-line" />

        <circle cx="600" cy="400" r="180" class="dashed-ring" />
        <circle cx="600" cy="400" r="140" fill="#ffffff" filter="drop-shadow(0 15px 25px rgba(0,0,0,0.05))" />

        <!-- Progress Ring Overlay -->
        <circle cx="600" cy="400" r="120" class="center-ring" stroke-dasharray="750" stroke-dashoffset="150" transform="rotate(-90 600 400)" />

        <text x="600" y="380" class="text-subtitle">System Health</text>
        <text x="600" y="430" class="text-title" style="font-size: 64px;">86%</text>
    </g>

    <!-- Top Left Glass Card -->
    <g id="glass-card-1">
        <rect x="120" y="150" width="280" height="140" class="glass-panel" />
        <text x="160" y="200" class="card-title">Network Latency</text>
        <text x="160" y="250" class="card-value">24ms</text>
    </g>

    <!-- Top Right Glass Card -->
    <g id="glass-card-2">
        <rect x="800" y="150" width="280" height="140" class="glass-panel" />
        <text x="840" y="200" class="card-title">Active Queries</text>
        <text x="840" y="250" class="card-value" style="fill: #8b5cf6;">1.2M</text>
    </g>

    <!-- Bottom Left Glass Card -->
    <g id="glass-card-3">
        <rect x="120" y="550" width="280" height="140" class="glass-panel" />
        <text x="160" y="600" class="card-title">Server Load</text>
        <text x="160" y="650" class="card-value" style="fill: #ec4899;">42%</text>
    </g>

    <!-- Bottom Right Glass Card -->
    <g id="glass-card-4">
        <rect x="800" y="550" width="280" height="140" class="glass-panel" />
        <text x="840" y="600" class="card-title">Uptime SLA</text>
        <text x="840" y="650" class="card-value" style="fill: #10b981;">99.9%</text>
    </g>

    <!-- Header Overlay -->
    <g id="header-text">
        <text x="600" y="80" class="text-subtitle" style="font-size: 16px;">Global Infrastructure Map</text>
        <text x="600" y="125" class="text-title">Command Center</text>
    </g>

</svg>