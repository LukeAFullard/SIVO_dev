<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #e0e7ff; }
      .glass-card { fill: rgba(255, 255, 255, 0.4); stroke: rgba(255, 255, 255, 0.8); stroke-width: 2; rx: 32; ry: 32; filter: drop-shadow(0 20px 40px rgba(31,38,135,0.07)); backdrop-filter: blur(10px); }
      .card-title { fill: #312e81; font-family: system-ui, sans-serif; font-size: 24px; font-weight: 700; }
      .mesh-shape-1 { fill: #818cf8; opacity: 0.6; filter: blur(60px); }
      .mesh-shape-2 { fill: #c084fc; opacity: 0.5; filter: blur(80px); }
      .mesh-shape-3 { fill: #60a5fa; opacity: 0.5; filter: blur(70px); }
    </style>
  </defs>

  <!-- Mesh Gradient Background Base -->
  <rect class="bg" width="1200" height="800" />

  <!-- Blurred Blobs for Mesh Effect -->
  <circle class="mesh-shape-1" cx="200" cy="200" r="250" />
  <circle class="mesh-shape-2" cx="1000" cy="600" r="300" />
  <ellipse class="mesh-shape-3" cx="600" cy="100" rx="400" ry="200" />

  <!-- Glassmorphic Cards Layer -->
  <!-- Left Main Card -->
  <g id="glass-card-1">
    <rect class="glass-card" x="60" y="80" width="400" height="640" />
    <text id="text_profile_analysis" class="card-title" x="110" y="140"></text>
    <rect id="glass-card-1-data" fill="transparent" x="110" y="170" width="300" height="500" />
  </g>

  <!-- Top Right Card -->
  <g id="glass-card-2">
    <rect class="glass-card" x="500" y="80" width="640" height="300" />
    <text id="text_performance_overview" class="card-title" x="550" y="140"></text>
    <rect id="glass-card-2-data" fill="transparent" x="550" y="170" width="540" height="180" />
  </g>

  <!-- Bottom Right Cards (Split) -->
  <g id="glass-card-3">
    <rect class="glass-card" x="500" y="420" width="300" height="300" />
    <text id="text_engagement" class="card-title" x="540" y="480"></text>
    <rect id="glass-card-3-data" fill="transparent" x="540" y="510" width="220" height="180" />
  </g>

  <g id="glass-card-4">
    <rect class="glass-card" x="840" y="420" width="300" height="300" />
    <text id="text_growth" class="card-title" x="880" y="480"></text>
    <rect id="glass-card-4-data" fill="transparent" x="880" y="510" width="220" height="180" />
  </g>

</svg>
