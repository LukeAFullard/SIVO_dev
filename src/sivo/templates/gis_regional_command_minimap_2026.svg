<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #1e293b; }
            .canvas-area { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 12; }
            .ui-card { fill: #1e293b; rx: 16; stroke: #475569; stroke-width: 1; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
            .minimap-bg { fill: #334155; rx: 12; }
            .headline { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 32px; font-weight: 800; fill: #f8fafc; }
            .meta { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #cbd5e1; }
            .indicator-dot { fill: #ef4444; }
        </style>
    </defs>

    <rect width="1440" height="900" class="bg" />

    <!-- Full Map Background -->
    <rect id="regional-map-canvas" x="40" y="40" width="1360" height="820" class="canvas-area" />

    <!-- Command Center Header (Floating Top Left) -->
    <g id="command-header">
        <rect x="80" y="80" width="480" height="120" class="ui-card" fill-opacity="0.9" />
        <text id="text_regional_command_center" x="110" y="130" class="headline"></text>
        <text id="text_live_operational_map_last_updated_just_now" x="110" y="160" class="meta"></text>
        <circle cx="110" cy="115" r="6" class="indicator-dot">
            <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- Minimap / Inset (Floating Bottom Right) -->
    <g id="minimap-inset">
        <rect x="1080" y="600" width="280" height="220" class="ui-card" />
        <rect id="minimap-canvas" x="1100" y="620" width="240" height="180" class="minimap-bg" />
    </g>

    <!-- Quick Status Cards (Floating Bottom Left) -->
    <g id="status-card-1">
        <rect x="80" y="720" width="200" height="100" class="ui-card" fill-opacity="0.95" />
        <!-- Data Placeholder -->
    </g>

    <g id="status-card-2">
        <rect x="300" y="720" width="200" height="100" class="ui-card" fill-opacity="0.95" />
        <!-- Data Placeholder -->
    </g>

</svg>