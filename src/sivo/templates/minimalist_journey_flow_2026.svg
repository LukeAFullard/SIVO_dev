<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .line-path { stroke: #cbd5e1; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 8 8; fill: none; }
            .node-circle { fill: #ffffff; stroke: #3b82f6; stroke-width: 6; }
            .node-circle-active { fill: #3b82f6; stroke: #eff6ff; stroke-width: 8; }
            .node-circle-completed { fill: #10b981; stroke: #ecfdf5; stroke-width: 8; }

            .text-title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; font-size: 36px; font-weight: 700; fill: #0f172a; letter-spacing: -1px; }
            .text-subtitle { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }

            .step-title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 600; fill: #1e293b; }
            .step-desc { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 400; fill: #64748b; line-height: 1.5; }

            .card-hover { fill: transparent; rx: 16; transition: fill 0.3s ease; }
            .card-hover:hover { fill: #f8fafc; cursor: pointer; }
        </style>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.05" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="800" class="bg" />

    <!-- Header Section -->
    <g id="header-group" transform="translate(100, 100)">
        <text x="0" y="0" class="text-subtitle">Customer Lifecycle Map</text>
        <text x="0" y="40" class="text-title">User Journey Flow 2026</text>
    </g>

    <!-- Connecting Path (Dashed Line) -->
    <path class="line-path" d="M 160 400 L 380 400 Q 420 400 420 440 L 420 560 Q 420 600 460 600 L 680 600 Q 720 600 720 560 L 720 280 Q 720 240 760 240 L 1040 240" />

    <!-- Active Path Highlight (Solid Line overlaying the dashed path) -->
    <path d="M 160 400 L 380 400 Q 420 400 420 440 L 420 480" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" fill="none" />

    <!-- Node 1: Discovery (Completed) -->
    <g id="node-1-discovery">
        <!-- Interaction Box -->
        <rect x="100" y="240" width="220" height="240" class="card-hover" />

        <!-- Text Content -->
        <text x="160" y="310" class="step-title" text-anchor="middle">1. Discovery</text>
        <text x="160" y="340" class="step-desc" text-anchor="middle">Initial brand awareness</text>
        <text x="160" y="360" class="step-desc" text-anchor="middle">via organic search.</text>

        <!-- Node Circle -->
        <circle cx="160" cy="400" r="16" class="node-circle-completed" filter="url(#shadow)" />
        <path d="M154 400 L158 404 L166 396" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>

    <!-- Node 2: Engagement (Active) -->
    <g id="node-2-engagement">
        <rect x="300" y="420" width="240" height="180" class="card-hover" />
        <circle cx="420" cy="480" r="20" class="node-circle-active" filter="url(#shadow)" />
        <circle cx="420" cy="480" r="6" fill="#ffffff" />

        <text x="320" y="530" class="step-title">2. Engagement</text>
        <text x="320" y="560" class="step-desc">Interactive product tours</text>
        <text x="320" y="580" class="step-desc">and feature exploration.</text>
    </g>

    <!-- Node 3: Conversion (Upcoming) -->
    <g id="node-3-conversion">
        <rect x="620" y="620" width="240" height="160" class="card-hover" />
        <circle cx="680" cy="600" r="16" class="node-circle" />

        <text x="680" y="660" class="step-title" text-anchor="middle">3. Conversion</text>
        <text x="680" y="690" class="step-desc" text-anchor="middle">Seamless checkout and</text>
        <text x="680" y="710" class="step-desc" text-anchor="middle">account creation process.</text>
    </g>

    <!-- Node 4: Retention (Upcoming) -->
    <g id="node-4-retention">
        <rect x="600" y="160" width="240" height="180" class="card-hover" />
        <circle cx="720" cy="280" r="16" class="node-circle" />

        <text x="740" y="240" class="step-title">4. Retention</text>
        <text x="740" y="270" class="step-desc">Automated onboarding</text>
        <text x="740" y="290" class="step-desc">and success milestones.</text>
    </g>

    <!-- Node 5: Advocacy (Upcoming) -->
    <g id="node-5-advocacy">
        <rect x="940" y="120" width="200" height="200" class="card-hover" />
        <circle cx="1040" cy="240" r="16" class="node-circle" />

        <text x="1040" y="170" class="step-title" text-anchor="middle">5. Advocacy</text>
        <text x="1040" y="200" class="step-desc" text-anchor="middle">Referral program and</text>
        <text x="1040" y="220" class="step-desc" text-anchor="middle">community building.</text>
    </g>

</svg>