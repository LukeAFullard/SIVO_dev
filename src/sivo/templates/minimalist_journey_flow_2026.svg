<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .line-path { stroke: #cbd5e1; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 8 8; fill: none; }
            .node-circle { fill: #ffffff; stroke: #3b82f6; stroke-width: 6; }
            .node-circle-active { fill: #3b82f6; stroke: #eff6ff; stroke-width: 8; }
            .node-circle-completed { fill: #10b981; stroke: #ecfdf5; stroke-width: 8; }

            .placeholder-text-title { fill: #e2e8f0; rx: 8; }
            .placeholder-text-subtitle { fill: #cbd5e1; rx: 4; }
            .placeholder-text-step { fill: #e2e8f0; rx: 6; }
            .placeholder-text-desc { fill: #f1f5f9; rx: 4; }

            .card-hover { fill: transparent; rx: 16; transition: fill 0.3s ease; }
            .card-hover:hover { fill: #f8fafc; cursor: pointer; }
        </style>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.05" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="800" class="bg" />

    <!-- Header Section Placeholders -->
    <g id="header-group" transform="translate(100, 100)">
        <rect id="header-subtitle-placeholder" x="0" y="0" width="220" height="14" class="placeholder-text-subtitle" />
        <rect id="header-title-placeholder" x="0" y="25" width="380" height="36" class="placeholder-text-title" />
    </g>

    <!-- Connecting Path (Dashed Line) -->
    <path class="line-path" d="M 160 400 L 380 400 Q 420 400 420 440 L 420 560 Q 420 600 460 600 L 680 600 Q 720 600 720 560 L 720 280 Q 720 240 760 240 L 1040 240" />

    <!-- Active Path Highlight (Solid Line overlaying the dashed path) -->
    <path d="M 160 400 L 380 400 Q 420 400 420 440 L 420 480" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" fill="none" />

    <!-- Node 1: Discovery (Completed) -->
    <g id="node-1-discovery">
        <!-- Interaction Box -->
        <rect x="100" y="240" width="220" height="240" class="card-hover" />

        <!-- Text Placeholders -->
        <rect id="node-1-step-placeholder" x="120" y="295" width="80" height="20" class="placeholder-text-step" />
        <rect id="node-1-desc-1-placeholder" x="120" y="325" width="160" height="12" class="placeholder-text-desc" />
        <rect id="node-1-desc-2-placeholder" x="120" y="345" width="120" height="12" class="placeholder-text-desc" />

        <!-- Node Circle -->
        <circle cx="160" cy="400" r="16" class="node-circle-completed" filter="url(#shadow)" />
        <path d="M154 400 L158 404 L166 396" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>

    <!-- Node 2: Engagement (Active) -->
    <g id="node-2-engagement">
        <rect x="300" y="420" width="240" height="180" class="card-hover" />
        <circle cx="420" cy="480" r="20" class="node-circle-active" filter="url(#shadow)" />
        <circle cx="420" cy="480" r="6" fill="#ffffff" />

        <rect id="node-2-step-placeholder" x="320" y="515" width="100" height="20" class="placeholder-text-step" />
        <rect id="node-2-desc-1-placeholder" x="320" y="545" width="180" height="12" class="placeholder-text-desc" />
        <rect id="node-2-desc-2-placeholder" x="320" y="565" width="140" height="12" class="placeholder-text-desc" />
    </g>

    <!-- Node 3: Conversion (Upcoming) -->
    <g id="node-3-conversion">
        <rect x="620" y="620" width="240" height="160" class="card-hover" />
        <circle cx="680" cy="600" r="16" class="node-circle" />

        <rect id="node-3-step-placeholder" x="640" y="645" width="120" height="20" class="placeholder-text-step" />
        <rect id="node-3-desc-1-placeholder" x="640" y="675" width="200" height="12" class="placeholder-text-desc" />
        <rect id="node-3-desc-2-placeholder" x="640" y="695" width="160" height="12" class="placeholder-text-desc" />
    </g>

    <!-- Node 4: Retention (Upcoming) -->
    <g id="node-4-retention">
        <rect x="600" y="160" width="240" height="180" class="card-hover" />
        <circle cx="720" cy="280" r="16" class="node-circle" />

        <rect id="node-4-step-placeholder" x="740" y="225" width="90" height="20" class="placeholder-text-step" />
        <rect id="node-4-desc-1-placeholder" x="740" y="255" width="160" height="12" class="placeholder-text-desc" />
        <rect id="node-4-desc-2-placeholder" x="740" y="275" width="130" height="12" class="placeholder-text-desc" />
    </g>

    <!-- Node 5: Advocacy (Upcoming) -->
    <g id="node-5-advocacy">
        <rect x="940" y="120" width="200" height="200" class="card-hover" />
        <circle cx="1040" cy="240" r="16" class="node-circle" />

        <rect id="node-5-step-placeholder" x="980" y="155" width="80" height="20" class="placeholder-text-step" />
        <rect id="node-5-desc-1-placeholder" x="980" y="185" width="140" height="12" class="placeholder-text-desc" />
        <rect id="node-5-desc-2-placeholder" x="980" y="205" width="110" height="12" class="placeholder-text-desc" />
    </g>

</svg>