<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #f8fafc; }
            .card { fill: #ffffff; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.03)); rx: 16; }
            .line { stroke: #cbd5e1; stroke-width: 4; fill: none; }
            .node { fill: #3b82f6; stroke: #ffffff; stroke-width: 6; }
            .node-inner { fill: #ffffff; }
            .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
            .text-body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; fill: #64748b; }
            .text-date { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #3b82f6; }
        </style>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="800" class="bg" />

    <!-- Title Area -->
    <text x="100" y="80" class="text-title" font-size="36">Product Roadmap 2026</text>
    <text x="100" y="110" class="text-body">A strategic overview of upcoming milestones and key deliverables.</text>

    <!-- Main Timeline Line -->
    <path class="line" d="M 200 200 L 200 700" />

    <!-- Node 1 -->
    <g id="node-1">
        <rect class="card" x="260" y="180" width="300" height="120" />
        <rect x="260" y="180" width="300" height="120" rx="16" fill="url(#grad1)" opacity="0.5" />
        <circle id="node-point-1" cx="200" cy="240" r="16" class="node" />
        <circle cx="200" cy="240" r="6" class="node-inner" />
        <path class="line" stroke-dasharray="4" d="M 216 240 L 260 240" />
    </g>

    <!-- Node 2 -->
    <g id="node-2">
        <rect class="card" x="600" y="320" width="300" height="120" />
        <rect x="600" y="320" width="300" height="120" rx="16" fill="url(#grad1)" opacity="0.5" />
        <circle id="node-point-2" cx="200" cy="380" r="16" class="node" />
        <circle cx="200" cy="380" r="6" class="node-inner" />
        <path class="line" stroke-dasharray="4" d="M 216 380 L 600 380" />
    </g>

    <!-- Node 3 -->
    <g id="node-3">
        <rect class="card" x="260" y="460" width="300" height="120" />
        <rect x="260" y="460" width="300" height="120" rx="16" fill="url(#grad1)" opacity="0.5" />
        <circle id="node-point-3" cx="200" cy="520" r="16" class="node" />
        <circle cx="200" cy="520" r="6" class="node-inner" />
        <path class="line" stroke-dasharray="4" d="M 216 520 L 260 520" />
    </g>

    <!-- Node 4 -->
    <g id="node-4">
        <rect class="card" x="600" y="600" width="300" height="120" />
        <rect x="600" y="600" width="300" height="120" rx="16" fill="url(#grad1)" opacity="0.5" />
        <circle id="node-point-4" cx="200" cy="660" r="16" class="node" />
        <circle cx="200" cy="660" r="6" class="node-inner" />
        <path class="line" stroke-dasharray="4" d="M 216 660 L 600 660" />
    </g>

</svg>