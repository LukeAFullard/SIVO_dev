<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #f8fafc; }
            .bento-card {
                fill: #ffffff;
                rx: 32;
                filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.03)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.02));
            }
            .accent-blue { fill: url(#coolBlueGrad); opacity: 0.05; rx: 32; }
            .accent-purple { fill: url(#coolPurpleGrad); opacity: 0.05; rx: 32; }

            .text-title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; font-size: 40px; font-weight: 700; fill: #0f172a; letter-spacing: -1px; }
            .text-subtitle { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 500; fill: #64748b; text-transform: uppercase; letter-spacing: 2px; }

            .metric-value { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; font-size: 64px; font-weight: 800; fill: #0f172a; letter-spacing: -2px; }
            .metric-label { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 600; fill: #475569; }

            .trend-pill { fill: #dcfce7; rx: 12; }
            .trend-text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #166534; }

            .icon-bg { fill: #f1f5f9; rx: 16; }
            .icon-stroke { stroke: #3b82f6; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        </style>

        <linearGradient id="coolBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#2dd4bf" />
        </linearGradient>

        <linearGradient id="coolPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>
    </defs>

    <!-- Base Canvas -->
    <rect width="1200" height="800" class="bg" />

    <!-- Header Section -->
    <g id="header-group">
        <text x="60" y="80" class="text-subtitle">Q4 Performance Overview</text>
        <text x="60" y="125" class="text-title">Analytics Dashboard 2026</text>
    </g>

    <!-- Bento Grid Structure -->

    <!-- 1. Hero Metric Card (Large, Left) -->
    <g id="bento-hero">
        <rect x="60" y="180" width="520" height="380" class="bento-card" />
        <rect x="60" y="180" width="520" height="380" class="accent-blue" />

        <!-- Icon Placeholder -->
        <rect x="100" y="220" width="64" height="64" class="icon-bg" />
        <path d="M120 260 L128 248 L136 256 L148 240" class="icon-stroke" />
        <path d="M148 240 L148 248 M148 240 L140 240" class="icon-stroke" />

        <text x="100" y="340" class="metric-label">Total Revenue</text>
        <text x="100" y="410" class="metric-value">$4.2M</text>

        <!-- Trend Indicator -->
        <g id="trend-hero" transform="translate(100, 440)">
            <rect width="80" height="32" class="trend-pill" />
            <text x="40" y="21" class="trend-text" text-anchor="middle">+14.5%</text>
        </g>
    </g>

    <!-- 2. Top Right Card (Medium) -->
    <g id="bento-top-right">
        <rect x="610" y="180" width="530" height="180" class="bento-card" />

        <rect x="650" y="220" width="48" height="48" class="icon-bg" />
        <circle cx="674" cy="244" r="10" class="icon-stroke" />
        <path d="M674 254 C666 254 660 260 660 268 L688 268 C688 260 682 254 674 254 Z" class="icon-stroke" />

        <text x="720" y="245" class="metric-label">Active Users</text>
        <text x="720" y="310" class="metric-value" style="font-size: 48px;">124.5K</text>
    </g>

    <!-- 3. Middle Right Card (Medium) -->
    <g id="bento-mid-right">
        <rect x="610" y="380" width="530" height="180" class="bento-card" />
        <rect x="610" y="380" width="530" height="180" class="accent-purple" />

        <text x="650" y="440" class="metric-label">Conversion Rate</text>
        <text x="650" y="510" class="metric-value" style="font-size: 48px;">8.4%</text>

        <!-- Trend Indicator -->
        <g id="trend-mid" transform="translate(810, 473)">
            <rect width="70" height="32" class="trend-pill" />
            <text x="35" y="21" class="trend-text" text-anchor="middle">+2.1%</text>
        </g>
    </g>

    <!-- 4. Bottom Left Card (Small) -->
    <g id="bento-bottom-left">
        <rect x="60" y="590" width="340" height="150" class="bento-card" />
        <text x="100" y="640" class="metric-label" style="font-size: 16px;">Bounce Rate</text>
        <text x="100" y="695" class="metric-value" style="font-size: 36px;">24.2%</text>
    </g>

    <!-- 5. Bottom Center Card (Small) -->
    <g id="bento-bottom-center">
        <rect x="420" y="590" width="340" height="150" class="bento-card" />
        <text x="460" y="640" class="metric-label" style="font-size: 16px;">Avg. Session</text>
        <text x="460" y="695" class="metric-value" style="font-size: 36px;">4m 12s</text>
    </g>

    <!-- 6. Bottom Right Card (Small) -->
    <g id="bento-bottom-right">
        <rect x="780" y="590" width="360" height="150" class="bento-card" />
        <text x="820" y="640" class="metric-label" style="font-size: 16px;">Customer Satisfaction</text>
        <text x="820" y="695" class="metric-value" style="font-size: 36px;">98/100</text>
    </g>
</svg>