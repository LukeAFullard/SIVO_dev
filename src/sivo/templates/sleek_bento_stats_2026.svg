<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #f8fafc; }
            .bento-card {
                fill: #ffffff;
                rx: 32;
                filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.03)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.02));
            }
            .accent-blue { fill: url(#coolBlueGrad); opacity: 0.05; rx: 32; }
            .accent-purple { fill: url(#coolPurpleGrad); opacity: 0.05; rx: 32; }

            .placeholder-text-title { fill: #e2e8f0; rx: 8; }
            .placeholder-text-subtitle { fill: #cbd5e1; rx: 4; }
            .placeholder-text-large { fill: #e2e8f0; rx: 12; }
            .placeholder-text-small { fill: #f1f5f9; rx: 4; }

            .trend-pill { fill: #dcfce7; rx: 12; }
            .trend-text-placeholder { fill: #bbf7d0; rx: 4; }

            .icon-bg { fill: #f1f5f9; rx: 16; }
            .icon-placeholder { fill: #cbd5e1; rx: 8; }
        </style>

        <linearGradient id="coolBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#2dd4bf" />
        </linearGradient>

        <linearGradient id="coolPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>
    </defs>

    <!-- Base Canvas -->
    <rect width="1200" height="800" class="bg" />

    <!-- Header Section -->
    <g id="header-group">
        <rect id="header-subtitle-placeholder" x="60" y="65" width="200" height="16" class="placeholder-text-subtitle" />
        <rect id="header-title-placeholder" x="60" y="95" width="400" height="40" class="placeholder-text-title" />
    </g>

    <!-- Bento Grid Structure -->

    <!-- 1. Hero Metric Card (Large, Left) -->
    <g id="bento-hero">
        <rect x="60" y="180" width="520" height="380" class="bento-card" />
        <rect x="60" y="180" width="520" height="380" class="accent-blue" />

        <!-- Icon Placeholder -->
        <g id="hero-icon-zone">
            <rect x="100" y="220" width="64" height="64" class="icon-bg" />
            <rect x="116" y="236" width="32" height="32" class="icon-placeholder" />
        </g>

        <!-- Text Placeholders -->
        <rect id="hero-label-placeholder" x="100" y="320" width="140" height="20" class="placeholder-text-subtitle" />
        <rect id="hero-value-placeholder" x="100" y="360" width="240" height="64" class="placeholder-text-large" />

        <!-- Trend Indicator Placeholder -->
        <g id="trend-hero" transform="translate(100, 440)">
            <rect width="80" height="32" class="trend-pill" />
            <rect id="hero-trend-text-placeholder" x="20" y="12" width="40" height="8" class="trend-text-placeholder" />
        </g>
    </g>

    <!-- 2. Top Right Card (Medium) -->
    <g id="bento-top-right">
        <rect x="610" y="180" width="530" height="180" class="bento-card" />

        <g id="top-right-icon-zone">
            <rect x="650" y="220" width="48" height="48" class="icon-bg" />
            <rect x="662" y="232" width="24" height="24" class="icon-placeholder" />
        </g>

        <rect id="top-right-label-placeholder" x="720" y="230" width="120" height="18" class="placeholder-text-subtitle" />
        <rect id="top-right-value-placeholder" x="720" y="265" width="180" height="48" class="placeholder-text-large" />
    </g>

    <!-- 3. Middle Right Card (Medium) -->
    <g id="bento-mid-right">
        <rect x="610" y="380" width="530" height="180" class="bento-card" />
        <rect x="610" y="380" width="530" height="180" class="accent-purple" />

        <rect id="mid-right-label-placeholder" x="650" y="425" width="160" height="18" class="placeholder-text-subtitle" />
        <rect id="mid-right-value-placeholder" x="650" y="465" width="140" height="48" class="placeholder-text-large" />

        <!-- Trend Indicator Placeholder -->
        <g id="trend-mid" transform="translate(810, 473)">
            <rect width="70" height="32" class="trend-pill" />
            <rect id="mid-trend-text-placeholder" x="15" y="12" width="40" height="8" class="trend-text-placeholder" />
        </g>
    </g>

    <!-- 4. Bottom Left Card (Small) -->
    <g id="bento-bottom-left">
        <rect x="60" y="590" width="340" height="150" class="bento-card" />
        <rect id="bottom-left-label-placeholder" x="100" y="625" width="100" height="16" class="placeholder-text-subtitle" />
        <rect id="bottom-left-value-placeholder" x="100" y="660" width="120" height="36" class="placeholder-text-large" />
    </g>

    <!-- 5. Bottom Center Card (Small) -->
    <g id="bento-bottom-center">
        <rect x="420" y="590" width="340" height="150" class="bento-card" />
        <rect id="bottom-center-label-placeholder" x="460" y="625" width="110" height="16" class="placeholder-text-subtitle" />
        <rect id="bottom-center-value-placeholder" x="460" y="660" width="140" height="36" class="placeholder-text-large" />
    </g>

    <!-- 6. Bottom Right Card (Small) -->
    <g id="bento-bottom-right">
        <rect x="780" y="590" width="360" height="150" class="bento-card" />
        <rect id="bottom-right-label-placeholder" x="820" y="625" width="150" height="16" class="placeholder-text-subtitle" />
        <rect id="bottom-right-value-placeholder" x="820" y="660" width="100" height="36" class="placeholder-text-large" />
    </g>
</svg>