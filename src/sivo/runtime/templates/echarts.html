<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIVO Interactive Graphic</title>

    {% if build_js %}
    <!-- Locally Bundled JS (ECharts, DOMPurify, Marked) -->
    <script>
    {{ bundled_js_content | safe }}
    </script>
    {% else %}
    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Include DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <!-- Include marked.js for Markdown Action -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Include lottie-player for Lottie animations -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    {% endif %}

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            height: 100vh;
        }
        #sivo-app-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            overflow: hidden;
        }
        #chart-wrapper {
            position: relative;
            flex: 1;
            height: 100%;
            width: 100%;
        }
        #chart-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #sivo-title-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            max-width: 400px;
            display: none;
            pointer-events: none;
        }

        #sivo-title {
            margin: 0 0 4px 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }

        #sivo-subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.4;
        }

        #sivo-attribution {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #64748b;
            border: 1px solid #e2e8f0;
            display: none;
            pointer-events: none;
        }

        #scrollytelling-container {
            display: none;
            width: 400px;
            height: 100vh;
            overflow-y: scroll;
            background: #fff;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
            scroll-behavior: smooth;
        }
        .scrolly-step {
            padding: 50vh 20px;
            margin: 0;
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
        }
        .scrolly-step.active {
            opacity: 1;
            transform: translateY(0);
        }
        .scrolly-step-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        #tour-container {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 1000;
            text-align: center;
            max-width: 450px;
            border: 1px solid #f1f5f9;
        }
        #tour-content {
            margin-bottom: 15px;
        }
        .tour-controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .tour-btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .tour-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .tour-btn:hover:not(:disabled) {
            background: #0056b3;
        }
        #minimap-container {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            overflow: hidden;
            pointer-events: none;
        }
        #minimap-svg {
            width: 100%;
            height: 100%;
        }
        #minimap-viewport {
            position: absolute;
            border: 2px solid #007bff;
            background: rgba(0, 123, 255, 0.2);
            box-sizing: border-box;
            transition: all 0.1s ease;
        }

        #sivo-search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            max-width: 90%;
            z-index: 1000;
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        #sivo-search-container:focus-within {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #38bdf8;
        }

        #sivo-search-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 12px 20px 12px 40px;
            font-size: 15px;
            color: #334155;
            outline: none;
            border-radius: 24px;
            box-sizing: border-box;
        }

        .sivo-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #94a3b8;
            pointer-events: none;
        }

        #sivo-search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
        }

        .sivo-search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .sivo-search-result-item:last-child {
            border-bottom: none;
        }

        .sivo-search-result-item:hover, .sivo-search-result-item.active {
            background: #f8fafc;
        }

        .sivo-search-result-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .sivo-search-result-subtitle {
            font-size: 12px;
            color: #64748b;
        }

        #sivo-context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-width: 160px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 8px 0;
        }

        .sivo-context-menu-item {
            padding: 10px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .sivo-context-menu-item:hover {
            background: #f1f5f9;
            color: #0f172a;
        }


        #sivo-watermark-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: none;
            opacity: 0.8;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #sivo-watermark-container:hover {
            opacity: 1.0;
        }

        #layer-legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            color: #334155;
            font-size: 14px;
        }

        /* Layer Switch Styles */
        .layer-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
            justify-content: space-between;
        }
        .layer-toggle input {
            display: none;
        }
        .sivo-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background-color: #cbd5e1;
            border-radius: 20px;
            transition: 0.3s;
            margin-left: 12px;
        }
        .sivo-switch::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            background-color: white;
            transition: 0.3s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .layer-toggle input:checked + .sivo-switch {
            background-color: #3b82f6;
        }
        .layer-toggle input:checked + .sivo-switch::before {
            transform: translateX(16px);
        }

        #info-panel {
            background: #ffffff;
            display: none;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            z-index: 1000;
        }
        #info-panel.active {
            display: flex;
        }

        .info-panel-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px;
            background: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .info-panel-content {
            padding: 32px 24px;
            overflow-y: auto;
            flex: 1;
        }

        /* Improved typography inside info panel content */
        .info-panel-content h1, .info-panel-content h2, .info-panel-content h3 {
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
            line-height: 1.2;
        }

        .info-panel-content h3 {
            font-size: 1.25rem;
        }

        .info-panel-content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        /* Layout modifiers for info-panel */
        #info-panel.pos-right {
            width: 360px;
            height: 100%;
            border-left: 1px solid #e2e8f0;
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-left {
            width: 360px;
            height: 100%;
            border-right: 1px solid #e2e8f0;
            box-shadow: 10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-bottom {
            width: 100%;
            height: 300px;
            border-top: 1px solid #ddd;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        #info-panel.pos-top {
            width: 100%;
            height: 300px;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Responsive Layout Overrides */
        .mobile-handle {
            display: none;
            width: 40px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 4px;
            margin: 8px auto 0;
        }
        @media (max-width: 768px) {
            .mobile-handle {
                display: block !important;
            }
            body, #sivo-app-container {
                flex-direction: column !important;
                padding-bottom: env(safe-area-inset-bottom);
            }
            #scrollytelling-container {
                width: 100% !important;
                height: 40vh !important;
                order: 2 !important; /* Put text below map on mobile */
                border-top: 1px solid #ddd;
            }
            #chart-wrapper {
                height: auto !important; /* Let flex take over to fill remaining space */
                flex: 1 !important;
                order: 1 !important;     /* Map stays at the top */
                min-height: 40vh;
            }
            .scrolly-step {
                padding: 10vh 20px !important;
            }
            #tour-container {
                width: 80% !important;
                left: 10% !important;
                transform: none !important;
                bottom: 20px !important;
                padding: 10px 15px !important;
                font-size: 14px;
            }
            #minimap-container {
                width: 80px !important;
                height: 80px !important;
                top: 10px !important;  /* Move minimap to top on mobile so it doesn't overlap zoom controls */
                left: 10px !important;
                bottom: auto !important;
            }
            #layer-legend {
                max-width: 120px !important;
                font-size: 12px !important;
                padding: 5px !important;
                top: 10px !important;
                right: 10px !important;
            }
            .zoom-controls {
                right: 10px !important;
                bottom: 20px !important;
                z-index: 1001 !important;
            }
            .zoom-btn {
                width: 25px !important;
                height: 25px !important;
                font-size: 14px !important;
            }
            #info-panel.active {
                width: 100% !important;
                height: 45vh !important; /* Give fixed part of the screen to info panel */
                flex: none !important;
                order: 3 !important;     /* Ensure it is BELOW the chart */
                border: none !important;
                border-top: 1px solid #ddd !important;
                box-shadow: 0 -2px 5px rgba(0,0,0,0.1) !important;
            }
            .sivo-resizer {
                display: none !important;
            }
            .sivo-gallery-close, .sivo-video-close {
                top: 15px !important;
                right: 20px !important;
                font-size: 30px !important;
            }
            .info-panel-header {
                padding: 8px 10px !important;
            }
            .close-btn {
                width: 30px !important;
                height: 30px !important;
            }
        }

        /* Dark Mode Support (Via OS Preference or Explicit Class) */
        @media (prefers-color-scheme: dark) {
            body:not(.sivo-theme-light) {
                background-color: #121212;
                color: #e0e0e0;
            }
            body:not(.sivo-theme-light) #info-panel {
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(10px);
                color: #f8fafc;
                border-color: #334155;
            }
            body:not(.sivo-theme-light) .info-panel-header {
                background: transparent;
                border-bottom: 1px solid #334155;
            }
            body:not(.sivo-theme-light) .close-btn {
                background: rgba(255,255,255,0.1);
                color: #cbd5e1;
            }
            body:not(.sivo-theme-light) .close-btn:hover {
                background: rgba(255,255,255,0.2);
                color: #ffffff;
            }
            body:not(.sivo-theme-light) .zoom-btn {
                background: rgba(30, 41, 59, 0.9);
                backdrop-filter: blur(4px);
                border-color: #334155;
                color: #94a3b8;
            }
            body:not(.sivo-theme-light) .zoom-btn:hover {
                background: #334155;
                color: #f8fafc;
            }
        }

        body.sivo-theme-dark {
            background-color: #0f172a !important;
            color: #f8fafc !important;
        }
        body.sivo-theme-dark #info-panel {
            background: rgba(15, 23, 42, 0.98) !important;
            backdrop-filter: blur(10px) !important;
            color: #e2e8f0 !important;
            border-color: #334155 !important;
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.5) !important;
        }
        body.sivo-theme-dark .info-panel-header {
            background: transparent !important;
            border-bottom: 1px solid #334155 !important;
        }
        body.sivo-theme-dark .info-panel-content h1,
        body.sivo-theme-dark .info-panel-content h2,
        body.sivo-theme-dark .info-panel-content h3 {
            color: #f8fafc !important;
        }
        body.sivo-theme-dark .close-btn {
            background: rgba(255,255,255,0.1) !important;
            color: #cbd5e1 !important;
        }
        body.sivo-theme-dark .close-btn:hover {
            background: rgba(255,255,255,0.2) !important;
            color: #ffffff !important;
        }
        body.sivo-theme-dark .zoom-btn {
            background: rgba(30, 41, 59, 0.9) !important;
            backdrop-filter: blur(4px) !important;
            border-color: #334155 !important;
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark .zoom-btn:hover {
            background: #334155 !important;
            color: #f8fafc !important;
        }
        body.sivo-theme-dark .sivo-empty-state {
            color: #64748b !important;
        }
        body.sivo-theme-dark #layer-legend {
            background: rgba(30, 41, 59, 0.95) !important;
            color: #f8fafc !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-title-container {
            background: rgba(30, 41, 59, 0.95) !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-title {
            color: #f1f5f9 !important;
        }
        body.sivo-theme-dark #sivo-subtitle {
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark #sivo-attribution {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: #334155 !important;
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark .sivo-switch {
            background-color: #475569 !important;
        }
        body.sivo-theme-dark #sivo-search-container {
            background: rgba(30, 41, 59, 0.95) !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-search-input {
            color: #f8fafc !important;
        }
        body.sivo-theme-dark #sivo-search-input::placeholder {
            color: #64748b !important;
        }
        body.sivo-theme-dark #sivo-search-results {
            background: rgba(30, 41, 59, 0.98) !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark .sivo-search-result-item {
            border-bottom-color: #334155 !important;
        }
        body.sivo-theme-dark .sivo-search-result-item:hover, body.sivo-theme-dark .sivo-search-result-item.active {
            background: #475569 !important;
        }
        body.sivo-theme-dark .sivo-search-result-title {
            color: #f1f5f9 !important;
        }
        body.sivo-theme-dark .sivo-search-result-subtitle {
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark #sivo-context-menu {
            background: rgba(30, 41, 59, 0.98) !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark .sivo-context-menu-item {
            color: #e2e8f0 !important;
        }
        body.sivo-theme-dark .sivo-context-menu-item:hover {
            background: #475569 !important;
            color: #f8fafc !important;
        }


        .sivo-resizer {
            display: none;
            background-color: #eee;
            z-index: 10;
        }
        .sivo-resizer:hover {
            background-color: #ccc;
        }

        /* Resizer orientations */
        .sivo-resizer.resizer-horizontal {
            width: 5px;
            cursor: col-resize;
            height: 100%;
        }
        .sivo-resizer.resizer-vertical {
            height: 5px;
            cursor: row-resize;
            width: 100%;
        }
        .sivo-resizer.active {
            display: block;
        }

        .close-btn {
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }
        .zoom-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            font-weight: 600;
            color: #475569;
            user-select: none;
            transition: all 0.2s;
            font-size: 16px;
        }
        .zoom-btn:hover {
            background: #f8fafc;
            color: #0f172a;
            border-color: #cbd5e1;
        }

        /* Accessibility (A11y) Screen Reader Only */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Standard SIVO Animations */
        @keyframes sivo-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sivo-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: sivo-spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        .sivo-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .sivo-empty-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        *:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 2px;
        }

        @keyframes sivo-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .sivo-anim-pulse {
            animation: sivo-pulse 2s infinite ease-in-out;
            transform-origin: center;
        }

        @keyframes sivo-fade {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

    <script>
        var chartDom = document.getElementById('chart-container');

        // Multi-view data injected from Python
        var viewsData = {{ views_data | safe }};
        var currentViewId = {{ initial_view | safe }};

        // Apply Global Theme
        var currentTheme = viewsData[currentViewId].theme || 'light';
        document.body.className = 'sivo-theme-' + currentTheme;

        function updateThemeIcons() {
            var isDark = document.body.classList.contains('sivo-theme-dark') ||
                         (!document.body.classList.contains('sivo-theme-light') && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.getElementById('theme-icon-light').style.display = isDark ? 'none' : 'block';
            document.getElementById('theme-icon-dark').style.display = isDark ? 'block' : 'none';
        }
        updateThemeIcons();

        function toggleTheme() {
            if (document.body.classList.contains('sivo-theme-dark')) {
                document.body.classList.remove('sivo-theme-dark');
                document.body.classList.add('sivo-theme-light');
            } else if (document.body.classList.contains('sivo-theme-light')) {
                document.body.classList.remove('sivo-theme-light');
                document.body.classList.add('sivo-theme-dark');
            } else {
                // If relying on OS preference initially, explicitly set the opposite
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.body.classList.add('sivo-theme-light');
                } else {
                    document.body.classList.add('sivo-theme-dark');
                }
            }
            updateThemeIcons();
        }

        // Initialize ECharts with the appropriate renderer
        var renderMode = viewsData[currentViewId].render_mode || 'canvas';
        var myChart = echarts.init(chartDom, null, { renderer: renderMode });

        // Active variables for the current view
        var echartsData = [];
        var actionsManifest = {};
        var overlaysData = {};
        var connectionsData = [];
        var lockZoomOut = false;
        var fadeUnselected = false;
        var dataBinding = null;
        var timelineBinding = null;
        var liveSocket = null;
        var enableBrushSelection = false;
        var currentAudio = null; // Store reference to currently playing tour audio

        // History for back navigation
        var viewHistory = [];
        var currentZoom = 1;
        var currentCenter = null;

        function getBaseOption(mapName) {
            var view = viewsData[mapName] || {};
            var option = {
                aria: {
                    enabled: true,
                    decal: {
                        show: false
                    }
                },
                tooltip: {
                    trigger: 'item',
                    triggerOn: 'mousemove', // prevent tooltips from blocking click actions on touch devices
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: 'rgba(0, 0, 0, 0.05)',
                    borderWidth: 1,
                    textStyle: { color: '#334155', fontFamily: 'system-ui, sans-serif' },
                    extraCssText: 'box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); border-radius: 8px; backdrop-filter: blur(8px); padding: 12px 16px;',
                    position: function (point, params, dom, rect, size) {
                        var x = point[0];
                        var y = point[1];
                        var viewWidth = size.viewSize[0];
                        var viewHeight = size.viewSize[1];
                        var boxWidth = size.contentSize[0];
                        var boxHeight = size.contentSize[1];

                        var posX = x + 10;
                        var posY = y + 10;

                        if (posX + boxWidth > viewWidth) {
                            posX = x - boxWidth - 10;
                        }
                        if (posY + boxHeight > viewHeight) {
                            posY = y - boxHeight - 10;
                        }
                        return [posX, posY];
                    },
                    formatter: function (params) {
                        var dataIndex = echartsData.findIndex(item => item.name === params.name);
                        var tooltipContent = params.name;

                        if (dataIndex !== -1 && echartsData[dataIndex].tooltip) {
                            tooltipContent = echartsData[dataIndex].tooltip;
                        }

                        if (dataBinding && dataBinding.data && dataBinding.data[params.name]) {
                            var val = dataBinding.data[params.name][dataBinding.key];
                            if (val !== undefined) {
                                tooltipContent += '<br/>' + dataBinding.key + ': <b>' + val + '</b>';
                            }
                        }

                        return tooltipContent;
                    }
                },
                series: [
                    {
                        name: 'SIVO Series',
                        type: 'map',
                        map: mapName,
                        roam: view.lock_canvas ? false : true, // Enable zoom and pan
                        itemStyle: {
                            borderColor: '#cbd5e1', // Sleek slate-300
                            borderWidth: 1,
                            areaColor: '#f1f5f9' // Subtle slate-100
                        },
                        emphasis: {
                            itemStyle: {
                                // Strip out default areaColor override so custom colors stay intact on hover
                                // Keep a very subtle shadow just to indicate it is interactive on hover
                                shadowBlur: 8,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.2)'
                            },
                            label: {
                                show: false
                            }
                        },
                        selectedMode: false, // Strictly disable ECharts native selection state
                        select: {
                            itemStyle: {
                                // Empty to ensure absolutely no visual change on click natively
                            }
                        },
                        data: echartsData,
                        zlevel: 1,
                        animationDurationUpdate: 300 // Smooth transition on data/style changes
                    }
                ]
            };

            if (connectionsData && connectionsData.length > 0) {
                // If using pure 'map' coordinate system instead of 'geo', ECharts doesn't readily support 'lines'.
                // 'lines' strictly requires 'geo' or 'cartesian2d'.
                // To get lines to work correctly with an SVG map, the standard ECharts practice is to configure the map purely within a `geo` component, and bind scatter/lines to that geo coordinate system.
                // However, since SIVO heavily relies on the 'map' series type to handle interactions and thematic styling (choropleth, emphasis, tooltip bindings),
                // we must construct a hidden `geo` component that perfectly mirrors the map's aspect ratio and zoom scale.

                if (!option.geo) {
                    option.geo = {
                        map: mapName,
                        roam: view.lock_canvas ? false : true,
                        layoutCenter: ['50%', '50%'],
                        layoutSize: '100%',
                        itemStyle: {
                            color: 'transparent',
                            borderColor: 'transparent'
                        },
                        emphasis: {
                            itemStyle: {
                                color: 'transparent',
                                borderColor: 'transparent'
                            },
                            label: { show: false }
                        },
                        zlevel: 0
                    };

                    // Crucial: Bind the primary series to the new geo component to sync transformations
                    option.series[0].geoIndex = 0;
                }

                var linesData = connectionsData.map(function(conn) {
                    return {
                        coords: [
                            [conn.coords[0][0], conn.coords[0][1]],
                            [conn.coords[1][0], conn.coords[1][1]]
                        ],
                        lineStyle: {
                            color: conn.color,
                            width: conn.width,
                            type: conn.type,
                            opacity: conn.opacity
                        },
                        name: conn.label
                    };
                });

                option.series.push({
                    type: 'lines',
                    coordinateSystem: 'geo',
                    zlevel: 2,
                    polyline: false,
                    effect: {
                        show: true,
                        period: connectionsData[0].animation_speed || 3,
                        trailLength: 0.7,
                        color: '#fff',
                        symbolSize: 3
                    },
                    lineStyle: {
                        color: function(params) { return params.data.lineStyle.color; },
                        width: 0,
                        curveness: 0.2
                    },
                    data: linesData
                });

                // Add the static solid line underneath the effect
                option.series.push({
                    type: 'lines',
                    coordinateSystem: 'geo',
                    zlevel: 1,
                    polyline: false,
                    lineStyle: {
                        color: function(params) { return params.data.lineStyle.color; },
                        width: function(params) { return params.data.lineStyle.width; },
                        opacity: function(params) { return params.data.lineStyle.opacity; },
                        type: function(params) { return params.data.lineStyle.type; },
                        curveness: 0.2
                    },
                    data: linesData
                });
            }

            var activeDataBinding = dataBinding || timelineBinding;

            if (activeDataBinding) {
                option.visualMap = {
                    min: activeDataBinding.min_val,
                    max: activeDataBinding.max_val,
                    left: 'left',
                    bottom: 'bottom',
                    text: [activeDataBinding.max_val.toString(), activeDataBinding.min_val.toString()],
                    calculable: true,
                    inRange: {
                        color: activeDataBinding.colors
                    }
                };
            }

            var proportionalSymbols = viewsData[currentViewId].proportional_symbols;
            if (proportionalSymbols && proportionalSymbols.data) {
                var scatterData = [];
                for (var itemName in proportionalSymbols.data) {
                    var dataObj = proportionalSymbols.data[itemName];
                    if (dataObj && dataObj.coord) {
                        scatterData.push({
                            name: itemName,
                            value: [dataObj.coord[0], dataObj.coord[1], dataObj.value],
                            _rawVal: dataObj.value
                        });
                    }
                }

                if (scatterData.length > 0) {
                    if (!option.geo) {
                        option.geo = {
                            map: mapName,
                            roam: view.lock_canvas ? false : true,
                            layoutCenter: ['50%', '50%'],
                            layoutSize: '100%',
                            itemStyle: { color: 'transparent', borderColor: 'transparent' },
                            zlevel: 0
                        };
                        option.series[0].geoIndex = 0;
                    }

                    // Normalize sizes
                    var minVal = Math.min(...scatterData.map(d => d._rawVal));
                    var maxVal = Math.max(...scatterData.map(d => d._rawVal));
                    var range = maxVal - minVal || 1;

                    option.series.push({
                        name: 'Proportional Symbols',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        zlevel: 3,
                        symbol: 'circle',
                        itemStyle: {
                            color: proportionalSymbols.color
                        },
                        symbolSize: function (val) {
                            var ratio = (val[2] - minVal) / range;
                            return proportionalSymbols.min_size + ratio * (proportionalSymbols.max_size - proportionalSymbols.min_size);
                        },
                        data: scatterData
                    });
                }
            }

            if (enableBrushSelection) {
                option.toolbox = {
                    show: true,
                    feature: {
                        brush: {
                            type: ['polygon', 'rect', 'keep', 'clear']
                        }
                    },
                    right: 20,
                    top: 20
                };
                option.brush = {
                    geoIndex: 'all',
                    seriesIndex: 'all',
                    brushLink: 'all',
                    outOfBrush: {
                        colorAlpha: 0.2
                    }
                };
            }

            return option;
        }

        var animationInterval = null;

        function applyAnimations() {
            // Clear any existing interval to prevent memory leaks and erratic stacked animations during drill-downs
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }

            // ECharts uses Canvas or SVG.
            // If it's SVG renderer, we can apply classes.
            // But since ECharts defaults to canvas, animating individual geo regions via CSS is hard.
            // Instead, we will use a workaround: ECharts doesn't support CSS animations on canvas paths easily.
            // If an animation is set, we will use setInterval to mutate the ECharts option instead for basic effects,
            // or if it's rendered as SVG (which echarts map allows), we can query the dom.
            // For now, if we want robust canvas animation, we just toggle emphasis state.

            var option = myChart.getOption();
            var seriesData = option.series[0].data;
            var animatedItems = seriesData.filter(d => d.animation_class);

            if (animatedItems.length === 0) return;

            // Simple toggle for 'pulse' or 'fade' via ECharts itemStyle opacity
            let toggle = false;
            animationInterval = setInterval(() => {
                toggle = !toggle;
                var currentOption = myChart.getOption();
                var currentData = currentOption.series[0].data;
                var updated = false;

                currentData.forEach((item, index) => {
                    if (item.animation_class === 'fade') {
                        if (!item.itemStyle) item.itemStyle = {};
                        item.itemStyle.opacity = toggle ? 0.3 : 1.0;
                        updated = true;
                    } else if (item.animation_class === 'pulse') {
                        // For pulse on canvas, we can fake it by highlighting
                        if (toggle) {
                            myChart.dispatchAction({ type: 'highlight', name: item.name });
                        } else {
                            myChart.dispatchAction({ type: 'downplay', name: item.name });
                        }
                    }
                });

                if (updated) {
                    myChart.setOption({ series: [{ data: currentData }] });
                }
            }, 1000);
        }

        function applyNativeSvgManipulations() {
            var viewData = viewsData[currentViewId];
            var overlayContainer = document.getElementById('sivo-native-overlay-svg-container');

            // Set up overlay container
            overlayContainer.innerHTML = viewData.svg_string;
            overlayContainer.style.display = 'block';

            var svgEl = overlayContainer.querySelector('svg');
            if (!svgEl) return;

            // Ensure SVG fills the container and allows us to control the global transform
            svgEl.style.width = '100%';
            svgEl.style.height = '100%';
            // Keep pointer-events none so ECharts underneath still gets hover/click events
            svgEl.style.pointerEvents = 'none';

            // We need a root <g> tag to apply ECharts' global roam transforms (pan/zoom)
            // Wrap all children in a new <g id="sivo-global-transform-group">
            var wrapperGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            wrapperGroup.setAttribute('id', 'sivo-global-transform-group');

            // Move all existing children into the wrapper
            while (svgEl.firstChild) {
                wrapperGroup.appendChild(svgEl.firstChild);
            }
            svgEl.appendChild(wrapperGroup);

            // Now apply the specific features (morph, filter, transform, mask) to individual nodes
            var mappings = viewData.mappings;
            for (var name in mappings) {
                var mapping = mappings[name];
                // Check if element has any actions mapped to it (so we need it interactive) or a theme
                var hasTheme = mapping.theme !== undefined;
                var hasActions = mapping.actions && mapping.actions.length > 0;
                var isDraggable = mapping.draggable;
                var hasHoverColor = hasTheme && mapping.theme.hover_color;

                var node = wrapperGroup.querySelector(`[id="${name}"], [name="${name}"]`);
                if (!node) continue;

                // Make interactive elements pointer-events: auto so they can catch events
                // because the parent svg is pointer-events: none.
                if (isDraggable || hasActions || hasHoverColor || mapping.tooltip) {
                    node.style.pointerEvents = 'auto';
                    node.style.cursor = 'pointer';

                    // Manually bind ECharts-like interactivity to these top-level DOM nodes
                    (function(node, name, mapping) {
                        // Tooltip & Hover Callback
                        node.addEventListener('mouseenter', function(e) {
                            // Highlight (ECharts doesn't let us trigger its native highlight easily if opacity is 0,
                            // so we manually apply hover_color if it exists)
                            if (mapping.theme && mapping.theme.hover_color) {
                                node.setAttribute('data-original-fill', node.getAttribute('fill') || '');
                                node.setAttribute('fill', mapping.theme.hover_color);
                            }

                            // Show Tooltip via ECharts dispatch
                            myChart.dispatchAction({
                                type: 'showTip',
                                seriesIndex: 0,
                                name: name
                            });

                            // Hover Callback action
                            if (mapping.actions) {
                                mapping.actions.forEach(function(action) {
                                    if (action.action_type === 'hover_callback') {
                                        window.parent.postMessage({
                                            type: 'sivo_hover',
                                            payload: { element_id: name, event: action.event_name, data: action.payload || {} }
                                        }, '*');
                                    }
                                });
                            }
                        });

                        node.addEventListener('mouseleave', function(e) {
                            if (mapping.theme && mapping.theme.hover_color) {
                                var orig = node.getAttribute('data-original-fill');
                                if (orig !== null) node.setAttribute('fill', orig);
                            }
                            myChart.dispatchAction({
                                type: 'hideTip'
                            });
                        });

                        // Click actions
                        node.addEventListener('click', function(e) {
                            // If we were dragging, prevent click
                            if (window.isDraggingElement) {
                                window.isDraggingElement = false;
                                return;
                            }
                            // Manually trigger the ECharts 'click' logic we defined lower down
                            // ECharts `trigger` API is internal, but we can simulate the params object
                            // and call the same logic. For simplicity, we can dispatch a custom DOM event or
                            // extract our click handler into a reusable function.
                            // However, we can also just manually trigger it through the zr instance
                            myChart.trigger('click', { componentType: 'series', name: name });
                        });

                        // Dragging logic is handled below globally, but we tag it
                        if (mapping.draggable) {
                            node.setAttribute('data-draggable', 'true');
                            node.style.cursor = 'grab';
                        }
                    })(node, name, mapping);
                }

                if (!hasTheme) continue;
                var theme = mapping.theme;

                // 1. Morphing
                if (theme.morph_to_path && node.tagName.toLowerCase() === 'path') {
                    var duration = theme.morph_duration_ms || 1000;
                    var delay = theme.morph_delay_ms || 0;
                    var easing = theme.morph_easing || 'ease-in-out';
                    var iterations = theme.morph_iterations !== undefined ? theme.morph_iterations : 1;

                    var originalD = node.getAttribute('d');
                    var targetD = theme.morph_to_path;

                    // The Web Animations API (WAAPI) provides the smoothest, hardware-accelerated

                    try {

                            { d: 'path("' + targetD + '")' }
                        ], {
                            duration: duration,
                            delay: delay,
                            fill: 'forwards',
                            easing: easing,
                            iterations: iterations,
                            direction: iterations > 1 ? 'alternate' : 'normal'
                        });

                        // Ensure the actual attribute is updated at the end for persistence,
                        // calculating total time including delays and iterations
                        if (iterations !== Infinity) {
                            setTimeout(() => {

                                var finalD = (iterations > 1 && iterations % 2 === 0) ? originalD : targetD;
                                node.setAttribute('d', finalD);
                            }, delay + (duration * iterations));
                        }
                    } catch (err) {
                        // Fallback if WAAPI path() morphing fails (e.g. invalid string mismatch)
                        setTimeout(() => node.setAttribute('d', targetD), delay);
                    }
                }

                // 2. Transformations
                if (theme.transform) {
                    var currentTransform = node.getAttribute('transform') || '';
                    node.setAttribute('transform', currentTransform + ' ' + theme.transform);
                }

                // 3. Filters
                if (theme.filter) {
                    node.style.filter = theme.filter;
                    node.setAttribute('filter', theme.filter);
                }

                // 4. Clipping
                if (theme.clip_path) {

                if (theme.mask) {

                if (theme.odometer_value !== undefined && theme.odometer_value !== null && node.tagName.toLowerCase() === 'text') {

                        var currentVal = startVal + (endVal - startVal) * easeOutQuart;

                        if (formatStr === 'int') {
                            node.textContent = Math.round(currentVal);
                        } else if (formatStr === 'float') {
                            node.textContent = currentVal.toFixed(2);
                        } else if (formatStr === 'currency') {
                            node.textContent = '$' + currentVal.toFixed(2);
                        } else {
                            // Default to integer if no format provided or arbitrary
                            node.textContent = Math.round(currentVal);
                        }

                        if (progress < odoDuration) {
                            window.requestAnimationFrame(stepOdometer);
                        } else {
                            // ensure exact end value is set
                            if (formatStr === 'int') {
                                node.textContent = Math.round(endVal);
                            } else if (formatStr === 'float') {
                                node.textContent = endVal.toFixed(2);
                            } else if (formatStr === 'currency') {
                                node.textContent = '$' + endVal.toFixed(2);
                            } else {
                                node.textContent = Math.round(endVal);
                            }
                        }
                    }
                    window.requestAnimationFrame(stepOdometer);
                }

        function syncOverlayTransform() {

            // In the SVG renderer, ECharts applies a transform attribute to each mapped shape,
            // or we can use the ECharts internal API to get the current projection matrix to ensure perfection.
            // Even better, we can query ANY of the generated path elements and extract its transform!
            var echartsPath = document.querySelector('#chart-container svg path[transform]');

        function renderView(viewId, isBackNavigation) {
            if (!viewsData[viewId]) {
                console.error("View not found:", viewId);
                return;
            }

            if (!isBackNavigation && currentViewId && currentViewId !== viewId) {
                viewHistory.push(currentViewId);

            currentViewId = viewId;
            var view = viewsData[viewId];

            // Note: ECharts doesn't support changing renderer after init natively.
            // We assume multi-view projects will use the same renderer, or default to the first view's.
            renderMode = view.render_mode || 'canvas';

            echartsData = view.echarts_data;
            actionsManifest = view.actions_manifest;

            // Handle Live Binding (WebSocket Telemetry) if present
            if (liveSocket) {
                liveSocket.close();
                liveSocket = null;

            if (liveBinding) {
                liveSocket = new WebSocket(liveBinding.url);

                liveSocket.onopen = function(e) {
                    console.log("[SIVO] Live binding WebSocket connected to", liveBinding.url);
                    if (liveBinding.auth_token) {
                        liveSocket.send(JSON.stringify({ type: 'auth', token: liveBinding.auth_token }));
                    }
                    if (liveBinding.topic) {
                        liveSocket.send(JSON.stringify({ type: 'subscribe', topic: liveBinding.topic }));
                    }
                };

                liveSocket.onmessage = function(event) {
                    try {
                        var msg = JSON.parse(event.data);
                        // Expected format: { element_id: "id1", color: "#ff0000", tooltip: "New data" }
                        if (msg && msg.element_id) {
                            console.log("[SIVO] Live update received:", msg);
                            // Merge into existing mapped logic dynamically
                            if (!actionsManifest[msg.element_id]) {
                                actionsManifest[msg.element_id] = { actions: [], theme: {} };
                            }
                            if (msg.color) {
                                actionsManifest[msg.element_id].theme.color = msg.color;
                            }
                            if (msg.tooltip) {
                                var tAction = actionsManifest[msg.element_id].actions.find(a => a.action_type === 'tooltip');
                                if (!tAction) {
                                    tAction = { action_type: 'tooltip', title: msg.tooltip, content: `<h3>${msg.tooltip}</h3>` };
                                    actionsManifest[msg.element_id].actions.push(tAction);
                                } else {
                                    tAction.title = msg.tooltip;
                                    tAction.content = `<h3>${msg.tooltip}</h3>`;
                                }
                            }
                            // Re-apply base option dynamically without breaking current zoom state
                            var updatedOption = createBaseOption(viewId, view.svg_string, actionsManifest);
                            myChart.setOption(updatedOption, false);
                        }
                    } catch(err) {
                        console.error("[SIVO] Error parsing live message:", err);
                    }
                };

                liveSocket.onclose = function(event) {

                };

                // Populate Echarts data with values for visualMap
                for (var i = 0; i < echartsData.length; i++) {
                    var itemName = echartsData[i].name;
                    if (dataBinding.data[itemName] && dataBinding.data[itemName][dataBinding.key] !== undefined) {
                        echartsData[i].value = dataBinding.data[itemName][dataBinding.key];

                for (var t = 0; t < timelineKeys.length; t++) {
                    var timeKey = timelineKeys[t];

                    var stepSeriesData = JSON.parse(JSON.stringify(echartsData)); // Deep clone

                    for (var i = 0; i < stepSeriesData.length; i++) {
                        var itemName = stepSeriesData[i].name;
                        if (stepDataMap[itemName] && stepDataMap[itemName][timelineBinding.key] !== undefined) {

            // Initialize Scrollytelling if present
            initScrollytelling(view.scrollytelling);

            // Initialize Tour if present
            initTour(view.tour);

            // Initialize Minimap if present

            });
        }

        function zoomIn() {

        // Introduce a lightweight client-side sanitizer
        function sanitizeHTML(str) {
            if (typeof DOMPurify !== 'undefined') {

                    ADD_ATTR: ['onsubmit', 'required', 'type', 'name', 'src', 'background', 'speed', 'style', 'loop', 'autoplay', 'min', 'max', 'value'],
                    CUSTOM_ELEMENT_HANDLING: {

            if (target && target.closest) {

                e.stopPropagation(); // Stop ECharts from getting the mousedown and starting a pan

                draggedElement = target;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                window.isDraggingElement = true; // prevent click immediately after drag

                var currentTransform = target.getAttribute('transform') || '';
                var translateMatch = currentTransform.match(/translate\(([-\d.]+)[ ,]([-\d.]+)\)/);
                if (translateMatch) {
                    currentElementX = parseFloat(translateMatch[1]);
                    currentElementY = parseFloat(translateMatch[2]);

                currentTransform = currentTransform.replace(/translate\([^)]+\)/g, '').trim();

                var newTransform = 'translate(' + newX + ' ' + newY + ') ' + currentTransform;

        function applyFadeUnselected(selectedName, force = false) {

            var currentOption = myChart.getOption();
            var seriesData = currentOption.series[0].data;
            var updated = false;

            for (var i = 0; i < seriesData.length; i++) {
                var itemName = seriesData[i].name;

                if (!seriesData[i].itemStyle) {
                    seriesData[i].itemStyle = {};

                if (seriesData[i].itemStyle._originalOpacity === undefined) {
                    seriesData[i].itemStyle._originalOpacity = seriesData[i].itemStyle.opacity !== undefined ? seriesData[i].itemStyle.opacity : 1.0;
                }

                if (itemName === selectedName) {
                    seriesData[i].itemStyle.opacity = seriesData[i].itemStyle._originalOpacity;
                } else {
                    seriesData[i].itemStyle.opacity = 0.2; // Fade out unselected

                infoContent.innerHTML = `<div class="sivo-empty-state">${emptySvg}<h3>${name}</h3><p>No additional information mapped for this region.</p></div>`;

        // Handle hover events
        myChart.on('mouseover', function (params) {
            var name = params.name;
            var elementActions = actionsManifest[name];

            if (elementActions) {
                elementActions.forEach(function(action) {
                    if (action.action_type === 'hover_callback') {
                        window.parent.postMessage({
                            type: 'sivo_hover',
                            payload: {
                                element_id: name,
                                event_name: action.event_name,
                                data: action.payload || {}
                            }
                        }, '*');
                    }
                });
            }
        });

        // Listen for messages from Streamlit
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'sivo_command') {
                var payload = event.data.payload;
                if (payload.command === 'zoom_to') {
                    var elementId = payload.element_id;
                    var zoomLevel = payload.zoom || 2;

                    // We need to find the element in the map data to get its bounding box or center
                    // ECharts geo doesn't perfectly expose region centers programmatically easily,
                    // but we can center the map on the named region

                    myChart.dispatchAction({
                        type: 'geoSelect',
                        name: elementId
                    });

                    if (payload.zoom_center) {
                        myChart.setOption({
                            series: [{
                                center: payload.zoom_center,
                                zoom: zoomLevel
                            }]
                        });
                    }
                } else if (payload.command === 'inject_assets') {
                    if (payload.css) {
                        var style = document.createElement('style');
                        style.innerHTML = payload.css;
                        document.head.appendChild(style);
                    }
                    if (payload.js) {
                        var script = document.createElement('script');
                        script.innerHTML = payload.js;
                        document.body.appendChild(script);
                    }
                } else if (payload.command === 'update_colors') {
                    var newColors = payload.colors;
                    var seriesData = myChart.getOption().series[0].data;

                    var updated = false;
                    for (var i = 0; i < seriesData.length; i++) {
                        var name = seriesData[i].name;
                        if (newColors[name]) {
                            if (!seriesData[i].itemStyle) {
                                seriesData[i].itemStyle = {};
                            }
                            seriesData[i].itemStyle.areaColor = newColors[name];
                            updated = true;
                        }
                    }

                    if (updated) {
                        myChart.setOption({
                            series: [{
                                data: seriesData
                            }]
                        });
                    }
                }
            }
        });

            if (resizer) resizer.className = 'sivo-resizer';
            document.body.style.flexDirection = 'row';

            // Smoothly resize ECharts during CSS transition
            let start = null;
            function step(timestamp) {
                if (!start) start = timestamp;
                var progress = timestamp - start;
                myChart.resize();
                if (progress < 350) {
                    window.requestAnimationFrame(step);

            window.requestAnimationFrame(step);

        // --- Resizer Logic ---
        (function() {
            const resizer = document.getElementById('sivo-resizer');
            const panel = document.getElementById('info-panel');
            let isResizing = false;
            let currentLayout = 'row'; // depends on flex-direction
            let lastDownX = 0;
            let lastDownY = 0;
            let startWidth = 0;
            let startHeight = 0;

            resizer.addEventListener('mousedown', function(e) {
                isResizing = true;
                currentLayout = document.body.style.flexDirection;
                lastDownX = e.clientX;
                lastDownY = e.clientY;
                startWidth = panel.getBoundingClientRect().width;
                startHeight = panel.getBoundingClientRect().height;

                // Add a transparent overlay to capture pointer events over iframes/charts
                let overlay = document.createElement('div');
                overlay.id = 'sivo-drag-overlay';
                overlay.style.position = 'fixed';
                overlay.style.top = 0;
                overlay.style.left = 0;
                overlay.style.right = 0;
                overlay.style.bottom = 0;
                overlay.style.zIndex = 9999;
                overlay.style.cursor = currentLayout.includes('row') ? 'col-resize' : 'row-resize';
                document.body.appendChild(overlay);

                e.preventDefault();
            });

            window.addEventListener('mousemove', function(e) {
                if (!isResizing) return;

                if (currentLayout === 'row') {
                    // Right panel
                    let newWidth = startWidth - (e.clientX - lastDownX);
                    panel.style.width = newWidth + 'px';
                } else if (currentLayout === 'row-reverse') {
                    // Left panel
                    let newWidth = startWidth + (e.clientX - lastDownX);
                    panel.style.width = newWidth + 'px';
                } else if (currentLayout === 'column') {
                    // Bottom panel
                    let newHeight = startHeight - (e.clientY - lastDownY);
                    panel.style.height = newHeight + 'px';
                } else if (currentLayout === 'column-reverse') {
                    // Top panel
                    let newHeight = startHeight + (e.clientY - lastDownY);
                    panel.style.height = newHeight + 'px';
                }

                // Throttle resize event for performance if needed, but modern ECharts usually handles it
                myChart.resize();
            });

            window.addEventListener('mouseup', function(e) {
                if (isResizing) {
                    isResizing = false;
                    let overlay = document.getElementById('sivo-drag-overlay');
                    if (overlay) document.body.removeChild(overlay);
                    myChart.resize();
                }
            });
        })();
        // --- End Resizer Logic ---

        // Setup Overlays
        var overlaysContainer = document.createElement('div');
        overlaysContainer.id = 'sivo-overlays-container';
        overlaysContainer.style.position = 'absolute';

        document.getElementById('chart-container').appendChild(overlaysContainer);

        function initOverlays() {
            overlaysContainer.innerHTML = '';

            if (overlaysData) {
                for (const [id, overlay] of Object.entries(overlaysData)) {
                    var el = document.createElement('div');
                    el.style.position = 'absolute';
                    el.style.pointerEvents = 'auto'; // allow interacting with the overlay itself
                    el.innerHTML = overlay.html;
                    overlaysContainer.appendChild(el);
                    overlayElements[id] = { dom: el, data: overlay };
                }
