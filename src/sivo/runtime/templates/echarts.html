        function updateOverlaysPosition() {
            var zoomLevel = currentZoom;

            for (const [id, overlayObj] of Object.entries(overlayElements)) {
                if (overlayObj.data.fixed) {
                    // Fixed positioned overlays (like legends)
                    overlayObj.dom.style.position = 'absolute';
                    if (overlayObj.data.position === 'bottom-left') {
                        overlayObj.dom.style.bottom = '20px';
                        overlayObj.dom.style.left = '20px';
                    }
                    overlayObj.dom.style.display = 'block';
                    continue;
                }

                var coord = overlayObj.data.coord; // [x, y] in SVG map coordinates
                var offset = overlayObj.data.offset; // [x, y] pixel offset

                // Convert SVG coordinate to DOM pixel coordinate
                var pixel = myChart.convertToPixel({seriesIndex: 0}, coord);
                if (pixel) {
                    overlayObj.dom.style.left = (pixel[0] + offset[0]) + 'px';
                    overlayObj.dom.style.top = (pixel[1] + offset[1]) + 'px';

                    if (overlayObj.data.scale_with_zoom) {
                        // Use a transform to scale the overlay, but preserve the origin at the point it's anchored to
                        overlayObj.dom.style.transformOrigin = 'top left';
                        overlayObj.dom.style.transform = 'scale(' + zoomLevel + ')';
                    } else {
                        overlayObj.dom.style.transform = '';
                    }

                    overlayObj.dom.style.display = 'block';
                } else {
                    overlayObj.dom.style.display = 'none';
                }
            }
        }

        function initScratchoff(view) {
            var canvas = document.getElementById('sivo-scratchoff-canvas');
            if (!view.scratchoff) {
                canvas.style.display = 'none';
                return;
            }

            canvas.style.display = 'block';
            canvas.style.pointerEvents = 'auto'; // allow scratching
            canvas.style.touchAction = 'none'; // prevent native scrolling while scratching
            var ctx = canvas.getContext('2d');

            // Resize canvas to match container
            function resizeCanvas() {
                var rect = chartDom.getBoundingClientRect();

                // Save current canvas state to preserve scratch progress on resize
                var tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width || rect.width;
                tempCanvas.height = canvas.height || rect.height;
                var tempCtx = tempCanvas.getContext('2d');
                if (canvas.width && canvas.height) {
                    tempCtx.drawImage(canvas, 0, 0);
                }

                canvas.width = rect.width;
                canvas.height = rect.height;

                if (canvas.width > 0 && canvas.height > 0) {
                    fillCanvas(tempCanvas);
                }
            }

            function fillCanvas(savedStateCanvas) {
                if (view.scratchoff.image_url) {
                    var img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.onload = function() {
                        // Draw image to cover
                        var scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                        var x = (canvas.width / 2) - (img.width / 2) * scale;
                        var y = (canvas.height / 2) - (img.height / 2) * scale;
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                        if (savedStateCanvas && savedStateCanvas.width) {
                            ctx.globalCompositeOperation = 'destination-out';
                            ctx.drawImage(savedStateCanvas, 0, 0);
                        }
                    };
                    img.src = view.scratchoff.image_url;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = view.scratchoff.color || '#cccccc';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    if (savedStateCanvas && savedStateCanvas.width) {
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.drawImage(savedStateCanvas, 0, 0);
                    }
                }
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            var isDrawing = false;
            var brushSize = view.scratchoff.brush_size || 40;

            function scratch(e) {
                if (!isDrawing) return;
                var rect = canvas.getBoundingClientRect();
                var clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                var clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;

                var x = clientX - rect.left;
                var y = clientY - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, brushSize, 0, Math.PI * 2, false);
                ctx.fill();

                // Check how much is scratched off to potentially disable pointer-events completely
                // (Too expensive to do every frame, maybe every N frames)
            }

            canvas.addEventListener('mousedown', function(e) {
                isDrawing = true;
                scratch(e);
            });
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('mouseup', function() { isDrawing = false; });
            canvas.addEventListener('mouseleave', function() { isDrawing = false; });

            // Touch support
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = true;
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                e.stopPropagation();
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = false;
            }, { passive: false });
        }


        function initScrollytelling(steps) {
            var container = document.getElementById('scrollytelling-container');
            if (!steps || steps.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            container.innerHTML = '';

            steps.forEach(function(step, index) {
                var stepWrapper = document.createElement('div');
                stepWrapper.className = 'scrolly-step';
                stepWrapper.setAttribute('data-index', index);

                var stepCard = document.createElement('div');
                stepCard.className = 'scrolly-step-card';
                stepCard.innerHTML = step.content;
                stepWrapper.appendChild(stepCard);

                if (index === steps.length - 1) {
                    stepWrapper.style.paddingBottom = '80vh';
                }
                container.appendChild(stepWrapper);
            });

            var observerOptions = { root: container, rootMargin: '-50% 0px -50% 0px', threshold: 0 };
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var index = parseInt(entry.target.getAttribute('data-index'), 10);
                        var step = steps[index];

                        document.querySelectorAll('.scrolly-step').forEach(el => el.classList.remove('active'));
                        entry.target.classList.add('active');

                        // Close info panel to ensure map is visible during narrative changes
                        closePanel();

                        if (step.zoom_to) {
                            myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                            var viewMeta = overlaysData[step.zoom_to];
                            if (viewMeta && viewMeta.coord) {
                                myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                            } else {
                                myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                            }
                        }

                        if (step.colors) {
                            var currentOption = myChart.getOption();
                            var seriesData = currentOption.series[0].data;
                            var updated = false;
                            for (var i = 0; i < seriesData.length; i++) {
                                var name = seriesData[i].name;
                                if (step.colors[name]) {
                                    if (!seriesData[i].itemStyle) seriesData[i].itemStyle = {};
                                    seriesData[i].itemStyle.areaColor = step.colors[name];
                                    updated = true;
                                }
                            }
                            if (updated) myChart.setOption({ series: [{ data: seriesData }] });
                        }

                        myChart.dispatchAction({ type: 'hideTip' });
                        if (step.show_tooltips) {
                            step.show_tooltips.forEach(function(tooltipId) {
                                myChart.dispatchAction({ type: 'showTip', name: tooltipId });
                            });
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.scrolly-step').forEach(stepEl => observer.observe(stepEl));
            if (steps.length > 0) container.scrollTop = 0;
        }

        var tourSteps = [];
        var currentTourStep = 0;

        function initTour(steps) {
            var container = document.getElementById('tour-container');
            if (!steps || steps.length === 0) {
                container.style.display = 'none';
                return;
            }
            tourSteps = steps;
            currentTourStep = 0;
            container.style.display = 'block';
            renderTourStep();
        }

        function renderTourStep() {
            if (currentTourStep < 0 || currentTourStep >= tourSteps.length) return;

            // Stop existing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            // Close info panel to ensure map is visible during tour progression
            closePanel();

            var step = tourSteps[currentTourStep];
            document.getElementById('tour-content').innerHTML = sanitizeHTML(step.content);

            // Play audio if present
            if (step.audio_url) {
                currentAudio = new Audio(step.audio_url);
                currentAudio.play().catch(e => console.error("Audio playback failed:", e));
            }
            document.getElementById('tour-progress').innerText = (currentTourStep + 1) + ' / ' + tourSteps.length;
            document.getElementById('tour-prev').disabled = currentTourStep === 0;
            document.getElementById('tour-next').innerText = currentTourStep === tourSteps.length - 1 ? 'Finish' : 'Next';

            if (step.zoom_to) {
                myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                var viewMeta = overlaysData[step.zoom_to];
                if (viewMeta && viewMeta.coord) {
                    myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                } else {
                    myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                }
            }

            myChart.dispatchAction({ type: 'hideTip' });
            if (step.show_tooltips) {
                step.show_tooltips.forEach(tooltipId => myChart.dispatchAction({ type: 'showTip', name: tooltipId }));
            }
        }

        function tourNext() {
            if (currentTourStep < tourSteps.length - 1) {
                currentTourStep++;
                renderTourStep();
            } else {
                closeTour();
            }
        }

        function tourPrev() {
            if (currentTourStep > 0) {
                currentTourStep--;
                renderTourStep();
            }
        }

        function closeTour() {
            document.getElementById('tour-container').style.display = 'none';
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
        }

        function exportSnapshot() {
            if (renderMode === 'svg') {
                var container = document.getElementById('sivo-native-overlay-svg-container');
                if (!container) return;
                var svgClone = container.querySelector('svg').cloneNode(true);
                var source = new XMLSerializer().serializeToString(svgClone);
                if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
                    source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
                }
                if(!source.match(/^<svg[^>]+"http\:\/\/www\.w3\.org\/1999\/xlink"/)){
                    source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
                }
                source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
                var url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
                var downloadLink = document.createElement("a");
                downloadLink.href = url;
                downloadLink.download = "sivo-snapshot.svg";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            } else {
                var imgData = myChart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#fff' });
                var downloadLink = document.createElement("a");
                downloadLink.href = imgData;
                downloadLink.download = "sivo-snapshot.png";
                document.body.appendChild(downloadLink);

                document.body.removeChild(downloadLink);
            }
        }

        function initLayerLegend(toggles) {

            if (!toggles || toggles.length === 0) {

            toggles.forEach(function(toggle) {

        function initSearch(view) {
            var searchContainer = document.getElementById('sivo-search-container');
            var searchInput = document.getElementById('sivo-search-input');
            var searchResults = document.getElementById('sivo-search-results');

            if (!view.enable_search) {
                searchContainer.style.display = 'none';
                return;
            }

            searchContainer.style.display = 'block';

            // Build search index globally so the event listener doesn't trap old closure scope on re-render
            window.sivoSearchIndex = [];

            // Helper to strip HTML tags for search display
            function stripHtml(html) {
                var tmp = document.createElement("DIV");
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || "";
            }

            echartsData.forEach(function(item) {
                var rawTitle = item.tooltip || item.name;
                // Strip HTML from title so we don't accidentally render images/blockquotes in the tiny search dropdown
                var title = stripHtml(rawTitle);

                var subtitle = item.name !== rawTitle ? item.name : '';
                window.sivoSearchIndex.push({
                    id: item.name,
                    title: title,
                    subtitle: subtitle,
                    searchStr: (title + ' ' + subtitle).toLowerCase()
                });
            });

            window.sivoRenderSearchResults = function(query) {
                if (!query) {
                    searchResults.style.display = 'none';
                    return;
                }

                var q = query.toLowerCase();
                var results = window.sivoSearchIndex.filter(item => item.searchStr.includes(q)).slice(0, 10); // Limit to 10

                if (results.length === 0) {
                    searchResults.innerHTML = '<div class="sivo-search-result-item"><span class="sivo-search-result-subtitle">No results found</span></div>';
                    searchResults.style.display = 'block';
                    return;
                }

                searchResults.innerHTML = '';
                results.forEach(function(item) {
                    var el = document.createElement('div');
                    el.className = 'sivo-search-result-item';
                    el.innerHTML = `<div class="sivo-search-result-title">${item.title}</div><div class="sivo-search-result-subtitle">${item.subtitle}</div>`;

                    el.addEventListener('mousedown', function(e) {
                        e.preventDefault(); // Prevent input blur
                        window.sivoSelectSearchResult(item.id);
                    });

                    searchResults.appendChild(el);
                });
                searchResults.style.display = 'block';
            }

            window.sivoSelectSearchResult = function(elementId) {
                searchInput.value = '';
                searchResults.style.display = 'none';
                searchInput.blur();

                // Focus element
                myChart.dispatchAction({ type: 'geoSelect', name: elementId });

                // Force highlight by fading everything else
                applyFadeUnselected(elementId, true);

                // Check if it has a specific overlay bound center
                var viewMeta = overlaysData[elementId];
                if (viewMeta && viewMeta.coord) {
                    myChart.setOption({ series: [{ center: viewMeta.coord, zoom: 3.0 }] });
                } else {
                    // Trigger click to center map if ECharts handles it, or trigger panel logic
                    myChart.trigger('click', { componentType: 'series', name: elementId });

                    // Show tooltip
                    myChart.dispatchAction({ type: 'showTip', name: elementId });
                }
            }

            // Using oninput/onfocus/onblur directly to safely overwrite any old closure references
            // without stacking up event listeners on re-render.
            searchInput.oninput = function(e) {
                window.sivoRenderSearchResults(e.target.value);
            };

            searchInput.onfocus = function(e) {
                if (e.target.value) window.sivoRenderSearchResults(e.target.value);
            };

            searchInput.onblur = function(e) {
                setTimeout(() => searchResults.style.display = 'none', 100);
            };
        }

        function initWatermark(view) {
            var watermarkContainer = document.getElementById('sivo-watermark-container');
            if (view.watermark) {
                watermarkContainer.innerHTML = sanitizeHTML(view.watermark);
                watermarkContainer.style.display = 'block';

                // Adjust position if zoom controls are present and default right
                var zoomControls = document.querySelector('.zoom-controls');
                if (zoomControls && zoomControls.style.display !== 'none') {
                    watermarkContainer.style.bottom = '180px'; // move above zoom controls
                } else {
                    watermarkContainer.style.bottom = '20px';
                }
            } else {
                watermarkContainer.style.display = 'none';
            }
        }

        function initTitles(view) {
            var titleContainer = document.getElementById('sivo-title-container');
            var titleEl = document.getElementById('sivo-title');
            var subtitleEl = document.getElementById('sivo-subtitle');
            var attributionEl = document.getElementById('sivo-attribution');

            if (view.title || view.subtitle) {
                titleContainer.style.display = 'block';
                titleEl.style.display = view.title ? 'block' : 'none';
                subtitleEl.style.display = view.subtitle ? 'block' : 'none';
                if (view.title) titleEl.innerText = view.title;
                if (view.subtitle) subtitleEl.innerText = view.subtitle;
            } else {
                titleContainer.style.display = 'none';
            }

            if (view.attribution) {
                attributionEl.style.display = 'block';
                attributionEl.innerText = view.attribution;
            } else {
                attributionEl.style.display = 'none';
            }
        }

        function initControls(view) {
            document.getElementById('fullscreen-btn').style.display = view.enable_fullscreen ? 'flex' : 'none';
            // Only show share if Web Share API is supported, or just show it anyway if requested
            document.getElementById('share-btn').style.display = view.enable_share && navigator.share ? 'flex' : 'none';
            // Only show data download if there is data
            document.getElementById('download-data-btn').style.display = view.enable_data_download && (dataBinding || timelineBinding) ? 'flex' : 'none';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function shareInfographic() {
            var view = viewsData[currentViewId];
            if (navigator.share) {
                navigator.share({
                    title: view.title || 'Interactive Infographic',
                    text: view.subtitle || 'Check out this interactive graphic',
                    url: window.location.href,
                }).catch((error) => console.log('Error sharing', error));
            }
        }

        function downloadDataCSV() {
            var csvContent = "data:text/csv;charset=utf-8,";

            if (dataBinding && dataBinding.data) {
                csvContent += "Region," + dataBinding.key + "\n";
                for (var name in dataBinding.data) {
                    var val = dataBinding.data[name][dataBinding.key];
                    if (val !== undefined) {
                        csvContent += `"${name}",${val}\n`;
                    }
                }
            } else if (timelineBinding && timelineBinding.data) {
                var firstTimeKey = Object.keys(timelineBinding.data)[0];
                var keys = ["Region"];
                var timelineKeys = Object.keys(timelineBinding.data);
                keys = keys.concat(timelineKeys);
                csvContent += keys.join(",") + "\n";

                // Collect all regions
                var regions = new Set();
                timelineKeys.forEach(tKey => {
                    Object.keys(timelineBinding.data[tKey]).forEach(r => regions.add(r));
                });

                regions.forEach(r => {
                    var row = [`"${r}"`];
                    timelineKeys.forEach(tKey => {
                        var val = timelineBinding.data[tKey][r] ? timelineBinding.data[tKey][r][timelineBinding.key] : "";
                        row.push(val !== undefined ? val : "");
                    });
                    csvContent += row.join(",") + "\n";
                });
            } else {
                alert("No data to download.");
                return;
            }

            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            var view = viewsData[currentViewId];
            link.setAttribute("download", (view.title ? view.title.replace(/\s+/g, '_').toLowerCase() : "sivo_data") + ".csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initialize the first view
        renderView(currentViewId, false);

        // Listen for brush selection events
        myChart.on('brushSelected', function (params) {
            if (!enableBrushSelection) return;

            var selectedIds = [];
            var mainSeries = params.batch[0]; // Assuming map series is first
            if (mainSeries && mainSeries.selected && mainSeries.selected.length > 0) {
                var selectedIndices = mainSeries.selected[0].dataIndex;
                selectedIndices.forEach(function(index) {
                    var item = echartsData[index];
                    if (item && item.name) {
                        selectedIds.push(item.name);
                    }
                });
            }

            // Post message to Streamlit or parent
            window.parent.postMessage({
                type: 'sivo_bulk_selection',
                payload: {
                    selected_ids: selectedIds
                }
            }, '*');
        });

        // Setup Native Context Menu
        var contextMenuDOM = document.getElementById('sivo-context-menu');

        myChart.on('contextmenu', function (params) {
            var name = params.name;
            var dataIndex = echartsData.findIndex(item => item.name === name);
            if (dataIndex !== -1 && echartsData[dataIndex].context_menu && echartsData[dataIndex].context_menu.length > 0) {
                // Prevent default browser menu
                params.event.event.preventDefault();

                var menuData = echartsData[dataIndex].context_menu;
                contextMenuDOM.innerHTML = '';

                menuData.forEach(function(menuItem) {
                    var el = document.createElement('div');
                    el.className = 'sivo-context-menu-item';
                    el.innerText = menuItem.label;
                    el.onclick = function() {
                        contextMenuDOM.style.display = 'none';
                        window.parent.postMessage({
                            type: 'sivo_click',
                            payload: {
                                element_id: name,
                                event_name: menuItem.event || 'context_action',
                                data: menuItem.payload || {}
                            }
                        }, '*');
                    };
                    contextMenuDOM.appendChild(el);
                });

                // Position menu
                var e = params.event.event;
                var mouseX = e.offsetX || e.clientX;
                var mouseY = e.offsetY || e.clientY;

                // Adjust position so it doesn't flow off-screen
                contextMenuDOM.style.display = 'flex'; // needed to get real width/height
                var rect = contextMenuDOM.getBoundingClientRect();
                if (mouseX + rect.width > window.innerWidth) {
                    mouseX -= rect.width;
                }
                if (mouseY + rect.height > window.innerHeight) {
                    mouseY -= rect.height;
                }

                contextMenuDOM.style.left = mouseX + 'px';
                contextMenuDOM.style.top = mouseY + 'px';
            }
        });

        // Hide context menu on normal click anywhere
        myChart.getZr().on('click', function(e) {
            contextMenuDOM.style.display = 'none';
        });

        // Track zoom natively from georoam events since getOption() might not update on scroll
        myChart.on('georoam', function(params) {
            if (params.zoom) {
                // params.zoom is a delta multiplier, not absolute zoom
                currentZoom *= params.zoom;
            }

            syncOverlayTransform();

            // Sync zoom from map to geo component if lines exist to keep them aligned during drag
            if (connectionsData.length > 0) {
                var option = myChart.getOption();
                if (option.series && option.series[0] && option.geo) {
                    myChart.setOption({
                        geo: [{
                            zoom: option.series[0].zoom,
                            center: option.series[0].center
                        }]
                    });
                }
            }

            // If dragging, params.zoom is undefined, but we still need to update position
            updateOverlaysPosition();
            updateMinimapViewport();
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            myChart.resize();
            updateOverlaysPosition();
        });

        // Back Navigation Button functionality
        var backBtn = document.createElement('div');
        backBtn.innerHTML = `
            <svg style="width:16px; height:16px; margin-right:6px; vertical-align:middle;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span style="vertical-align:middle;">Back</span>
        `;
        backBtn.style.position = 'absolute';
        backBtn.style.top = '20px';
        backBtn.style.left = '20px';
        backBtn.style.padding = '10px 16px';
        backBtn.style.background = 'white';
        backBtn.style.border = '1px solid #eaeaea';
        backBtn.style.borderRadius = '20px'; // Pill shape
        backBtn.style.cursor = 'pointer';
        backBtn.style.display = 'none';
        backBtn.style.alignItems = 'center';
        backBtn.style.fontFamily = 'sans-serif';
        backBtn.style.fontSize = '14px';
        backBtn.style.fontWeight = '500';
        backBtn.style.color = '#333';
        backBtn.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
        backBtn.style.zIndex = '1000';
        backBtn.style.transition = 'background 0.2s, transform 0.1s';

        backBtn.addEventListener('mouseenter', () => backBtn.style.background = '#f9f9f9');
        backBtn.addEventListener('mouseleave', () => backBtn.style.background = 'white');
        backBtn.addEventListener('mousedown', () => backBtn.style.transform = 'scale(0.95)');
        backBtn.addEventListener('mouseup', () => backBtn.style.transform = 'scale(1)');

        document.getElementById('chart-container').appendChild(backBtn); // Append to chart container so flex layout doesn't break it

        backBtn.addEventListener('click', function() {
            if (viewHistory.length > 0) {
                var prevView = viewHistory.pop();
                renderView(prevView, true);
            }
        });

        // Watch history to toggle back button visibility
        setInterval(function() {
            if (viewHistory.length > 0) {
                backBtn.style.display = 'flex';
            } else {
                backBtn.style.display = 'none';
            }
        }, 100);

    </script>

    <!-- Custom injected assets placeholder -->
    <style id="custom-css">{{ custom_css | safe if custom_css else '' }}</style>
    <script id="custom-js">{{ custom_js | safe if custom_js else '' }}</script>

    <!-- SIVO Built-in Gallery Modal -->
    <style>
        #sivo-gallery-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        #sivo-gallery-modal.active {
            display: flex;
        }
        .sivo-gallery-close {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <div id="sivo-gallery-modal">
        <span class="sivo-gallery-close" id="sivo-gallery-close">&times;</span>
        <div id="sivo-gallery-wrapper" style="text-align:center;"></div>
    </div>
    <script>
        var sivoGalleryModal = document.getElementById('sivo-gallery-modal');
        var sivoGalleryCloseBtn = document.getElementById('sivo-gallery-close');

        function closeSivoGalleryModal() {
            if (sivoGalleryModal) sivoGalleryModal.classList.remove('active');
        }

        if (sivoGalleryCloseBtn) sivoGalleryCloseBtn.addEventListener('click', closeSivoGalleryModal);

        // Helper to update gallery image
        function sivoUpdateGallery(src, dotEl) {
            var wrapper = document.getElementById('sivo-gallery-wrapper');
            if(wrapper) {
                var img = wrapper.querySelector('img');
                if(img) img.src = src;

                // update dots
                var dots = wrapper.querySelectorAll('span');
                dots.forEach(d => d.style.background = '#555');
                dotEl.style.background = 'white';
            }
        }

        // Helper to submit forms
        function sivoSubmitForm(elementId, eventName, formEl) {
            var formData = new FormData(formEl);
            var payload = {};
            formData.forEach(function(value, key){
                payload[key] = value;
            });

            console.log('Form submitted:', payload);
            window.parent.postMessage({
                type: 'sivo_click',
                payload: {
                    element_id: elementId,
                    event_name: eventName,
                    data: payload
                }
            }, '*');

            // Show success message
            formEl.innerHTML = '<div style="color:green; text-align:center; padding:10px;">Submitted successfully!</div>';
        }
    </script>

    <!-- SIVO Built-in Video Modal -->
    <style>
        #sivo-video-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        #sivo-video-modal.active {
            display: flex;
        }
        .sivo-video-content {
            position: relative;
            width: 80%;
            max-width: 800px;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .sivo-video-close {
            position: absolute;
            top: -30px;
            right: 0;
            z-index: 10000;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .sivo-video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }
        .sivo-video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
    <div id="sivo-video-modal">
        <div style="position: relative; width: 80%; max-width: 800px;">
            <span class="sivo-video-close" id="sivo-video-close">&times;</span>
            <div class="sivo-video-content">
                <div class="sivo-video-container" id="sivo-video-wrapper"></div>
            </div>
        </div>
    </div>
    <script>
        var sivoVideoModal = document.getElementById('sivo-video-modal');
        var sivoVideoCloseBtn = document.getElementById('sivo-video-close');
        var sivoVideoWrapper = document.getElementById('sivo-video-wrapper');

        function closeSivoVideoModal() {
            if (sivoVideoModal) {
                sivoVideoModal.classList.remove('active');
                if (sivoVideoWrapper) sivoVideoWrapper.innerHTML = '';
            }
        }

        if (sivoVideoCloseBtn) sivoVideoCloseBtn.addEventListener('click', closeSivoVideoModal);
        if (sivoVideoModal) {
            sivoVideoModal.addEventListener('click', function(e) {
                if (e.target === sivoVideoModal) {
                    closeSivoVideoModal();
                }
            });
        }
    </script>
