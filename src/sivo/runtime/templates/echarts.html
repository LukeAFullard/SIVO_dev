<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVO Interactive Graphic</title>
    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
        }
        #chart-container {
            flex: 1;
            height: 100%;
        }
        #info-panel {
            width: 300px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            display: none;
            transition: all 0.3s ease;
        }
        #info-panel.active {
            display: block;
        }
        .close-btn {
            float: right;
            cursor: pointer;
            font-weight: bold;
            color: #888;
        }
        .close-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>
    <div id="info-panel">
        <span class="close-btn" onclick="closePanel()">×</span>
        <div id="info-content-host"></div>
    </div>

    <script>
        var chartDom = document.getElementById('chart-container');
        var myChart = echarts.init(chartDom);
        var option;

        // The SVG content injected from Python
        var svgStr = {{ svg_string | safe }};

        // Register the SVG map
        echarts.registerMap('sivo_map', { svg: svgStr });

        // Mappings for tooltips and HTML content
        var echartsData = {{ echarts_data | safe }};
        var actionsManifest = {{ actions_manifest | safe }};
        var overlaysData = {{ overlays | safe }};

        function getBaseOption(mapName) {
            return {
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        var dataIndex = echartsData.findIndex(item => item.name === params.name);
                        if (dataIndex !== -1 && echartsData[dataIndex].tooltip) {
                            return echartsData[dataIndex].tooltip;
                        }
                        return params.name;
                    }
                },
                series: [
                    {
                        name: 'SIVO Series',
                        type: 'map',
                        map: mapName,
                        roam: true, // Enable zoom and pan
                        itemStyle: {
                            borderColor: '#999',
                            borderWidth: 1,
                            areaColor: '#eee'
                        },
                        emphasis: {
                            itemStyle: {
                                areaColor: '#ffd700', // Highlight color
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            },
                            label: {
                                show: false
                            }
                        },
                        select: {
                            itemStyle: {
                                areaColor: '#ff8c00'
                            }
                        },
                        data: echartsData
                    }
                ]
            };
        }

        option = getBaseOption('sivo_map');
        myChart.setOption(option);

        // Setup Shadow DOM for info-content
        var infoContentHost = document.getElementById('info-content-host');
        var infoContentShadow = infoContentHost.attachShadow({mode: 'open'});
        var infoContent = document.createElement('div');
        infoContentShadow.appendChild(infoContent);

        // Handle click events
        myChart.on('click', function (params) {
            var infoPanel = document.getElementById('info-panel');
            var name = params.name;

            var elementActions = actionsManifest[name];
            var htmlContent = '';
            var hasInteraction = false;

            if (elementActions) {
                elementActions.forEach(function(action) {
                    if (action.action_type === 'tooltip') {
                        htmlContent += action.content;
                        hasInteraction = true;
                    } else if (action.action_type === 'url') {
                        window.open(action.url, action.target);
                    } else if (action.action_type === 'drilldown') {
                        console.log('DrillDown to:', action.target_svg);
                        fetch(action.target_svg)
                            .then(response => {
                                if (!response.ok) {
                                    throw new Error('Network response was not ok');
                                }
                                return response.text();
                            })
                            .then(svgText => {
                                // Register each new SVG map with a unique name (the filepath) to prevent ECharts from serving a cached map.
                                echarts.registerMap(action.target_svg, { svg: svgText });
                                // Always rebuild base chart options using a factory function to avoid mutating global reference states.
                                myChart.setOption(getBaseOption(action.target_svg), true);
                            })
                            .catch(error => {
                                console.error('Error fetching SVG:', error);
                                alert('Could not load ' + action.target_svg);
                            });
                    } else if (action.action_type === 'callback') {
                        console.log('Triggering callback:', action.event_name, action.payload);
                        // Post message to parent window (e.g. Streamlit iframe wrapper)
                        window.parent.postMessage({
                            type: 'sivo_click',
                            payload: {
                                element_id: name,
                                event_name: action.event_name,
                                data: action.payload || {}
                            }
                        }, '*');
                    }
                });
            }

            // Also trigger a default generic click event if there's no specific callback mapped
            if (!elementActions || !elementActions.find(a => a.action_type === 'callback')) {
                window.parent.postMessage({
                    type: 'sivo_click',
                    payload: {
                        element_id: name,
                        event_name: 'click',
                        data: {}
                    }
                }, '*');
            }

            // Introduce a lightweight client-side sanitizer
            function sanitizeHTML(str) {
                var temp = document.createElement('div');
                temp.innerHTML = str;
                var scripts = temp.getElementsByTagName('script');
                for (var i = scripts.length - 1; i >= 0; i--) {
                    scripts[i].parentNode.removeChild(scripts[i]);
                }
                // Iterate and remove inline event handlers (on*)
                var allElements = temp.getElementsByTagName("*");
                for (var i = 0, len = allElements.length; i < len; i++) {
                    var el = allElements[i];
                    for (var j = el.attributes.length - 1; j >= 0; j--) {
                        if (el.attributes[j].name.toLowerCase().startsWith('on')) {
                            el.removeAttribute(el.attributes[j].name);
                        }
                    }
                }
                return temp.innerHTML;
            }

            if (hasInteraction && htmlContent) {
                infoContent.innerHTML = sanitizeHTML(htmlContent);
                infoPanel.classList.add('active');
            } else if (!hasInteraction && !elementActions) {
                infoContent.innerHTML = '<h3>' + name + '</h3><p>No additional information available.</p>';
                infoPanel.classList.add('active');
            } else {
                closePanel();
            }
        });

        // Handle hover events
        myChart.on('mouseover', function (params) {
            var name = params.name;
            var elementActions = actionsManifest[name];

            if (elementActions) {
                elementActions.forEach(function(action) {
                    if (action.action_type === 'hover_callback') {
                        window.parent.postMessage({
                            type: 'sivo_hover',
                            payload: {
                                element_id: name,
                                event_name: action.event_name,
                                data: action.payload || {}
                            }
                        }, '*');
                    }
                });
            }
        });

        // Listen for messages from Streamlit
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'sivo_command') {
                var payload = event.data.payload;
                if (payload.command === 'zoom_to') {
                    var elementId = payload.element_id;
                    var zoomLevel = payload.zoom || 2;

                    // We need to find the element in the map data to get its bounding box or center
                    // ECharts geo doesn't perfectly expose region centers programmatically easily,
                    // but we can center the map on the named region

                    myChart.dispatchAction({
                        type: 'geoSelect',
                        name: elementId
                    });

                    if (payload.zoom_center) {
                        myChart.setOption({
                            series: [{
                                center: payload.zoom_center,
                                zoom: zoomLevel
                            }]
                        });
                    }
                } else if (payload.command === 'inject_assets') {
                    if (payload.css) {
                        var style = document.createElement('style');
                        style.innerHTML = payload.css;
                        document.head.appendChild(style);
                    }
                    if (payload.js) {
                        var script = document.createElement('script');
                        script.innerHTML = payload.js;
                        document.body.appendChild(script);
                    }
                } else if (payload.command === 'update_colors') {
                    var newColors = payload.colors;
                    var seriesData = myChart.getOption().series[0].data;

                    var updated = false;
                    for (var i = 0; i < seriesData.length; i++) {
                        var name = seriesData[i].name;
                        if (newColors[name]) {
                            if (!seriesData[i].itemStyle) {
                                seriesData[i].itemStyle = {};
                            }
                            seriesData[i].itemStyle.areaColor = newColors[name];
                            updated = true;
                        }
                    }

                    if (updated) {
                        myChart.setOption({
                            series: [{
                                data: seriesData
                            }]
                        });
                    }
                }
            }
        });

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }

        // Setup Overlays
        var overlaysContainer = document.createElement('div');
        overlaysContainer.id = 'sivo-overlays-container';
        overlaysContainer.style.position = 'absolute';
        overlaysContainer.style.top = '0';
        overlaysContainer.style.left = '0';
        overlaysContainer.style.width = '100%';
        overlaysContainer.style.height = '100%';
        overlaysContainer.style.pointerEvents = 'none'; // Let clicks pass through to chart
        document.getElementById('chart-container').appendChild(overlaysContainer);

        var overlayElements = {};

        function initOverlays() {
            for (const [id, overlay] of Object.entries(overlaysData)) {
                var el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.pointerEvents = 'auto'; // allow interacting with the overlay itself
                el.innerHTML = overlay.html;
                overlaysContainer.appendChild(el);
                overlayElements[id] = { dom: el, data: overlay };
            }
        }

        function updateOverlaysPosition() {
            for (const [id, overlayObj] of Object.entries(overlayElements)) {
                var coord = overlayObj.data.coord; // [x, y] in SVG map coordinates
                var offset = overlayObj.data.offset; // [x, y] pixel offset

                // Convert SVG coordinate to DOM pixel coordinate
                var pixel = myChart.convertToPixel({seriesIndex: 0}, coord);
                if (pixel) {
                    overlayObj.dom.style.left = (pixel[0] + offset[0]) + 'px';
                    overlayObj.dom.style.top = (pixel[1] + offset[1]) + 'px';
                    overlayObj.dom.style.display = 'block';
                } else {
                    overlayObj.dom.style.display = 'none';
                }
            }
        }

        initOverlays();

        // Update overlays on map roam (zoom/pan)
        myChart.on('georoam', updateOverlaysPosition);

        // Handle window resize
        window.addEventListener('resize', function() {
            myChart.resize();
            updateOverlaysPosition();
        });

        // Initial position update after chart renders
        setTimeout(updateOverlaysPosition, 100);

    </script>

    <!-- Custom injected assets placeholder -->
    <style id="custom-css">{{ custom_css | safe if custom_css else '' }}</style>
    <script id="custom-js">{{ custom_js | safe if custom_js else '' }}</script>
</body>
</html>
