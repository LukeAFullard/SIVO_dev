    <rect id="box6" x="450" y="250" width="150" height="150" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="10"/>
    <text x="525" y="330" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#64748b" pointer-events="none">Sunburst</text>

    <rect id="box7" x="150" y="420" width="150" height="150" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="10"/>
    <text x="225" y="500" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#64748b" pointer-events="none">Parallel</text>

    <rect id="box8" x="350" y="420" width="150" height="150" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="10"/>
    <text x="425" y="500" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#64748b" pointer-events="none">ThemeRiver</text>
