        // Listen for brush selection events
        myChart.on('brushSelected', function (params) {
            if (!enableBrushSelection) return;

            var selectedIds = [];
            var mainSeries = params.batch[0]; // Assuming map series is first
            if (mainSeries && mainSeries.selected && mainSeries.selected.length > 0) {
                var selectedIndices = mainSeries.selected[0].dataIndex;
                selectedIndices.forEach(function(index) {
                    var item = echartsData[index];
                    if (item && item.name) {
                        selectedIds.push(item.name);
                    }
                });
            }

            // Post message to Streamlit or parent
            window.parent.postMessage({
                type: 'sivo_bulk_selection',
                payload: {
                    selected_ids: selectedIds
                }
            }, '*');
        });

        // Setup Native Context Menu
        var contextMenuDOM = document.getElementById('sivo-context-menu');

        myChart.on('contextmenu', function (params) {
            var name = params.name;
            var dataIndex = echartsData.findIndex(item => item.name === name);
            if (dataIndex !== -1 && echartsData[dataIndex].context_menu && echartsData[dataIndex].context_menu.length > 0) {
                // Prevent default browser menu
                params.event.event.preventDefault();

                var menuData = echartsData[dataIndex].context_menu;
                contextMenuDOM.innerHTML = '';

                menuData.forEach(function(menuItem) {
                    var el = document.createElement('div');
                    el.className = 'sivo-context-menu-item';
                    el.innerText = menuItem.label;
                    el.onclick = function() {
                        contextMenuDOM.style.display = 'none';
                        window.parent.postMessage({
                            type: 'sivo_click',
                            payload: {
                                element_id: name,
                                event_name: menuItem.event || 'context_action',
                                data: menuItem.payload || {}
                            }
                        }, '*');
                    };
                    contextMenuDOM.appendChild(el);
                });

                // Position menu
                var e = params.event.event;
                var mouseX = e.offsetX || e.clientX;
                var mouseY = e.offsetY || e.clientY;

                // Adjust position so it doesn't flow off-screen
                contextMenuDOM.style.display = 'flex'; // needed to get real width/height
                var rect = contextMenuDOM.getBoundingClientRect();
                if (mouseX + rect.width > window.innerWidth) {
                    mouseX -= rect.width;
                }
                if (mouseY + rect.height > window.innerHeight) {
                    mouseY -= rect.height;
                }

                contextMenuDOM.style.left = mouseX + 'px';
                contextMenuDOM.style.top = mouseY + 'px';
            }
        });

        // Hide context menu on normal click anywhere
        myChart.getZr().on('click', function(e) {
            contextMenuDOM.style.display = 'none';
        });

        // Track zoom natively from georoam events since getOption() might not update on scroll
        myChart.on('georoam', function(params) {
            if (params.zoom) {
                // params.zoom is a delta multiplier, not absolute zoom
                currentZoom *= params.zoom;
            }

            syncOverlayTransform();

            // Sync zoom from map to geo component if lines exist to keep them aligned during drag
            if (connectionsData.length > 0) {
                var option = myChart.getOption();
                if (option.series && option.series[0] && option.geo) {
                    myChart.setOption({
                        geo: [{
                            zoom: option.series[0].zoom,
                            center: option.series[0].center
                        }]
                    });
                }
            }

            if (window.sivoDrawings && window.sivoDrawings.length > 0) {
                redrawCanvas();
            }

            // If dragging, params.zoom is undefined, but we still need to update position
            updateOverlaysPosition();
            updateMinimapViewport();
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            myChart.resize();
            if (myChartCompareRight) myChartCompareRight.resize();
            updateOverlaysPosition();

            var rect = chartDom.getBoundingClientRect();
            if (drawingCanvas) {
                drawingCanvas.width = rect.width;
                drawingCanvas.height = rect.height;
                if (window.sivoDrawings) redrawCanvas();
            }
            if (ambientCanvas && ambientCtx) {
                ambientCanvas.width = rect.width;
                ambientCanvas.height = rect.height;
            }
        });

        // Drawing Tools Logic
        var drawingCanvas = document.getElementById('sivo-drawing-canvas');
        var drawingCtx = drawingCanvas ? drawingCanvas.getContext('2d') : null;
        var isDrawingMode = false;
        var currentDrawMode = 'pen'; // 'pen', 'text', or 'eraser'
        var drawColor = '#ef4444';

        // We will store paths as arrays of logical points [x, y] in the chart's base coordinate system
        // to properly handle ECharts zoom/pan.
        window.sivoDrawings = [];
        var currentPath = null;
        var isDrawingMouse = false;
        var textInputEl = null;

        function initDrawingTools(view) {
            var toolbar = document.getElementById('sivo-drawing-toolbar');
            if (view.enable_drawing_tools) {
                toolbar.style.display = 'flex';
                // Move toolbar down if there is a top-right layer legend to prevent overlap
                if (view.layer_toggles && view.layer_toggles.length > 0) {
                    toolbar.style.top = '70px';
                } else {
                    toolbar.style.top = '20px';
                }

                var rect = chartDom.getBoundingClientRect();
                drawingCanvas.width = rect.width;
                drawingCanvas.height = rect.height;
                drawingCanvas.style.display = 'block';
            } else {
                toolbar.style.display = 'none';
                drawingCanvas.style.display = 'none';
                isDrawingMode = false;
            }
        }

        // Toolbar Events
        var toggleBtn = document.getElementById('sivo-draw-toggle');
        var toolsDiv = document.getElementById('sivo-draw-tools');
        var penBtn = document.getElementById('sivo-draw-pen');
        var textBtn = document.getElementById('sivo-draw-text');
        var eraserBtn = document.getElementById('sivo-draw-eraser');
        var colorInput = document.getElementById('sivo-drawing-color');
        var clearBtn = document.getElementById('sivo-draw-clear');

        if (toggleBtn) toggleBtn.addEventListener('click', function() {
            isDrawingMode = !isDrawingMode;
            if (isDrawingMode) {
                toggleBtn.classList.add('active');
                toolsDiv.style.display = 'flex';
                drawingCanvas.style.pointerEvents = 'auto'; // intercept clicks
                // Lock roam on echarts while drawing if desired, or let it pass through if not drawing
            } else {
                toggleBtn.classList.remove('active');
                toolsDiv.style.display = 'none';
                drawingCanvas.style.pointerEvents = 'none';
            }
        });

        if (penBtn) penBtn.addEventListener('click', function() {
            currentDrawMode = 'pen';
            penBtn.classList.add('active');
            textBtn.classList.remove('active');
            eraserBtn.classList.remove('active');
        });

        if (textBtn) textBtn.addEventListener('click', function() {
            currentDrawMode = 'text';
            textBtn.classList.add('active');
            penBtn.classList.remove('active');
            eraserBtn.classList.remove('active');
        });

        if (eraserBtn) eraserBtn.addEventListener('click', function() {
            currentDrawMode = 'eraser';
            eraserBtn.classList.add('active');
            penBtn.classList.remove('active');
            textBtn.classList.remove('active');
        });

        if (colorInput) colorInput.addEventListener('input', function(e) {
            drawColor = e.target.value;
        });

        if (clearBtn) clearBtn.addEventListener('click', function() {
            window.sivoDrawings = [];
            drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        });

        function convertToLogical(x, y) {
            // Because ECharts doesn't provide a perfect public API to convert pixel to logical coordinate
            // taking into account BOTH pan and zoom for the map series simply, we use a rough heuristic,
            // or we store the raw mouse pixels and apply the ECharts transform manually.
            // A more robust way is to just use ECharts convertFromPixel if geo is used, or store relative to canvas
            // For a simple annotation layer, we will just store raw pixels and apply the getOption().series[0].zoom manually on redraw.

            // Actually, myChart.convertFromPixel({seriesIndex: 0}, [x, y]) works perfectly for maps!
            var logical = myChart.convertFromPixel({seriesIndex: 0}, [x, y]);
            return logical || [x, y]; // fallback to raw
        }

        function convertToPixel(point) {
            var px = myChart.convertToPixel({seriesIndex: 0}, point);
            return px || point;
        }

        function finalizeText() {
            if (!textInputEl) return;
            var val = textInputEl.value.trim();
            if (val !== '') {
                window.sivoDrawings.push({
                    mode: 'text',
                    text: val,
                    color: drawColor,
                    // store the logical anchor point
                    point: convertToLogical(parseFloat(textInputEl.style.left), parseFloat(textInputEl.style.top) + 20) // approx baseline
                });
                redrawCanvas();
            }
            document.body.removeChild(textInputEl);
            textInputEl = null;
        }

        function startDrawing(e) {
            if (!isDrawingMode) return;

            var rect = drawingCanvas.getBoundingClientRect();
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;

            var x = clientX - rect.left;
            var y = clientY - rect.top;

            if (currentDrawMode === 'text') {
                if (textInputEl) {
                    finalizeText();
                    return; // Next click will spawn a new one, this click just closes the old
                }

                textInputEl = document.createElement('input');
                textInputEl.type = 'text';
                textInputEl.style.position = 'absolute';
                textInputEl.style.left = (clientX) + 'px';
                textInputEl.style.top = (clientY - 10) + 'px';
                textInputEl.style.zIndex = 10000;
                textInputEl.style.background = 'transparent';
                textInputEl.style.border = '1px dashed #ccc';
                textInputEl.style.outline = 'none';
                textInputEl.style.color = drawColor;
                textInputEl.style.fontFamily = 'system-ui, sans-serif';
                textInputEl.style.fontSize = (16 * (currentZoom || 1)) + 'px';
                textInputEl.style.padding = '2px';
                textInputEl.style.minWidth = '100px';

                document.body.appendChild(textInputEl);
                textInputEl.focus();

                textInputEl.addEventListener('keydown', function(evt) {
                    if (evt.key === 'Enter') {
                        finalizeText();
                    }
                });
                textInputEl.addEventListener('blur', function() {
                    // Slight delay to allow clicks to register
                    setTimeout(finalizeText, 100);
                });

                e.preventDefault();
                return;
            }

            isDrawingMouse = true;

            currentPath = {
                mode: currentDrawMode,
                color: currentDrawMode === 'eraser' ? null : drawColor,
                width: currentDrawMode === 'eraser' ? 20 : 3,
                points: [convertToLogical(x, y)]
            };

            window.sivoDrawings.push(currentPath);
            e.preventDefault();
        }

        function continueDrawing(e) {
            if (!isDrawingMode || !isDrawingMouse || !currentPath || currentDrawMode === 'text') return;

            var rect = drawingCanvas.getBoundingClientRect();
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;

            var x = clientX - rect.left;
            var y = clientY - rect.top;

            currentPath.points.push(convertToLogical(x, y));
            redrawCanvas(); // Optimizable: could just draw the line segment instead of full redraw
            e.preventDefault();
        }

        function endDrawing(e) {
            isDrawingMouse = false;
            currentPath = null;
        }

        function redrawCanvas() {
            if (!drawingCtx) return;
            drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);

            drawingCtx.lineCap = 'round';
            drawingCtx.lineJoin = 'round';

            window.sivoDrawings.forEach(function(item) {
                if (item.mode === 'text') {
                    drawingCtx.globalCompositeOperation = 'source-over';
                    drawingCtx.fillStyle = item.color;
                    var fontSize = 16 * (currentZoom || 1);
                    drawingCtx.font = fontSize + 'px system-ui, sans-serif';
                    var px = convertToPixel(item.point);
                    drawingCtx.fillText(item.text, px[0], px[1]);
                    return;
                }

                if (item.points.length < 2) return;

                drawingCtx.beginPath();
                if (item.mode === 'eraser') {
                    drawingCtx.globalCompositeOperation = 'destination-out';
                    drawingCtx.lineWidth = item.width;
                } else {
                    drawingCtx.globalCompositeOperation = 'source-over';
                    drawingCtx.strokeStyle = item.color;
                    // Scale width with zoom?
                    drawingCtx.lineWidth = item.width * (currentZoom || 1);
                }

                var startPx = convertToPixel(item.points[0]);
                drawingCtx.moveTo(startPx[0], startPx[1]);

                for (var i = 1; i < item.points.length; i++) {
                    var px = convertToPixel(item.points[i]);
                    drawingCtx.lineTo(px[0], px[1]);
                }

                drawingCtx.stroke();
            });
            drawingCtx.globalCompositeOperation = 'source-over';
        }

        if (drawingCanvas) {
            drawingCanvas.addEventListener('mousedown', startDrawing);
            drawingCanvas.addEventListener('mousemove', continueDrawing);
            drawingCanvas.addEventListener('mouseup', endDrawing);
            drawingCanvas.addEventListener('mouseleave', endDrawing);

            drawingCanvas.addEventListener('touchstart', startDrawing, {passive: false});
            drawingCanvas.addEventListener('touchmove', continueDrawing, {passive: false});
            drawingCanvas.addEventListener('touchend', endDrawing, {passive: false});
        }

        // Back Navigation Button functionality
        var backBtn = document.createElement('div');
        backBtn.innerHTML = `
            <svg style="width:16px; height:16px; margin-right:6px; vertical-align:middle;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span style="vertical-align:middle;">Back</span>
        `;
        backBtn.style.position = 'absolute';
        backBtn.style.top = '20px';
        backBtn.style.left = '20px';
        backBtn.style.padding = '10px 16px';
        backBtn.style.background = 'white';
        backBtn.style.border = '1px solid #eaeaea';
        backBtn.style.borderRadius = '20px'; // Pill shape
        backBtn.style.cursor = 'pointer';
        backBtn.style.display = 'none';
        backBtn.style.alignItems = 'center';
        backBtn.style.fontFamily = 'sans-serif';
        backBtn.style.fontSize = '14px';
        backBtn.style.fontWeight = '500';
        backBtn.style.color = '#333';
        backBtn.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
        backBtn.style.zIndex = '1000';
        backBtn.style.transition = 'background 0.2s, transform 0.1s';

        backBtn.addEventListener('mouseenter', () => backBtn.style.background = '#f9f9f9');
        backBtn.addEventListener('mouseleave', () => backBtn.style.background = 'white');
        backBtn.addEventListener('mousedown', () => backBtn.style.transform = 'scale(0.95)');
        backBtn.addEventListener('mouseup', () => backBtn.style.transform = 'scale(1)');

        document.getElementById('chart-container').appendChild(backBtn); // Append to chart container so flex layout doesn't break it

        backBtn.addEventListener('click', function() {
            if (viewHistory.length > 0) {
                var prevView = viewHistory.pop();
                renderView(prevView, true);
            }
        });

        // Watch history to toggle back button visibility
        setInterval(function() {
            if (viewHistory.length > 0) {
                backBtn.style.display = 'flex';
            } else {
                backBtn.style.display = 'none';
            }
        }, 100);

    </script>

    <!-- Custom injected assets placeholder -->
    <style id="custom-css"></style>
    <script id="custom-js"></script>

    <!-- SIVO Built-in Gallery Modal -->
    <style>
        #sivo-gallery-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        #sivo-gallery-modal.active {
            display: flex;
        }
        .sivo-gallery-close {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <div id="sivo-gallery-modal">
        <span class="sivo-gallery-close" id="sivo-gallery-close">&times;</span>
        <div id="sivo-gallery-wrapper" style="text-align:center;"></div>
    </div>
    <script>
        var sivoGalleryModal = document.getElementById('sivo-gallery-modal');
        var sivoGalleryCloseBtn = document.getElementById('sivo-gallery-close');

        function closeSivoGalleryModal() {
            if (sivoGalleryModal) sivoGalleryModal.classList.remove('active');
        }

        if (sivoGalleryCloseBtn) sivoGalleryCloseBtn.addEventListener('click', closeSivoGalleryModal);

        // Helper to update gallery image
        function sivoUpdateGallery(src, dotEl) {
            var wrapper = document.getElementById('sivo-gallery-wrapper');
            if(wrapper) {
                var img = wrapper.querySelector('img');
                if(img) img.src = src;

                // update dots
                var dots = wrapper.querySelectorAll('span');
                dots.forEach(d => d.style.background = '#555');
                dotEl.style.background = 'white';
            }
        }

        // Helper to submit forms
        function sivoSubmitForm(elementId, eventName, formEl) {
            var formData = new FormData(formEl);
            var payload = {};
            formData.forEach(function(value, key){
                payload[key] = value;
            });

            console.log('Form submitted:', payload);
            window.parent.postMessage({
                type: 'sivo_click',
                payload: {
                    element_id: elementId,
                    event_name: eventName,
                    data: payload
                }
            }, '*');

            // Show success message
            formEl.innerHTML = '<div style="color:green; text-align:center; padding:10px;">Submitted successfully!</div>';
        }
    </script>

    <div id="sivo-video-modal">

                <div class="sivo-video-container" id="sivo-video-wrapper"></div>
            </div>

    <script>
        var sivoVideoModal = document.getElementById('sivo-video-modal');
        var sivoVideoCloseBtn = document.getElementById('sivo-video-close');
        var sivoVideoWrapper = document.getElementById('sivo-video-wrapper');

        function closeSivoVideoModal() {
            if (sivoVideoModal) {
                sivoVideoModal.classList.remove('active');
                if (sivoVideoWrapper) sivoVideoWrapper.innerHTML = '';
            }
        }

        if (sivoVideoCloseBtn) sivoVideoCloseBtn.addEventListener('click', closeSivoVideoModal);
        if (sivoVideoModal) {
            sivoVideoModal.addEventListener('click', function(e) {
                if (e.target === sivoVideoModal) {
                    closeSivoVideoModal();
                }
            });
        }
    </script>
