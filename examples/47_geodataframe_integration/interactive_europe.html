<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIVO Interactive Graphic</title>


    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Include echarts-stat -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-stat@1.2.0/dist/ecStat.min.js"></script>
    <!-- Include echarts-wordcloud -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    <!-- Include echarts-liquidfill -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-liquidfill@3.1.0/dist/echarts-liquidfill.min.js"></script>
    <!-- Include DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <!-- Include marked.js for Markdown Action -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Include lottie-player for Lottie animations -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <!-- Include canvas-confetti for gamification effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <!-- Include jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            height: 100vh;
        }
        #sivo-app-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            overflow: hidden;
        }
        #chart-wrapper {
            position: relative;
            flex: 1;
            height: 100%;
            width: 100%;
        }
        #chart-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }

        #chart-container-compare-right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            display: none;
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        #sivo-compare-slider-ui {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            cursor: ew-resize;
            z-index: 101;
            display: none;
            transform: translateX(-50%);
        }
        #sivo-compare-slider-ui::after {
            content: "↔";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #sivo-ambient-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            display: none;
        }

        #sivo-drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        #sivo-drawing-toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
            flex-direction: row;
            gap: 8px;
            align-items: center;
        }

        .sivo-drawing-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s;
        }

        .sivo-drawing-btn:hover {
            background: #f1f5f9;
        }

        .sivo-drawing-btn.active {
            background: #e2e8f0;
            border-color: #cbd5e1;
            color: #0f172a;
        }

        #sivo-drawing-color {
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
        }

        #sivo-drawing-color::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        #sivo-drawing-color::-webkit-color-swatch {
            border: none;
        }

        .sivo-view-transition-out {
            opacity: 0 !important;
            transform: scale(0.95);
        }

        .sivo-view-transition-in {
            opacity: 1 !important;
            transform: scale(1);
        }

        #sivo-title-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            max-width: 400px;
            display: none;
            pointer-events: none;
        }

        #sivo-title {
            margin: 0 0 4px 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }

        #sivo-subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.4;
        }

        #sivo-attribution {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #64748b;
            border: 1px solid #e2e8f0;
            display: none;
            pointer-events: none;
        }

        #scrollytelling-container {
            display: none;
            width: 400px;
            height: 100vh;
            overflow-y: scroll;
            background: #fff;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
            scroll-behavior: smooth;
        }
        .scrolly-step {
            padding: 50vh 20px;
            margin: 0;
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
        }
        .scrolly-step.active {
            opacity: 1;
            transform: translateY(0);
        }
        .scrolly-step-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        #tour-container {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 1000;
            text-align: center;
            max-width: 450px;
            border: 1px solid #f1f5f9;
        }
        #tour-content {
            margin-bottom: 15px;
        }
        .tour-controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .tour-btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .tour-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .tour-btn:hover:not(:disabled) {
            background: #0056b3;
        }
        #minimap-container {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            overflow: hidden;
            pointer-events: none;
        }
        #minimap-svg {
            width: 100%;
            height: 100%;
        }
        #minimap-viewport {
            position: absolute;
            border: 2px solid #007bff;
            background: rgba(0, 123, 255, 0.2);
            box-sizing: border-box;
            transition: all 0.1s ease;
        }

        #sivo-search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            max-width: 90%;
            z-index: 1000;
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        #sivo-search-container:focus-within {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #38bdf8;
        }

        #sivo-search-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 12px 20px 12px 40px;
            font-size: 15px;
            color: #334155;
            outline: none;
            border-radius: 24px;
            box-sizing: border-box;
        }

        .sivo-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #94a3b8;
            pointer-events: none;
        }

        #sivo-search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
        }

        .sivo-search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .sivo-search-result-item:last-child {
            border-bottom: none;
        }

        .sivo-search-result-item:hover, .sivo-search-result-item.active {
            background: #f8fafc;
        }

        .sivo-search-result-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .sivo-search-result-subtitle {
            font-size: 12px;
            color: #64748b;
        }

        #sivo-context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-width: 160px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 8px 0;
        }

        .sivo-context-menu-item {
            padding: 10px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .sivo-context-menu-item:hover {
            background: #f1f5f9;
            color: #0f172a;
        }


        #sivo-watermark-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: none;
            opacity: 0.8;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #sivo-watermark-container:hover {
            opacity: 1.0;
        }

        #layer-legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            color: #334155;
            font-size: 14px;
        }

        /* Layer Switch Styles */
        .layer-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
            justify-content: space-between;
        }
        .layer-toggle input {
            display: none;
        }
        .sivo-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background-color: #cbd5e1;
            border-radius: 20px;
            transition: 0.3s;
            margin-left: 12px;
        }
        .sivo-switch::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            background-color: white;
            transition: 0.3s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .layer-toggle input:checked + .sivo-switch {
            background-color: #3b82f6;
        }
        .layer-toggle input:checked + .sivo-switch::before {
            transform: translateX(16px);
        }

        #info-panel {
            background: #ffffff;
            display: none;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            z-index: 1000;
        }
        #info-panel.active {
            display: flex;
        }

        .info-panel-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px;
            background: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .info-panel-content {
            padding: 32px 24px;
            overflow-y: auto;
            flex: 1;
        }

        /* Improved typography inside info panel content */
        .info-panel-content h1, .info-panel-content h2, .info-panel-content h3 {
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
            line-height: 1.2;
        }

        .info-panel-content h3 {
            font-size: 1.25rem;
        }

        .info-panel-content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        /* Layout modifiers for info-panel */
        #info-panel.pos-right {
            width: 360px;
            height: 100%;
            border-left: 1px solid #e2e8f0;
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-left {
            width: 360px;
            height: 100%;
            border-right: 1px solid #e2e8f0;
            box-shadow: 10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-bottom {
            width: 100%;
            height: 300px;
            border-top: 1px solid #ddd;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        #info-panel.pos-top {
            width: 100%;
            height: 300px;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Responsive Layout Overrides */
        .mobile-handle {
            display: none;
            width: 40px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 4px;
            margin: 8px auto 0;
        }
        @media (max-width: 768px) {
            .mobile-handle {
                display: block !important;
            }
            body, #sivo-app-container {
                flex-direction: column !important;
                padding-bottom: env(safe-area-inset-bottom);
            }
            #scrollytelling-container {
                width: 100% !important;
                height: 40vh !important;
                order: 2 !important; /* Put text below map on mobile */
                border-top: 1px solid #ddd;
            }
            #chart-wrapper {
                height: auto !important; /* Let flex take over to fill remaining space */
                flex: 1 !important;
                order: 1 !important;     /* Map stays at the top */
                min-height: 40vh;
            }
            .scrolly-step {
                padding: 10vh 20px !important;
            }
            #tour-container {
                width: 80% !important;
                left: 10% !important;
                transform: none !important;
                bottom: 20px !important;
                padding: 10px 15px !important;
                font-size: 14px;
            }
            #minimap-container {
                width: 80px !important;
                height: 80px !important;
                top: 10px !important;  /* Move minimap to top on mobile so it doesn't overlap zoom controls */
                left: 10px !important;
                bottom: auto !important;
            }
            #layer-legend {
                max-width: 120px !important;
                font-size: 12px !important;
                padding: 5px !important;
                top: 10px !important;
                right: 10px !important;
            }
            .zoom-controls {
                right: 10px !important;
                bottom: 20px !important;
                z-index: 1001 !important;
            }
            .zoom-btn {
                width: 25px !important;
                height: 25px !important;
                font-size: 14px !important;
            }
            #info-panel.active {
                width: 100% !important;
                height: 45vh !important; /* Give fixed part of the screen to info panel */
                flex: none !important;
                order: 3 !important;     /* Ensure it is BELOW the chart */
                border: none !important;
                border-top: 1px solid #ddd !important;
                box-shadow: 0 -2px 5px rgba(0,0,0,0.1) !important;
            }
            .sivo-resizer {
                display: none !important;
            }
            .sivo-gallery-close, .sivo-video-close {
                top: 15px !important;
                right: 20px !important;
                font-size: 30px !important;
            }
            .info-panel-header {
                padding: 8px 10px !important;
            }
            .close-btn {
                width: 30px !important;
                height: 30px !important;
            }
        }

        /* Dark Mode Support (Via OS Preference or Explicit Class) */
        @media (prefers-color-scheme: dark) {
            body:not(.sivo-theme-light) {
                background-color: #121212;
                color: #e0e0e0;
            }
            body:not(.sivo-theme-light) #info-panel {
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(10px);
                color: #f8fafc;
                border-color: #334155;
            }
            body:not(.sivo-theme-light) .info-panel-header {
                background: transparent;
                border-bottom: 1px solid #334155;
            }
            body:not(.sivo-theme-light) .close-btn {
                background: rgba(255,255,255,0.1);
                color: #cbd5e1;
            }
            body:not(.sivo-theme-light) .close-btn:hover {
                background: rgba(255,255,255,0.2);
                color: #ffffff;
            }
            body:not(.sivo-theme-light) .zoom-btn {
                background: rgba(30, 41, 59, 0.9);
                backdrop-filter: blur(4px);
                border-color: #334155;
                color: #94a3b8;
            }
            body:not(.sivo-theme-light) .zoom-btn:hover {
                background: #334155;
                color: #f8fafc;
            }
        }

        body.sivo-theme-dark {
            background-color: #0f172a !important;
            color: #f8fafc !important;
        }
        body.sivo-theme-dark #info-panel {
            background: rgba(15, 23, 42, 0.98) !important;
            backdrop-filter: blur(10px) !important;
            color: #e2e8f0 !important;
            border-color: #334155 !important;
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.5) !important;
        }
        body.sivo-theme-dark .info-panel-header {
            background: transparent !important;
            border-bottom: 1px solid #334155 !important;
        }
        body.sivo-theme-dark .info-panel-content h1,
        body.sivo-theme-dark .info-panel-content h2,
        body.sivo-theme-dark .info-panel-content h3 {
            color: #f8fafc !important;
        }
        body.sivo-theme-dark .close-btn {
            background: rgba(255,255,255,0.1) !important;
            color: #cbd5e1 !important;
        }
        body.sivo-theme-dark .close-btn:hover {
            background: rgba(255,255,255,0.2) !important;
            color: #ffffff !important;
        }
        body.sivo-theme-dark .zoom-btn {
            background: rgba(30, 41, 59, 0.9) !important;
            backdrop-filter: blur(4px) !important;
            border-color: #334155 !important;
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark .zoom-btn:hover {
            background: #334155 !important;
            color: #f8fafc !important;
        }
        body.sivo-theme-dark .sivo-empty-state {
            color: #64748b !important;
        }
        body.sivo-theme-dark #layer-legend {
            background: rgba(30, 41, 59, 0.95) !important;
            color: #f8fafc !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-title-container {
            background: rgba(30, 41, 59, 0.95) !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-title {
            color: #f1f5f9 !important;
        }
        body.sivo-theme-dark #sivo-subtitle {
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark #sivo-attribution {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: #334155 !important;
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark .sivo-switch {
            background-color: #475569 !important;
        }
        body.sivo-theme-dark #sivo-search-container {
            background: rgba(30, 41, 59, 0.95) !important;

        .sivo-resizer {

            background-color: #eee;
            z-index: 10;
        }
        .sivo-resizer:hover {
            background-color: #ccc;
        }

        /* Resizer orientations */
        .sivo-resizer.resizer-horizontal {
            width: 5px;
            cursor: col-resize;
            height: 100%;
        }
        .sivo-resizer.resizer-vertical {
            height: 5px;
            cursor: row-resize;
            width: 100%;
        }
        .sivo-resizer.active {
            display: block;
        }

        .close-btn {
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }
        .zoom-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            font-weight: 600;
            color: #475569;
            user-select: none;
            transition: all 0.2s;
            font-size: 16px;
        }
        .zoom-btn:hover {
            background: #f8fafc;
            color: #0f172a;
            border-color: #cbd5e1;
        }

        /* Accessibility (A11y) Screen Reader Only */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Standard SIVO Animations */
        @keyframes sivo-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sivo-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: sivo-spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        .sivo-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .sivo-empty-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        *:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 2px;
        }

        @keyframes sivo-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .sivo-anim-pulse {
            animation: sivo-pulse 2s infinite ease-in-out;
            transform-origin: center;
        }

        @keyframes sivo-fade {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .sivo-anim-fade {
            animation: sivo-fade 2s infinite ease-in-out;
        }
    </style>

                        var spreadX = 20;
                        var spreadY = 20;

                        var minX = cx - spreadX;
                        var maxX = cx + spreadX;
                        var minY = cy - spreadY;
                        var maxY = cy + spreadY;

                        if (dataObj.bbox) {
                            minX = dataObj.bbox[0];
                            minY = dataObj.bbox[1];
                            maxX = dataObj.bbox[2];
                            maxY = dataObj.bbox[3];
                        }

                        var path2d = null;
                        if (dataObj.d && typeof Path2D !== 'undefined') {
                            path2d = new Path2D(dataObj.d);
                        }

                        var dotsGenerated = 0;
                        var attempts = 0;
                        var maxAttempts = numDots * 10; // Prevent infinite loops

                        while (dotsGenerated < numDots && attempts < maxAttempts) {
                            attempts++;
                            var x = minX + Math.random() * (maxX - minX);
                            var y = minY + Math.random() * (maxY - minY);

                            var isValid = false;

                            if (path2d) {
                                // Strict point-in-polygon
                                isValid = _offCtx.isPointInPath(path2d, x, y);
                            } else {
                                // Fallback: simple rejection sampling for ellipse inscribed in bounding box
                                var rx = (maxX - minX) / 2;
                                var ry = (maxY - minY) / 2;
                                var dx = x - cx;
                                var dy = y - cy;
                                if (rx > 0 && ry > 0 && ((dx*dx)/(rx*rx) + (dy*dy)/(ry*ry) <= 1)) {
                                    isValid = true;
                                }
                            }

                            if (isValid) {
                                dotData.push({
                                    name: itemName,
                                    value: [x, y, val]
                                });
                                dotsGenerated++;
                            }
                        }

                        // Fallback if maxAttempts reached but we still need dots
                        // just scatter them near the center
                        if (dotsGenerated === 0 && numDots > 0) {
                            for (var j = 0; j < numDots; j++) {
                                dotData.push({
                                    name: itemName,
                                    value: [cx + (Math.random() - 0.5) * 10, cy + (Math.random() - 0.5) * 10, val]
                                });
                            }
                        }
                    }
                }

                if (dotData.length > 0) {
                    if (!option.geo) {
                        option.geo = {
                            map: mapName,
                            roam: view.lock_canvas ? false : true,
                            itemStyle: { color: 'transparent', borderColor: 'transparent' },
                            zlevel: 0
                        };
                        option.series[0].geoIndex = 0;
                    }

                    var dotSeries = {
                        name: 'Dot Density',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        zlevel: 3,
                        symbol: 'circle',
                        symbolSize: dotDensityConfig.dot_size,
                        itemStyle: {
                            color: dotDensityConfig.dot_color
                        },
                        data: dotData
                    };

                    option.series.push(dotSeries);
                }
            }

            if (enableBrushSelection) {
                option.toolbox = {
                    show: true,
                    feature: {
                        brush: {
                            type: ['polygon', 'rect', 'keep', 'clear']
                        }
                    },
                    right: 20,

                    seriesIndex: 'all',
                    brushLink: 'all',
                    outOfBrush: {
                        colorAlpha: 0.2
                    }
                };
            }

        }

        var animationInterval = null;

        function applyAnimations() {
            // Clear any existing interval to prevent memory leaks and erratic stacked animations during drill-downs
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }

            // ECharts uses Canvas or SVG.
            // If it's SVG renderer, we can apply classes.
            // But since ECharts defaults to canvas, animating individual geo regions via CSS is hard.
            // Instead, we will use a workaround: ECharts doesn't support CSS animations on canvas paths easily.
            // If an animation is set, we will use setInterval to mutate the ECharts option instead for basic effects,
            // or if it's rendered as SVG (which echarts map allows), we can query the dom.
            // For now, if we want robust canvas animation, we just toggle emphasis state.

            var option = myChart.getOption();
            var seriesData = option.series[0].data;
            var animatedItems = seriesData.filter(d => d.animation_class);

            if (animatedItems.length === 0) return;

            // Simple toggle for 'pulse' or 'fade' via ECharts itemStyle opacity
            let toggle = false;
            animationInterval = setInterval(() => {
                toggle = !toggle;
                var currentOption = myChart.getOption();
                var currentData = currentOption.series[0].data;
                var updated = false;

                currentData.forEach((item, index) => {
                    if (item.animation_class === 'fade') {
                        if (!item.itemStyle) item.itemStyle = {};
                        item.itemStyle.opacity = toggle ? 0.3 : 1.0;
                        updated = true;
                    } else if (item.animation_class === 'pulse') {
                        // For pulse on canvas, we can fake it by highlighting
                        if (toggle) {
                            myChart.dispatchAction({ type: 'highlight', name: item.name });
                        } else {
                            myChart.dispatchAction({ type: 'downplay', name: item.name });
                        }
                    }
                });

                if (updated) {
                    myChart.setOption({ series: [{ data: currentData }] });
                }
            }, 1000);
        }

        function applyNativeSvgManipulations() {
            var viewData = viewsData[currentViewId];
            var overlayContainer = document.getElementById('sivo-native-overlay-svg-container');

            overlayContainer.innerHTML = viewData.svg_string;
            overlayContainer.style.display = 'block';

            var svgEl = overlayContainer.querySelector('svg');
            if (!svgEl) return;

            svgEl.style.height = '100%';
            // Keep pointer-events none so ECharts underneath still gets hover/click events
            svgEl.style.pointerEvents = 'none';

            // Wrap all children in a new <g id="sivo-global-transform-group">

            wrapperGroup.setAttribute('id', 'sivo-global-transform-group');

            // Move all existing children into the wrapper
            while (svgEl.firstChild) {
                wrapperGroup.appendChild(svgEl.firstChild);

            svgEl.appendChild(wrapperGroup);

            // Now apply the specific features (morph, filter, transform, mask) to individual nodes
            var mappings = viewData.mappings;
            for (var name in mappings) {

                            // so we manually apply hover_color if it exists)

                                node.setAttribute('data-original-fill', node.getAttribute('fill') || '');
                                node.setAttribute('fill', mapping.theme.hover_color);
                            }

                            // Show Tooltip via ECharts dispatch
                            myChart.dispatchAction({
                                type: 'showTip',
                                seriesIndex: 0,
                                name: name

                                mapping.actions.forEach(function(action) {

                            }

                            // ECharts `trigger` API is internal, but we can simulate the params object
                            // and call the same logic. For simplicity, we can dispatch a custom DOM event or
                            // extract our click handler into a reusable function.
                            // However, we can also just manually trigger it through the zr instance
                            myChart.trigger('click', { componentType: 'series', name: name });

                        } else if (formatStr === 'float') {
                            node.textContent = currentVal.toFixed(2);
                        } else if (formatStr === 'currency') {
                            node.textContent = '$' + currentVal.toFixed(2);
                        } else {
                            // Default to integer if no format provided or arbitrary
                            node.textContent = Math.round(currentVal);
                        }

                        if (progress < odoDuration) {
                            window.requestAnimationFrame(stepOdometer);
                        } else {
                            // ensure exact end value is set
                            if (formatStr === 'int') {
                                node.textContent = Math.round(endVal);
                            } else if (formatStr === 'float') {
                                node.textContent = endVal.toFixed(2);
                            } else if (formatStr === 'currency') {
                                node.textContent = '$' + endVal.toFixed(2);
                            } else {

                            }

                    }
                    window.requestAnimationFrame(stepOdometer);
                }

        function syncOverlayTransform() {

            // ECharts often renders a structure like <svg><g><g><path>...
            // ECharts often applies the matrix directly to the `path` elements themselves or a `<g>`.
            // In the SVG renderer, ECharts applies a transform attribute to each mapped shape,
            // or we can use the ECharts internal API to get the current projection matrix to ensure perfection.
            // Even better, we can query ANY of the generated path elements and extract its transform!
            var echartsPath = document.querySelector('#chart-container svg path[transform]');
            if (echartsPath) {
                var transform = echartsPath.getAttribute('transform');
                if (transform) {
                    overlayGroup.setAttribute('transform', transform);
                }
            }
        }

        function generateA11yNodes() {
            var a11yContainer = document.getElementById('a11y-container');

            if (dataBinding && dataBinding.data) {

                for (var i = 0; i < echartsData.length; i++) {

                for (var i = 0; i < echartsData.length; i++) {

        function renderView(viewId, isBackNavigation) {
            if (viewId !== "compare_mode" && !viewsData[viewId]) {

            var isFirstLoad = (!currentViewId || currentViewId === viewId) && !isBackNavigation;
            if (!isFirstLoad) {

                chartDom.classList.add('sivo-view-transition-out');

            window.sivoPanelWidth = view.panel_width || null;
            window.sivoPanelHeight = view.panel_height || null;
            window.sivoDisableResizer = view.disable_resizer || false;
            window.sivoDisableTooltips = view.disable_tooltips || false;
            window.sivoDisableZoomControls = view.disable_zoom_controls || false;

            // Handle Live Binding (WebSocket Telemetry) if present
            if (liveSocket) {
                liveSocket.close();
                liveSocket = null;
            }
            if (liveBinding) {
                liveSocket = new WebSocket(liveBinding.url);

                liveSocket.onopen = function(e) {
                    console.log("[SIVO] Live binding WebSocket connected to", liveBinding.url);
                    if (liveBinding.auth_token) {
                        liveSocket.send(JSON.stringify({ type: 'auth', token: liveBinding.auth_token }));
                    }
                    if (liveBinding.topic) {

                        var msg = JSON.parse(event.data);

                        if (msg && msg.element_id) {
                            console.log("[SIVO] Live update received:", msg);

                            if (!actionsManifest[msg.element_id]) {

                                    tAction.content = `<h3>${msg.tooltip}</h3>`;

                                if (window.sivoCurrentPanelElement === id && hasChanges) {

        function zoomIn() {

                    ADD_ATTR: ['onsubmit', 'required', 'type', 'name', 'src', 'background', 'speed', 'style', 'loop', 'autoplay', 'min', 'max', 'value'],
                    CUSTOM_ELEMENT_HANDLING: {
                        tagNameCheck: (tagName) => tagName.match(/-/),
                        attributeNameCheck: (attr) => attr.match(/-/),
                        allowCustomizedBuiltInElements: true,
                    }
                });

            // Fail-safe: if DOMPurify failed to load, return an escaped string to prevent XSS.
            return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // Since map regions in ECharts aren't natively draggable, we add a generic mouse tracking system.
        var draggedElement = null;

        var dragStartY = 0;
        var currentElementX = 0;
        var currentElementY = 0;

        window.isDraggingElement = false;

        // Catch mousedown at the root DOM level before ECharts initiates pan (georoam)
        document.getElementById('sivo-native-overlay-svg-container').addEventListener('mousedown', function (e) {
            if (renderMode !== 'svg') return;

            // Check if the clicked target has data-draggable true
            var target = e.target;
            if (target && target.closest) {
                target = target.closest('[data-draggable="true"]');
            }
            if (target && target.getAttribute('data-draggable') === 'true') {
                e.stopPropagation(); // Stop ECharts from getting the mousedown and starting a pan

                draggedElement = target;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                window.isDraggingElement = true; // prevent click immediately after drag

                // Parse existing transform translation
                var currentTransform = target.getAttribute('transform') || '';
                var translateMatch = currentTransform.match(/translate\(([-\d.]+)[ ,]([-\d.]+)\)/);
                if (translateMatch) {
                    currentElementX = parseFloat(translateMatch[1]);
                    currentElementY = parseFloat(translateMatch[2]);
                } else {
                    currentElementX = 0;
                    currentElementY = 0;
                }
            }
        }, true);

        // Listen for mousemove on the window to support dragging
        window.addEventListener('mousemove', function (e) {
            if (draggedElement) {
                var dx = e.clientX - dragStartX;
                var dy = e.clientY - dragStartY;

                // Account for global ECharts zoom level so it drags 1:1 with mouse
                var zoomLevel = currentZoom || 1;
                dx = dx / zoomLevel;
                dy = dy / zoomLevel;

                var newX = currentElementX + dx;
                var newY = currentElementY + dy;

                var currentTransform = draggedElement.getAttribute('transform') || '';
                // Remove old translate to overwrite it
                currentTransform = currentTransform.replace(/translate\([^)]+\)/g, '').trim();

                // Construct new transform
                var newTransform = 'translate(' + newX + ' ' + newY + ') ' + currentTransform;
                draggedElement.setAttribute('transform', newTransform.trim());

                // Prevent anything else from handling this move
                e.stopPropagation();
            }
        }, true);

        window.addEventListener('mouseup', function(e) {

                setTimeout(() => window.isDraggingElement = false, 100);

        function applyFadeUnselected(selectedName, force = false) {
            if (!fadeUnselected && !force) return;
            if (force) window.sivoForcedFade = true;

            var currentOption = myChart.getOption();
            var seriesData = currentOption.series[0].data;
            var updated = false;

            for (var i = 0; i < seriesData.length; i++) {
                var itemName = seriesData[i].name;

                if (!seriesData[i].itemStyle) {
                    seriesData[i].itemStyle = {};
                }

                // Store original opacity if not already stored
                if (seriesData[i].itemStyle._originalOpacity === undefined) {
                    seriesData[i].itemStyle._originalOpacity = seriesData[i].itemStyle.opacity !== undefined ? seriesData[i].itemStyle.opacity : 1.0;
                }

                if (itemName === selectedName) {
                    seriesData[i].itemStyle.opacity = seriesData[i].itemStyle._originalOpacity;
                } else {
                    seriesData[i].itemStyle.opacity = 0.2; // Fade out unselected
                }

            if (updated) {

        // --- Resizer Logic ---

        // Ambient Effects Logic
        var ambientCanvas = document.getElementById('sivo-ambient-canvas');

        function initAmbientEffects(view) {
            if (ambientAnimFrame) {
                cancelAnimationFrame(ambientAnimFrame);
                ambientAnimFrame = null;
            }
            ambientParticles = [];

            if (!view.ambient_effect || !ambientCanvas) {
                if (ambientCanvas) ambientCanvas.style.display = 'none';
                return;
            }

            ambientCanvas.style.display = 'block';
            var rect = chartDom.getBoundingClientRect();
            ambientCanvas.width = rect.width;
            ambientCanvas.height = rect.height;

            var count = 100;
            var type = view.ambient_effect.toLowerCase(); // 'snow', 'rain', 'particles', 'fireflies', 'summer', 'winter', 'spring', 'fall'

            for (var i = 0; i < count; i++) {
                var r = Math.random() * 3 + 1;
                if (type === 'snow' || type === 'winter') {
                    r = Math.random() * 4 + 1;
                } else if (type === 'rain') {
                    r = Math.random() * 1 + 1;
                } else if (type === 'fireflies' || type === 'summer') {
                    r = Math.random() * 3 + 1;
                } else if (type === 'spring') {
                    r = Math.random() * 4 + 3; // petals
                } else if (type === 'fall') {
                    r = Math.random() * 5 + 4; // leaves
                }

                var colorPalette = [];
                if (type === 'spring') {
                    colorPalette = ['#ffb7c5', '#ffc0cb', '#ff69b4', '#ff1493'];
                } else if (type === 'fall') {
                    colorPalette = ['#d9534f', '#f0ad4e', '#c9302c', '#ec971f', '#8a6d3b'];
                }
                var selectedColor = colorPalette.length > 0 ? colorPalette[Math.floor(Math.random() * colorPalette.length)] : null;

                ambientParticles.push({
                    x: Math.random() * ambientCanvas.width,
                    y: Math.random() * ambientCanvas.height,
                    r: r,
                    d: Math.random() * count, // density / speed
                    opacity: Math.random(),
                    angle: Math.random() * 360,
                    spin: (Math.random() - 0.5) * 5,
                    color: selectedColor
                });
            }

            function drawAmbient() {
                ambientCtx.clearRect(0, 0, ambientCanvas.width, ambientCanvas.height);

                for (var i = 0; i < count; i++) {
                    var p = ambientParticles[i];
                    ambientCtx.beginPath();

                    if (type === 'snow' || type === 'winter') {
                        ambientCtx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    } else if (type === 'rain') {
                        ambientCtx.fillStyle = `rgba(150, 180, 255, ${p.opacity})`;
                        ambientCtx.fillRect(p.x, p.y, p.r, p.r * 10); // long streaks
                    } else if (type === 'fireflies' || type === 'summer') {
                        ambientCtx.fillStyle = `rgba(255, 255, 100, ${Math.sin(Date.now()/500 + p.d)*0.5 + 0.5})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                        ambientCtx.shadowBlur = 10;
                        ambientCtx.shadowColor = "yellow";
                    } else if (type === 'spring' || type === 'fall') {
                        ambientCtx.save();
                        ambientCtx.translate(p.x, p.y);
                        ambientCtx.rotate(p.angle * Math.PI / 180);
                        ambientCtx.globalAlpha = p.opacity;
                        ambientCtx.fillStyle = p.color;

                        if (type === 'spring') {
                            // Petal shape (ellipse)
                            ambientCtx.ellipse(0, 0, p.r, p.r * 0.6, 0, 0, Math.PI * 2);
                        } else {
                            // Leaf shape (rough ellipse with slight point)
                            ambientCtx.ellipse(0, 0, p.r, p.r * 0.8, 0, 0, Math.PI * 2);
                        }

                        ambientCtx.fill();
                        ambientCtx.restore();
                        continue; // skip the default fill below since we restored
                    } else { // generic particles
                        ambientCtx.fillStyle = `rgba(100, 100, 100, ${p.opacity})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    }

                    ambientCtx.fill();
                    ambientCtx.shadowBlur = 0;
                }
                updateAmbient();
                ambientAnimFrame = requestAnimationFrame(drawAmbient);
            }

            function updateAmbient() {
                for (var i = 0; i < count; i++) {
                    var p = ambientParticles[i];

                    if (type === 'snow' || type === 'winter') {
                        p.y += Math.cos(p.d) + 1 + p.r / 2;
                        p.x += Math.sin(p.d) * 2;
                    } else if (type === 'rain') {
                        p.y += 10 + p.r;
                    } else if (type === 'fireflies' || type === 'summer') {
                        p.y += Math.sin(Date.now()/1000 + p.d) * 0.5;
                        p.x += Math.cos(Date.now()/1000 + p.d) * 0.5;
                    } else if (type === 'spring' || type === 'fall') {
                        p.y += Math.cos(p.d) + 1 + p.r / 3;
                        p.x += Math.sin(p.d) * 1.5;
                        p.angle += p.spin;
                    } else {
                        p.y -= 1; // float up
                        p.x += Math.sin(p.d) * 0.5;
                    }

                    // wrap around
                    if (p.x > ambientCanvas.width + 15 || p.x < -15 || p.y > ambientCanvas.height + 15) {
                        if (type === 'particles' || type === 'fireflies' || type === 'summer') {
                             if (p.y < -15) p.y = ambientCanvas.height + 15;
                        } else {
                            if (Math.random() > 0.3) {
                                ambientParticles[i] = {x: Math.random() * ambientCanvas.width, y: -15, r: p.r, d: p.d, opacity: p.opacity, angle: p.angle, spin: p.spin, color: p.color};
                            } else {
                                // Enter from right
                                ambientParticles[i] = {x: -15, y: Math.random() * ambientCanvas.height, r: p.r, d: p.d, opacity: p.opacity, angle: p.angle, spin: p.spin, color: p.color};
                            }
                        }
                    }
                }
            }

            drawAmbient();
        }

        function initScratchoff(view) {
            var canvas = document.getElementById('sivo-scratchoff-canvas');
            if (!view.scratchoff) {
                canvas.style.display = 'none';
                return;
            }

            canvas.style.display = 'block';
            canvas.style.pointerEvents = 'auto'; // allow scratching
            canvas.style.touchAction = 'none'; // prevent native scrolling while scratching
            var ctx = canvas.getContext('2d');

            // Resize canvas to match container
            function resizeCanvas() {
                var rect = chartDom.getBoundingClientRect();

                // Save current canvas state to preserve scratch progress on resize
                var tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width || rect.width;
                tempCanvas.height = canvas.height || rect.height;
                var tempCtx = tempCanvas.getContext('2d');
                if (canvas.width && canvas.height) {
                    tempCtx.drawImage(canvas, 0, 0);
                }

                canvas.width = rect.width;
                canvas.height = rect.height;

                if (canvas.width > 0 && canvas.height > 0) {
                    fillCanvas(tempCanvas);
                }
            }

            function fillCanvas(savedStateCanvas) {
                if (view.scratchoff.image_url) {
                    var img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.onload = function() {
                        // Draw image to cover
                        var scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                        var x = (canvas.width / 2) - (img.width / 2) * scale;
                        var y = (canvas.height / 2) - (img.height / 2) * scale;
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                        if (savedStateCanvas && savedStateCanvas.width) {
                            ctx.globalCompositeOperation = 'destination-out';
                            ctx.drawImage(savedStateCanvas, 0, 0);
                        }
                    };
                    img.src = view.scratchoff.image_url;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = view.scratchoff.color || '#cccccc';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    if (savedStateCanvas && savedStateCanvas.width) {
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.drawImage(savedStateCanvas, 0, 0);
                    }
                }
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            var isDrawing = false;
            var brushSize = view.scratchoff.brush_size || 40;

            function scratch(e) {
                if (!isDrawing) return;
                var rect = canvas.getBoundingClientRect();
                var clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                var clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;

                var x = clientX - rect.left;
                var y = clientY - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, brushSize, 0, Math.PI * 2, false);
                ctx.fill();

                // Check how much is scratched off to potentially disable pointer-events completely
                // (Too expensive to do every frame, maybe every N frames)
            }

            canvas.addEventListener('mousedown', function(e) {
                isDrawing = true;
                scratch(e);
            });
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('mouseup', function() { isDrawing = false; });
            canvas.addEventListener('mouseleave', function() { isDrawing = false; });

            // Touch support
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = true;
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                e.stopPropagation();
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = false;
            }, { passive: false });
        }


        var scrollyAudioEnabled = false;

        function initScrollytelling(steps) {
            var container = document.getElementById('scrollytelling-container');
            if (!steps || steps.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            container.innerHTML = '';

            var hasAudio = steps.some(s => s.audio_url);

            if (hasAudio) {
                // Add an explicit 'Enable Audio' button for the first interaction to satisfy browser autoplay policies
                var audioStartCard = document.createElement('div');
                audioStartCard.className = 'scrolly-step';
                audioStartCard.style.padding = '20vh 20px'; // Less padding so it's visible immediately
                audioStartCard.innerHTML = `
                    <div class="scrolly-step-card" style="text-align: center;">
                        <h3 style="margin-top:0;">Enable Audio Experience</h3>
                        <p style="margin-bottom:15px; color:#666;">This narrative includes audio narration. Click the button below to allow playback as you scroll.</p>
                        <button id="sivo-enable-audio-btn" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:16px; transition:background 0.2s;">
                            Start Experience
                        </button>
                    </div>
                `;
                container.appendChild(audioStartCard);
            }

            steps.forEach(function(step, index) {
                var stepWrapper = document.createElement('div');
                stepWrapper.className = 'scrolly-step';
                stepWrapper.setAttribute('data-index', index);

                var stepCard = document.createElement('div');
                stepCard.className = 'scrolly-step-card';
                stepCard.innerHTML = step.content;
                stepWrapper.appendChild(stepCard);

                if (index === steps.length - 1) {
                    stepWrapper.style.paddingBottom = '80vh';
                }
                container.appendChild(stepWrapper);
            });

            if (hasAudio) {
                var enableBtn = document.getElementById('sivo-enable-audio-btn');
                if (enableBtn) {
                    enableBtn.addEventListener('click', function() {
                        scrollyAudioEnabled = true;

                        // Play and immediately pause a silent dummy audio to unlock the audio context for this page
                        var dummyAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
                        dummyAudio.play().then(() => {
                            dummyAudio.pause();
                        }).catch(e => console.log("Dummy audio unlock skipped", e));

                        enableBtn.innerText = 'Audio Enabled ✓';
                        enableBtn.style.background = '#10b981'; // Green
                        setTimeout(() => {
                            // Smooth scroll to the first actual step
                            var firstStep = container.querySelector('.scrolly-step[data-index="0"]');
                            if (firstStep) {
                                firstStep.scrollIntoView({ behavior: 'smooth' });
                            }
                        }, 500);
                    });
                }
            }

            var observerOptions = { root: container, rootMargin: '-50% 0px -50% 0px', threshold: 0 };
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var index = parseInt(entry.target.getAttribute('data-index'), 10);
                        if (isNaN(index)) return; // Ignore the Start Experience card

                        var step = steps[index];

                        entry.target.classList.add('active');

                        // Close info panel to ensure map is visible during narrative changes
                        closePanel();

                        // Handle Audio
                        if (scrollyAudioEnabled || !hasAudio) {
                            if (currentAudio) {
                                currentAudio.pause();

                            if (step.audio_url) {
                                currentAudio = new Audio(step.audio_url);

                        if (step.zoom_to) {

                        }

                        if (step.show_tooltips) {
                            step.show_tooltips.forEach(function(tooltipId) {
                                myChart.dispatchAction({ type: 'showTip', name: tooltipId });
                            });
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.scrolly-step').forEach(stepEl => observer.observe(stepEl));

        function renderTourStep() {

                currentAudio.pause();

            }

            // Close info panel to ensure map is visible during tour progression
            closePanel();

            }
            document.getElementById('tour-progress').innerText = (currentTourStep + 1) + ' / ' + tourSteps.length;
            document.getElementById('tour-prev').disabled = currentTourStep === 0;
            document.getElementById('tour-next').innerText = currentTourStep === tourSteps.length - 1 ? 'Finish' : 'Next';

            if (step.zoom_to) {
                myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                var viewMeta = overlaysData[step.zoom_to];
                if (viewMeta && viewMeta.coord) {
                    myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                } else {
                    myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                }
            }

            myChart.dispatchAction({ type: 'hideTip' });
            if (step.show_tooltips) {
                step.show_tooltips.forEach(tooltipId => myChart.dispatchAction({ type: 'showTip', name: tooltipId }));
            }
        }


        async function exportTourToPDF() {
            if (!window.jspdf) {
                alert("jsPDF library is not loaded.");
                return;
            }

            var btn = document.getElementById('tour-pdf');
            var originalText = btn.innerText;
            btn.innerText = "Generating PDF...";
            btn.disabled = true;

            try {
                const { jsPDF } = window.jspdf;
                // Create a new PDF document (landscape mode for slides)
                const doc = new jsPDF({
                    orientation: 'landscape',
                    unit: 'px',
                    format: [800, 600]
                });

                // Save original state to restore later
                var originalStep = currentTourStep;

                // Iterate over all tour steps
                for (let i = 0; i < tourSteps.length; i++) {
                    currentTourStep = i;

                    // Render the step but without audio
                    var step = tourSteps[i];
                    if (currentAudio) {
                        currentAudio.pause();
                        currentAudio.currentTime = 0;
                    }
                    closePanel();
                    document.getElementById('tour-content').innerHTML = sanitizeHTML(step.content);
                    document.getElementById('tour-progress').innerText = (currentTourStep + 1) + ' / ' + tourSteps.length;

                    if (step.zoom_to) {
                        myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                        var viewMeta = overlaysData[step.zoom_to];
                        if (viewMeta && viewMeta.coord) {
                            myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                        } else {
                            myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                        }
                    }
                    myChart.dispatchAction({ type: 'hideTip' });

                    // Trigger the action if any
                    if (step.action) {
                        handleSivoEvent(step.action);
                    }

                    // Wait for the chart to finish any transition animations
                    await new Promise(resolve => setTimeout(resolve, 800));

                    // Capture ECharts canvas
                    var imgData = myChart.getDataURL({ type: 'jpeg', pixelRatio: 2, backgroundColor: '#ffffff' });

                    // Add a new page if it's not the first slide
                    if (i > 0) {
                        doc.addPage();
                    }

                    // Draw the chart image taking up most of the page
                    doc.addImage(imgData, 'JPEG', 0, 0, 800, 600);

                    // Draw a semi-transparent overlay for the text box
                    doc.setFillColor(255, 255, 255);
                    doc.setDrawColor(200, 200, 200);
                    // We draw the text box similar to the tour container on the bottom right or center
                    doc.rect(40, 480, 720, 100, 'DF'); // Fill and border

                    // Add text
                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(20);
                    doc.text(step.title || 'Step ' + (i+1), 60, 510);
                    doc.setFontSize(14);
                    // We strip HTML from content to render in PDF cleanly
                    var plainText = document.createElement("div");
                    plainText.innerHTML = sanitizeHTML(step.content);
                    var textLines = doc.splitTextToSize(plainText.innerText || plainText.textContent || "", 680);
                    doc.text(textLines, 60, 535);
                }

                // Save the PDF
                doc.save("SIVO_Guided_Tour.pdf");

                // Restore original state
                currentTourStep = originalStep;
                renderTourStep();

            } catch (err) {
                console.error("PDF generation failed:", err);
                alert("Failed to generate PDF. Check console for details.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function initSearch(view) {
            var searchContainer = document.getElementById('sivo-search-container');
            var searchInput = document.getElementById('sivo-search-input');
            var searchResults = document.getElementById('sivo-search-results');

            if (!view.enable_search) {
                searchContainer.style.display = 'none';
                return;
            }

            searchContainer.style.display = 'block';

            // Build search index globally so the event listener doesn't trap old closure scope on re-render
            window.sivoSearchIndex = [];

            // Helper to strip HTML tags for search display
            function stripHtml(html) {
                var tmp = document.createElement("DIV");
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || "";
            }

            echartsData.forEach(function(item) {
                var rawTitle = item.tooltip || item.name;
                // Strip HTML from title so we don't accidentally render images/blockquotes in the tiny search dropdown
                var title = stripHtml(rawTitle);

                var subtitle = item.name !== rawTitle ? item.name : '';
                window.sivoSearchIndex.push({
                    id: item.name,
                    title: title,
                    subtitle: subtitle,
                    searchStr: (title + ' ' + subtitle).toLowerCase()
                });
            });

            window.sivoRenderSearchResults = function(query) {
                if (!query) {
                    searchResults.style.display = 'none';
                    return;
                }

                var q = query.toLowerCase();
                var results = window.sivoSearchIndex.filter(item => item.searchStr.includes(q)).slice(0, 10); // Limit to 10

                if (results.length === 0) {
                    searchResults.innerHTML = '<div class="sivo-search-result-item"><span class="sivo-search-result-subtitle">No results found</span></div>';
                    searchResults.style.display = 'block';
                    return;
                }

                searchResults.innerHTML = '';
                results.forEach(function(item) {
                    var el = document.createElement('div');
                    el.className = 'sivo-search-result-item';
                    el.innerHTML = `<div class="sivo-search-result-title">${item.title}</div><div class="sivo-search-result-subtitle">${item.subtitle}</div>`;

                    el.addEventListener('mousedown', function(e) {
                        e.preventDefault(); // Prevent input blur
                        window.sivoSelectSearchResult(item.id);
                    });

                    searchResults.appendChild(el);
                });
                searchResults.style.display = 'block';
            }

            window.sivoSelectSearchResult = function(elementId) {
                searchInput.value = '';
                searchResults.style.display = 'none';
                searchInput.blur();

                // Focus element
                myChart.dispatchAction({ type: 'geoSelect', name: elementId });

                // Force highlight by fading everything else
                applyFadeUnselected(elementId, true);

                // Check if it has a specific overlay bound center
                var viewMeta = overlaysData[elementId];
                if (viewMeta && viewMeta.coord) {
                    myChart.setOption({ series: [{ center: viewMeta.coord, zoom: 3.0 }] });
                } else {
                    // Trigger click to center map if ECharts handles it, or trigger panel logic
                    myChart.trigger('click', { componentType: 'series', name: elementId });

                    // Show tooltip
                    myChart.dispatchAction({ type: 'showTip', name: elementId });
                }
            }

            // Using oninput/onfocus/onblur directly to safely overwrite any old closure references
            // without stacking up event listeners on re-render.
            searchInput.oninput = function(e) {
                window.sivoRenderSearchResults(e.target.value);
            };

            searchInput.onfocus = function(e) {
                if (e.target.value) window.sivoRenderSearchResults(e.target.value);
            };

            searchInput.onblur = function(e) {
                setTimeout(() => searchResults.style.display = 'none', 100);
            };
        }

        function downloadDataCSV() {
            var csvContent = "data:text/csv;charset=utf-8,";

            if (dataBinding && dataBinding.data) {
                csvContent += "Region," + dataBinding.key + "\n";
                for (var name in dataBinding.data) {
                    var val = dataBinding.data[name][dataBinding.key];
                    if (val !== undefined) {
                        csvContent += `"${name}",${val}\n`;
                    }
                }
            } else if (timelineBinding && timelineBinding.data) {
                var firstTimeKey = Object.keys(timelineBinding.data)[0];
                var keys = ["Region"];
                var timelineKeys = Object.keys(timelineBinding.data);
                keys = keys.concat(timelineKeys);
                csvContent += keys.join(",") + "\n";

                // Collect all regions
                var regions = new Set();
                timelineKeys.forEach(tKey => {
                    Object.keys(timelineBinding.data[tKey]).forEach(r => regions.add(r));
                });

                regions.forEach(r => {
                    var row = [`"${r}"`];
                    timelineKeys.forEach(tKey => {
                        var val = timelineBinding.data[tKey][r] ? timelineBinding.data[tKey][r][timelineBinding.key] : "";
                        row.push(val !== undefined ? val : "");
                    });
                    csvContent += row.join(",") + "\n";
                });
            } else {
                alert("No data to download.");
                return;
            }

            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            var view = viewsData[currentViewId];
            link.setAttribute("download", (view.title ? view.title.replace(/\s+/g, '_').toLowerCase() : "sivo_data") + ".csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
