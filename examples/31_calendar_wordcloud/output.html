<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIVO Interactive Graphic</title>


    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Include echarts-wordcloud -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    <!-- Include DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <!-- Include marked.js for Markdown Action -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Include lottie-player for Lottie animations -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <!-- Include canvas-confetti for gamification effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <!-- Include jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            height: 100vh;
        }
        #sivo-app-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            overflow: hidden;
        }
        #chart-wrapper {
            position: relative;
            flex: 1;
            height: 100%;
            width: 100%;
        }
        #chart-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }

        #chart-container-compare-right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            display: none;
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        #sivo-compare-slider-ui {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            cursor: ew-resize;
            z-index: 101;
            display: none;
            transform: translateX(-50%);
        }
        #sivo-compare-slider-ui::after {
            content: "↔";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #sivo-ambient-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            display: none;
        }

        #sivo-drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        #sivo-drawing-toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
            flex-direction: row;
            gap: 8px;
            align-items: center;
        }

        .sivo-drawing-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s;
        }

        .sivo-drawing-btn:hover {
            background: #f1f5f9;
        }

        .sivo-drawing-btn.active {
            background: #e2e8f0;
            border-color: #cbd5e1;
            color: #0f172a;
        }

        #sivo-drawing-color {
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
        }

        #sivo-drawing-color::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        #sivo-drawing-color::-webkit-color-swatch {
            border: none;
        }

        .sivo-view-transition-out {
            opacity: 0 !important;
            transform: scale(0.95);
        }

        .sivo-view-transition-in {
            opacity: 1 !important;
            transform: scale(1);
        }

        #sivo-title-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            max-width: 400px;
            display: none;
            pointer-events: none;
        }

        #sivo-title {
            margin: 0 0 4px 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }

        #sivo-subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.4;
        }

        #sivo-attribution {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #64748b;
            border: 1px solid #e2e8f0;
            display: none;
            pointer-events: none;
        }

        #scrollytelling-container {
            display: none;
            width: 400px;
            height: 100vh;
            overflow-y: scroll;
            background: #fff;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
            scroll-behavior: smooth;
        }
        .scrolly-step {
            padding: 50vh 20px;
            margin: 0;
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
        }
        .scrolly-step.active {
            opacity: 1;
            transform: translateY(0);
        }
        .scrolly-step-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        #tour-container {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 1000;
            text-align: center;
            max-width: 450px;
            border: 1px solid #f1f5f9;
        }
        #tour-content {
            margin-bottom: 15px;
        }
        .tour-controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .tour-btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .tour-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .tour-btn:hover:not(:disabled) {
            background: #0056b3;
        }
        #minimap-container {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            overflow: hidden;
            pointer-events: none;
        }
        #minimap-svg {
            width: 100%;
            height: 100%;
        }
        #minimap-viewport {
            position: absolute;
            border: 2px solid #007bff;
            background: rgba(0, 123, 255, 0.2);
            box-sizing: border-box;
            transition: all 0.1s ease;
        }

        #sivo-search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            max-width: 90%;
            z-index: 1000;
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        #sivo-search-container:focus-within {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #38bdf8;
        }

        #sivo-search-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 12px 20px 12px 40px;
            font-size: 15px;
            color: #334155;
            outline: none;
            border-radius: 24px;
            box-sizing: border-box;
        }

        .sivo-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #94a3b8;
            pointer-events: none;
        }

        #sivo-search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
        }

        .sivo-search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .sivo-search-result-item:last-child {
            border-bottom: none;
        }

        .sivo-search-result-item:hover, .sivo-search-result-item.active {
            background: #f8fafc;
        }

        .sivo-search-result-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .sivo-search-result-subtitle {
            font-size: 12px;
            color: #64748b;
        }

        #sivo-context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-width: 160px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 8px 0;
        }

        .sivo-context-menu-item {
            padding: 10px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .sivo-context-menu-item:hover {
            background: #f1f5f9;
            color: #0f172a;
        }


        #sivo-watermark-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: none;
            opacity: 0.8;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #sivo-watermark-container:hover {
            opacity: 1.0;
        }

        #layer-legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            color: #334155;
            font-size: 14px;
        }

        /* Layer Switch Styles */
        .layer-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
            justify-content: space-between;
        }
        .layer-toggle input {
            display: none;
        }
        .sivo-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background-color: #cbd5e1;
            border-radius: 20px;
            transition: 0.3s;
            margin-left: 12px;
        }
        .sivo-switch::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            background-color: white;
            transition: 0.3s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .layer-toggle input:checked + .sivo-switch {
            background-color: #3b82f6;
        }
        .layer-toggle input:checked + .sivo-switch::before {
            transform: translateX(16px);
        }

        #info-panel {
            background: #ffffff;
            display: none;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            z-index: 1000;
        }
        #info-panel.active {
            display: flex;
        }

        .info-panel-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px;
            background: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .info-panel-content {
            padding: 32px 24px;
            overflow-y: auto;
            flex: 1;
        }

        /* Improved typography inside info panel content */
        .info-panel-content h1, .info-panel-content h2, .info-panel-content h3 {
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
            line-height: 1.2;
        }

        .info-panel-content h3 {
            font-size: 1.25rem;
        }

        .info-panel-content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        /* Layout modifiers for info-panel */
        #info-panel.pos-right {
            width: 360px;
            height: 100%;
            border-left: 1px solid #e2e8f0;
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-left {
            width: 360px;
            height: 100%;
            border-right: 1px solid #e2e8f0;
            box-shadow: 10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-bottom {
            width: 100%;
            height: 300px;
            border-top: 1px solid #ddd;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        #info-panel.pos-top {
            width: 100%;
            height: 300px;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Responsive Layout Overrides */
        .mobile-handle {
            display: none;
            width: 40px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 4px;
            margin: 8px auto 0;
        }
        @media (max-width: 768px) {
            .mobile-handle {
                display: block !important;
            }
            body, #sivo-app-container {
                flex-direction: column !important;
                padding-bottom: env(safe-area-inset-bottom);
            }
            #scrollytelling-container {
                width: 100% !important;
                height: 40vh !important;
                order: 2 !important; /* Put text below map on mobile */
                border-top: 1px solid #ddd;
            }
            #chart-wrapper {
                height: auto !important; /* Let flex take over to fill remaining space */
                flex: 1 !important;
                order: 1 !important;     /* Map stays at the top */
                min-height: 40vh;
            }
            .scrolly-step {
                padding: 10vh 20px !important;
            }
            #tour-container {
                width: 80% !important;
                left: 10% !important;
                transform: none !important;
                bottom: 20px !important;
                padding: 10px 15px !important;
                font-size: 14px;
            }
            #minimap-container {
                width: 80px !important;
                height: 80px !important;
                top: 10px !important;  /* Move minimap to top on mobile so it doesn't overlap zoom controls */
                left: 10px !important;
                bottom: auto !important;
            }
            #layer-legend {
                max-width: 120px !important;
                font-size: 12px !important;
                padding: 5px !important;
                top: 10px !important;
                right: 10px !important;
            }
            .zoom-controls {
                right: 10px !important;
                bottom: 20px !important;
                z-index: 1001 !important;
            }
            .zoom-btn {
                width: 25px !important;
                height: 25px !important;
                font-size: 14px !important;
            }
            #info-panel.active {
                width: 100% !important;
                height: 45vh !important; /* Give fixed part of the screen to info panel */
                flex: none !important;
                order: 3 !important;     /* Ensure it is BELOW the chart */
                border: none !important;
                border-top: 1px solid #ddd !important;
                box-shadow: 0 -2px 5px rgba(0,0,0,0.1) !important;
            }
            .sivo-resizer {
                display: none !important;
            }
            .sivo-gallery-close, .sivo-video-close {
                top: 15px !important;
                right: 20px !important;
                font-size: 30px !important;
            }
            .info-panel-header {
                padding: 8px 10px !important;
            }
            .close-btn {
                width: 30px !important;
                height: 30px !important;
            }
        }

        /* Dark Mode Support (Via OS Preference or Explicit Class) */
        @media (prefers-color-scheme: dark) {
            body:not(.sivo-theme-light) {
                background-color: #121212;
                color: #e0e0e0;
            }
            body:not(.sivo-theme-light) #info-panel {
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(10px);
                color: #f8fafc;
                border-color: #334155;
            }
            body:not(.sivo-theme-light) .info-panel-header {
                background: transparent;
                border-bottom: 1px solid #334155;
            }
            body:not(.sivo-theme-light) .close-btn {
                background: rgba(255,255,255,0.1);
                color: #cbd5e1;
            }
            body:not(.sivo-theme-light) .close-btn:hover {
                background: rgba(255,255,255,0.2);
                color: #ffffff;
            }
            body:not(.sivo-theme-light) .zoom-btn {
                background: rgba(30, 41, 59, 0.9);
                backdrop-filter: blur(4px);
                border-color: #334155;
                color: #94a3b8;
            }
            body:not(.sivo-theme-light) .zoom-btn:hover {
                background: #334155;
                color: #f8fafc;
            }
        }

        body.sivo-theme-dark {
            background-color: #0f172a !important;
            color: #f8fafc !important;
        }
        body.sivo-theme-dark #info-panel {
            background: rgba(15, 23, 42, 0.98) !important;
            backdrop-filter: blur(10px) !important;
            color: #e2e8f0 !important;
            border-color: #334155 !important;
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.5) !important;
        }
        body.sivo-theme-dark .info-panel-header {
            background: transparent !important;
            border-bottom: 1px solid #334155 !important;
        }
        body.sivo-theme-dark .info-panel-content h1,
        body.sivo-theme-dark .info-panel-content h2,
        body.sivo-theme-dark .info-panel-content h3 {
            color: #f8fafc !important;
        }
        body.sivo-theme-dark .close-btn {
            background: rgba(255,255,255,0.1) !important;
            color: #cbd5e1 !important;
        }
        body.sivo-theme-dark .close-btn:hover {
            background: rgba(255,255,255,0.2) !important;
            color: #ffffff !important;
        }
        body.sivo-theme-dark .zoom-btn {
            background: rgba(30, 41, 59, 0.9) !important;
            backdrop-filter: blur(4px) !important;
            border-color: #334155 !important;
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark .zoom-btn:hover {
            background: #334155 !important;
            color: #f8fafc !important;
        }
        body.sivo-theme-dark .sivo-empty-state {
            color: #64748b !important;
        }
        body.sivo-theme-dark #layer-legend {
            background: rgba(30, 41, 59, 0.95) !important;
            color: #f8fafc !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-title-container {
            background: rgba(30, 41, 59, 0.95) !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-title {
            color: #f1f5f9 !important;
        }
        body.sivo-theme-dark #sivo-subtitle {
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark #sivo-attribution {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: #334155 !important;
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark .sivo-switch {
            background-color: #475569 !important;
        }
        body.sivo-theme-dark #sivo-search-container {
            background: rgba(30, 41, 59, 0.95) !important;
            border-color: #334155 !important;
        }
        body.sivo-theme-dark #sivo-search-input {
            color: #f8fafc !important;
        }
        body.sivo-theme-dark #sivo-search-input::placeholder {
            color: #64748b !important;
        }
        body.sivo-theme-dark #sivo-search-results {

            background: #475569 !important;

            color: #f1f5f9 !important;
        }
        body.sivo-theme-dark .sivo-search-result-subtitle {
            color: #94a3b8 !important;
        }
        body.sivo-theme-dark #sivo-context-menu {

            color: #e2e8f0 !important;
        }
        body.sivo-theme-dark .sivo-context-menu-item:hover {
            background: #475569 !important;
            color: #f8fafc !important;
        }


        .sivo-resizer {
            display: none;
            background-color: #eee;
            z-index: 10;
        }
        .sivo-resizer:hover {
            background-color: #ccc;
        }

        /* Resizer orientations */
        .sivo-resizer.resizer-horizontal {
            width: 5px;
            cursor: col-resize;
            height: 100%;
        }
        .sivo-resizer.resizer-vertical {
            height: 5px;
            cursor: row-resize;
            width: 100%;
        }
        .sivo-resizer.active {
            display: block;
        }

        .close-btn {
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }
        .zoom-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            font-weight: 600;
            color: #475569;
            user-select: none;
            transition: all 0.2s;
            font-size: 16px;
        }
        .zoom-btn:hover {
            background: #f8fafc;
            color: #0f172a;
            border-color: #cbd5e1;
        }

        /* Accessibility (A11y) Screen Reader Only */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Standard SIVO Animations */
        @keyframes sivo-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sivo-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: sivo-spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        .sivo-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }
        .sivo-empty-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        *:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 2px;
        }

        @keyframes sivo-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .sivo-anim-pulse {
            animation: sivo-pulse 2s infinite ease-in-out;
            transform-origin: center;
        }

        @keyframes sivo-fade {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .sivo-anim-fade {
            animation: sivo-fade 2s infinite ease-in-out;
        }
    </style>
</head>

        // Introduce a lightweight client-side sanitizer
        function sanitizeHTML(str) {
            if (typeof DOMPurify !== 'undefined') {
                return DOMPurify.sanitize(str, {
                    ADD_TAGS: ['form', 'input', 'textarea', 'button', 'lottie-player'],
                    ADD_ATTR: ['onsubmit', 'required', 'type', 'name', 'src', 'background', 'speed', 'style', 'loop', 'autoplay', 'min', 'max', 'value'],
                    CUSTOM_ELEMENT_HANDLING: {
                        tagNameCheck: (tagName) => tagName.match(/-/),
                        attributeNameCheck: (attr) => attr.match(/-/),
                        allowCustomizedBuiltInElements: true,
                    }
                });
            }
            // Fail-safe: if DOMPurify failed to load, return an escaped string to prevent XSS.
            return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // Implement Draggable Logic (for map elements marked as draggable)
        // Since map regions in ECharts aren't natively draggable, we add a generic mouse tracking system.
        var draggedElement = null;
        var dragStartX = 0;
        var dragStartY = 0;
        var currentElementX = 0;
        var currentElementY = 0;

        window.isDraggingElement = false;

        // Catch mousedown at the root DOM level before ECharts initiates pan (georoam)
        document.getElementById('sivo-native-overlay-svg-container').addEventListener('mousedown', function (e) {
            if (renderMode !== 'svg') return;

            // Check if the clicked target has data-draggable true
            var target = e.target;
            if (target && target.closest) {
                target = target.closest('[data-draggable="true"]');
            }
            if (target && target.getAttribute('data-draggable') === 'true') {
                e.stopPropagation(); // Stop ECharts from getting the mousedown and starting a pan

                draggedElement = target;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                window.isDraggingElement = true; // prevent click immediately after drag

                // Parse existing transform translation
                var currentTransform = target.getAttribute('transform') || '';
                var translateMatch = currentTransform.match(/translate\(([-\d.]+)[ ,]([-\d.]+)\)/);
                if (translateMatch) {
                    currentElementX = parseFloat(translateMatch[1]);
                    currentElementY = parseFloat(translateMatch[2]);
                } else {
                    currentElementX = 0;
                    currentElementY = 0;
                }
            }
        }, true);

        // Listen for mousemove on the window to support dragging
        window.addEventListener('mousemove', function (e) {
            if (draggedElement) {
                var dx = e.clientX - dragStartX;
                var dy = e.clientY - dragStartY;

                // Account for global ECharts zoom level so it drags 1:1 with mouse
                var zoomLevel = currentZoom || 1;
                dx = dx / zoomLevel;
                dy = dy / zoomLevel;

                var newX = currentElementX + dx;
                var newY = currentElementY + dy;

                var currentTransform = draggedElement.getAttribute('transform') || '';
                // Remove old translate to overwrite it
                currentTransform = currentTransform.replace(/translate\([^)]+\)/g, '').trim();

                // Construct new transform
                var newTransform = 'translate(' + newX + ' ' + newY + ') ' + currentTransform;
                draggedElement.setAttribute('transform', newTransform.trim());

                // Prevent anything else from handling this move
                e.stopPropagation();
            }
        }, true);

        // Use global window events to ensure mouseup is always caught even if it leaves the canvas
        window.addEventListener('mouseup', function(e) {
            if (draggedElement) {
                draggedElement = null;
                // delay clearing isDraggingElement so click handlers don't fire immediately
                setTimeout(() => window.isDraggingElement = false, 100);
            }
        });


        function applyFadeUnselected(selectedName, force = false) {
            if (!fadeUnselected && !force) return;
            if (force) window.sivoForcedFade = true;

            var currentOption = myChart.getOption();
            var seriesData = currentOption.series[0].data;
            var updated = false;

            for (var i = 0; i < seriesData.length; i++) {
                var itemName = seriesData[i].name;

                if (!seriesData[i].itemStyle) {
                    seriesData[i].itemStyle = {};
                }

                // Store original opacity if not already stored
                if (seriesData[i].itemStyle._originalOpacity === undefined) {
                    seriesData[i].itemStyle._originalOpacity = seriesData[i].itemStyle.opacity !== undefined ? seriesData[i].itemStyle.opacity : 1.0;
                }

                if (itemName === selectedName) {
                    seriesData[i].itemStyle.opacity = seriesData[i].itemStyle._originalOpacity;
                } else {
                    seriesData[i].itemStyle.opacity = 0.2; // Fade out unselected
                }
                updated = true;
            }

            if (updated) {
                myChart.setOption({ series: [{ data: seriesData }] });
            }
        }

        function clearFadeUnselected() {

            function applyPanelPosition(position, initCharts) {

                                container.setAttribute('data-echarts-initialized', 'true');

                                if (chartData.map_name && chartData.map_data) {
                                    var mapDataParsed = chartData.map_data;
                                    if (typeof mapDataParsed === 'string' && mapDataParsed.trim().startsWith('<svg')) {

                                        echarts.registerMap(chartData.map_name, mapDataParsed);
                                    }
                                }

                                var hasMaskImage = false;
                                if (chartData.option && chartData.option.series && Array.isArray(chartData.option.series)) {
                                    for (let s = 0; s < chartData.option.series.length; s++) {
                                        if (chartData.option.series[s].type === 'wordCloud' && chartData.option.series[s]._sivo_mask_image_url) {
                                            hasMaskImage = true;
                                            let imgUrl = chartData.option.series[s]._sivo_mask_image_url;
                                            let seriesRef = chartData.option.series[s];
                                            let img = new Image();
                                            img.crossOrigin = "Anonymous";
                                            img.onload = function() {

                                            img.onerror = function() {

                            }

                        sivoChartsToInit = [];

                    if (payload.js) {
                        var script = document.createElement('script');

                    if (updated) {
                        myChart.setOption({
                            series: [{
                                data: seriesData

        // --- Resizer Logic ---
        (function() {
            const resizer = document.getElementById('sivo-resizer');

            let isResizing = false;
            let currentLayout = 'row'; // depends on flex-direction
            let lastDownX = 0;
            let lastDownY = 0;
            let startWidth = 0;
            let startHeight = 0;

            resizer.addEventListener('mousedown', function(e) {
                isResizing = true;
                currentLayout = document.body.style.flexDirection;
                lastDownX = e.clientX;
                lastDownY = e.clientY;
                startWidth = panel.getBoundingClientRect().width;
                startHeight = panel.getBoundingClientRect().height;

                // Add a transparent overlay to capture pointer events over iframes/charts
                let overlay = document.createElement('div');

                overlay.style.top = 0;

                } else if (currentLayout === 'row-reverse') {
                    // Left panel
                    let newWidth = startWidth + (e.clientX - lastDownX);

                } else if (currentLayout === 'column') {
                    // Bottom panel
                    let newHeight = startHeight - (e.clientY - lastDownY);
                    panel.style.height = newHeight + 'px';
                } else if (currentLayout === 'column-reverse') {
                    // Top panel
                    let newHeight = startHeight + (e.clientY - lastDownY);
                    panel.style.height = newHeight + 'px';
                }

                // Throttle resize event for performance if needed, but modern ECharts usually handles it
                myChart.resize();
            });

            window.addEventListener('mouseup', function(e) {
                if (isResizing) {
                    isResizing = false;
                    let overlay = document.getElementById('sivo-drag-overlay');

        // Ambient Effects Logic
        var ambientCanvas = document.getElementById('sivo-ambient-canvas');
        var ambientCtx = ambientCanvas ? ambientCanvas.getContext('2d') : null;
        var ambientParticles = [];
        var ambientAnimFrame = null;

        function initAmbientEffects(view) {
            if (ambientAnimFrame) {
                cancelAnimationFrame(ambientAnimFrame);
                ambientAnimFrame = null;
            }
            ambientParticles = [];

            if (!view.ambient_effect || !ambientCanvas) {
                if (ambientCanvas) ambientCanvas.style.display = 'none';
                return;
            }

            ambientCanvas.style.display = 'block';
            var rect = chartDom.getBoundingClientRect();
            ambientCanvas.width = rect.width;
            ambientCanvas.height = rect.height;

            var count = 100;
            var type = view.ambient_effect.toLowerCase(); // 'snow', 'rain', 'particles', 'fireflies'

            for (var i = 0; i < count; i++) {
                ambientParticles.push({
                    x: Math.random() * ambientCanvas.width,
                    y: Math.random() * ambientCanvas.height,
                    r: type === 'snow' ? Math.random() * 4 + 1 :
                       type === 'rain' ? Math.random() * 1 + 1 :
                       type === 'fireflies' ? Math.random() * 3 + 1 : Math.random() * 3 + 1,
                    d: Math.random() * count, // density / speed
                    opacity: Math.random()
                });
            }

            function drawAmbient() {
                ambientCtx.clearRect(0, 0, ambientCanvas.width, ambientCanvas.height);

                for (var i = 0; i < count; i++) {
                    var p = ambientParticles[i];
                    ambientCtx.beginPath();

                    if (type === 'snow') {
                        ambientCtx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    } else if (type === 'rain') {
                        ambientCtx.fillStyle = `rgba(150, 180, 255, ${p.opacity})`;
                        ambientCtx.fillRect(p.x, p.y, p.r, p.r * 10); // long streaks
                    } else if (type === 'fireflies') {
                        ambientCtx.fillStyle = `rgba(255, 255, 100, ${Math.sin(Date.now()/500 + p.d)*0.5 + 0.5})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                        ambientCtx.shadowBlur = 10;
                        ambientCtx.shadowColor = "yellow";
                    } else { // generic particles
                        ambientCtx.fillStyle = `rgba(100, 100, 100, ${p.opacity})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    }

                    ambientCtx.fill();
                    ambientCtx.shadowBlur = 0;
                }
                updateAmbient();
                ambientAnimFrame = requestAnimationFrame(drawAmbient);
            }

            function updateAmbient() {
                for (var i = 0; i < count; i++) {
                    var p = ambientParticles[i];

                    if (type === 'snow') {
                        p.y += Math.cos(p.d) + 1 + p.r / 2;
                        p.x += Math.sin(p.d) * 2;
                    } else if (type === 'rain') {
                        p.y += 10 + p.r;
                    } else if (type === 'fireflies') {
                        p.y += Math.sin(Date.now()/1000 + p.d) * 0.5;
                        p.x += Math.cos(Date.now()/1000 + p.d) * 0.5;
                    } else {
                        p.y -= 1; // float up
                        p.x += Math.sin(p.d) * 0.5;
                    }

                    // wrap around
                    if (p.x > ambientCanvas.width + 5 || p.x < -5 || p.y > ambientCanvas.height) {
                        if (type === 'particles' || type === 'fireflies') {
                             if (p.y < -5) p.y = ambientCanvas.height;
                        } else {
                            if (Math.random() > 0.3) {
                                ambientParticles[i] = {x: Math.random() * ambientCanvas.width, y: -10, r: p.r, d: p.d, opacity: p.opacity};
                            } else {
                                // Enter from right
                                ambientParticles[i] = {x: -5, y: Math.random() * ambientCanvas.height, r: p.r, d: p.d, opacity: p.opacity};
                            }
                        }
                    }
                }
            }

            drawAmbient();
        }

        function updateOverlaysPosition() {
            var zoomLevel = currentZoom;

            for (const [id, overlayObj] of Object.entries(overlayElements)) {
                if (overlayObj.data.fixed) {

                    overlayObj.dom.style.position = 'absolute';

                    continue;
                }

                var coord = overlayObj.data.coord; // [x, y] in SVG map coordinates
                var offset = overlayObj.data.offset; // [x, y] pixel offset

                // Convert SVG coordinate to DOM pixel coordinate
                var pixel = myChart.convertToPixel({seriesIndex: 0}, coord);
                if (pixel) {
                    overlayObj.dom.style.left = (pixel[0] + offset[0]) + 'px';
                    overlayObj.dom.style.top = (pixel[1] + offset[1]) + 'px';

                    if (overlayObj.data.scale_with_zoom) {
                        // Use a transform to scale the overlay, but preserve the origin at the point it's anchored to
                        overlayObj.dom.style.transformOrigin = 'top left';

        function initScratchoff(view) {
            var canvas = document.getElementById('sivo-scratchoff-canvas');
            if (!view.scratchoff) {
                canvas.style.display = 'none';
                return;
            }

            canvas.style.display = 'block';
            canvas.style.pointerEvents = 'auto'; // allow scratching
            canvas.style.touchAction = 'none'; // prevent native scrolling while scratching
            var ctx = canvas.getContext('2d');

            // Resize canvas to match container
            function resizeCanvas() {
                var rect = chartDom.getBoundingClientRect();

                // Save current canvas state to preserve scratch progress on resize
                var tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width || rect.width;
                tempCanvas.height = canvas.height || rect.height;
                var tempCtx = tempCanvas.getContext('2d');
                if (canvas.width && canvas.height) {
                    tempCtx.drawImage(canvas, 0, 0);
                }

                canvas.width = rect.width;
                canvas.height = rect.height;

                if (canvas.width > 0 && canvas.height > 0) {
                    fillCanvas(tempCanvas);
                }
            }

            function fillCanvas(savedStateCanvas) {
                if (view.scratchoff.image_url) {
                    var img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.onload = function() {
                        // Draw image to cover
                        var scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                        var x = (canvas.width / 2) - (img.width / 2) * scale;
                        var y = (canvas.height / 2) - (img.height / 2) * scale;
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                        if (savedStateCanvas && savedStateCanvas.width) {
                            ctx.globalCompositeOperation = 'destination-out';
                            ctx.drawImage(savedStateCanvas, 0, 0);
                        }
                    };
                    img.src = view.scratchoff.image_url;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = view.scratchoff.color || '#cccccc';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    if (savedStateCanvas && savedStateCanvas.width) {
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.drawImage(savedStateCanvas, 0, 0);
                    }
                }
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            var isDrawing = false;
            var brushSize = view.scratchoff.brush_size || 40;

            function scratch(e) {
                if (!isDrawing) return;
                var rect = canvas.getBoundingClientRect();
                var clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                var clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;

                var x = clientX - rect.left;
                var y = clientY - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, brushSize, 0, Math.PI * 2, false);
                ctx.fill();

                // Check how much is scratched off to potentially disable pointer-events completely
                // (Too expensive to do every frame, maybe every N frames)
            }

            canvas.addEventListener('mousedown', function(e) {
                isDrawing = true;
                scratch(e);
            });
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('mouseup', function() { isDrawing = false; });
            canvas.addEventListener('mouseleave', function() { isDrawing = false; });

            // Touch support
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = true;
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                e.stopPropagation();
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = false;
            }, { passive: false });
        }


        var scrollyAudioEnabled = false;

        function initScrollytelling(steps) {
            var container = document.getElementById('scrollytelling-container');
            if (!steps || steps.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            container.innerHTML = '';

            var hasAudio = steps.some(s => s.audio_url);

            if (hasAudio) {
                // Add an explicit 'Enable Audio' button for the first interaction to satisfy browser autoplay policies
                var audioStartCard = document.createElement('div');
                audioStartCard.className = 'scrolly-step';
                audioStartCard.style.padding = '20vh 20px'; // Less padding so it's visible immediately
                audioStartCard.innerHTML = `
                    <div class="scrolly-step-card" style="text-align: center;">
                        <h3 style="margin-top:0;">Enable Audio Experience</h3>
                        <p style="margin-bottom:15px; color:#666;">This narrative includes audio narration. Click the button below to allow playback as you scroll.</p>
                        <button id="sivo-enable-audio-btn" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:16px; transition:background 0.2s;">
                            Start Experience
                        </button>
                    </div>
                `;
                container.appendChild(audioStartCard);
            }

            steps.forEach(function(step, index) {
                var stepWrapper = document.createElement('div');
                stepWrapper.className = 'scrolly-step';
                stepWrapper.setAttribute('data-index', index);

                var stepCard = document.createElement('div');
                stepCard.className = 'scrolly-step-card';
                stepCard.innerHTML = step.content;
                stepWrapper.appendChild(stepCard);

                if (index === steps.length - 1) {
                    stepWrapper.style.paddingBottom = '80vh';
                }
                container.appendChild(stepWrapper);
            });

            if (hasAudio) {
                var enableBtn = document.getElementById('sivo-enable-audio-btn');
                if (enableBtn) {
                    enableBtn.addEventListener('click', function() {
                        scrollyAudioEnabled = true;

                        // Play and immediately pause a silent dummy audio to unlock the audio context for this page
                        var dummyAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
                        dummyAudio.play().then(() => {
                            dummyAudio.pause();
                        }).catch(e => console.log("Dummy audio unlock skipped", e));

                        enableBtn.innerText = 'Audio Enabled ✓';
                        enableBtn.style.background = '#10b981'; // Green
                        setTimeout(() => {
                            // Smooth scroll to the first actual step
                            var firstStep = container.querySelector('.scrolly-step[data-index="0"]');
                            if (firstStep) {
                                firstStep.scrollIntoView({ behavior: 'smooth' });
                            }
                        }, 500);
                    });
                }
            }

            var observerOptions = { root: container, rootMargin: '-50% 0px -50% 0px', threshold: 0 };
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var index = parseInt(entry.target.getAttribute('data-index'), 10);
                        if (isNaN(index)) return; // Ignore the Start Experience card

                        var step = steps[index];

                        document.querySelectorAll('.scrolly-step').forEach(el => el.classList.remove('active'));
                        entry.target.classList.add('active');

                        // Close info panel to ensure map is visible during narrative changes
                        closePanel();

                        // Handle Audio
                        if (scrollyAudioEnabled || !hasAudio) {
                            if (currentAudio) {
                                currentAudio.pause();
                                currentAudio.currentTime = 0;
                            }
                            if (step.audio_url) {
                                currentAudio = new Audio(step.audio_url);
                                currentAudio.play().catch(e => console.error("Audio playback failed:", e));
                            }
                        }

                        if (step.zoom_to) {
                            myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                            var viewMeta = overlaysData[step.zoom_to];
                            if (viewMeta && viewMeta.coord) {
                                myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                            } else {
                                myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                            }
                        }

                        if (step.colors) {
                            var currentOption = myChart.getOption();
                            var seriesData = currentOption.series[0].data;
                            var updated = false;
                            for (var i = 0; i < seriesData.length; i++) {
                                var name = seriesData[i].name;
                                if (step.colors[name]) {
                                    if (!seriesData[i].itemStyle) seriesData[i].itemStyle = {};
                                    seriesData[i].itemStyle.areaColor = step.colors[name];
                                    updated = true;
                                }
                            }
                            if (updated) myChart.setOption({ series: [{ data: seriesData }] });
                        }

                        myChart.dispatchAction({ type: 'hideTip' });
                        if (step.show_tooltips) {
                            step.show_tooltips.forEach(function(tooltipId) {
                                myChart.dispatchAction({ type: 'showTip', name: tooltipId });
                            });
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.scrolly-step').forEach(stepEl => observer.observe(stepEl));
            if (steps.length > 0) container.scrollTop = 0;
        }

        var tourSteps = [];

        function renderTourStep() {
            if (currentTourStep < 0 || currentTourStep >= tourSteps.length) return;

            // Stop existing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            // Close info panel to ensure map is visible during tour progression
            closePanel();

            var step = tourSteps[currentTourStep];
            document.getElementById('tour-content').innerHTML = sanitizeHTML(step.content);

            // Play audio if present
            if (step.audio_url) {
                currentAudio = new Audio(step.audio_url);
                currentAudio.play().catch(e => console.error("Audio playback failed:", e));
            }
            document.getElementById('tour-progress').innerText = (currentTourStep + 1) + ' / ' + tourSteps.length;
            document.getElementById('tour-prev').disabled = currentTourStep === 0;
            document.getElementById('tour-next').innerText = currentTourStep === tourSteps.length - 1 ? 'Finish' : 'Next';

            if (step.zoom_to) {
                myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                var viewMeta = overlaysData[step.zoom_to];
                if (viewMeta && viewMeta.coord) {
                    myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                } else {
                    myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                }
            }

            myChart.dispatchAction({ type: 'hideTip' });
            if (step.show_tooltips) {
                step.show_tooltips.forEach(tooltipId => myChart.dispatchAction({ type: 'showTip', name: tooltipId }));
            }
        }


        async function exportTourToPDF() {
            if (!window.jspdf) {
                alert("jsPDF library is not loaded.");
                return;
            }

            var btn = document.getElementById('tour-pdf');
            var originalText = btn.innerText;
            btn.innerText = "Generating PDF...";
            btn.disabled = true;

            try {
                const { jsPDF } = window.jspdf;
                // Create a new PDF document (landscape mode for slides)
                const doc = new jsPDF({
                    orientation: 'landscape',
                    unit: 'px',
                    format: [800, 600]
                });

                // Save original state to restore later
                var originalStep = currentTourStep;

                // Iterate over all tour steps
                for (let i = 0; i < tourSteps.length; i++) {
                    currentTourStep = i;

                    // Render the step but without audio
                    var step = tourSteps[i];
                    if (currentAudio) {
                        currentAudio.pause();
                        currentAudio.currentTime = 0;
                    }
                    closePanel();
                    document.getElementById('tour-content').innerHTML = sanitizeHTML(step.content);
                    document.getElementById('tour-progress').innerText = (currentTourStep + 1) + ' / ' + tourSteps.length;

                    if (step.zoom_to) {
                        myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                        var viewMeta = overlaysData[step.zoom_to];
                        if (viewMeta && viewMeta.coord) {
                            myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                        } else {
                            myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                        }
                    }
                    myChart.dispatchAction({ type: 'hideTip' });

                    // Trigger the action if any
                    if (step.action) {
                        handleSivoEvent(step.action);
                    }

                    // Wait for the chart to finish any transition animations
                    await new Promise(resolve => setTimeout(resolve, 800));

                    // Capture ECharts canvas
                    var imgData = myChart.getDataURL({ type: 'jpeg', pixelRatio: 2, backgroundColor: '#ffffff' });

                    // Add a new page if it's not the first slide
                    if (i > 0) {
                        doc.addPage();
                    }

                    // Draw the chart image taking up most of the page
                    doc.addImage(imgData, 'JPEG', 0, 0, 800, 600);

                    // Draw a semi-transparent overlay for the text box
                    doc.setFillColor(255, 255, 255);
                    doc.setDrawColor(200, 200, 200);
                    // We draw the text box similar to the tour container on the bottom right or center
                    doc.rect(40, 480, 720, 100, 'DF'); // Fill and border

                    // Add text
                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(20);
                    doc.text(step.title || 'Step ' + (i+1), 60, 510);
                    doc.setFontSize(14);
                    // We strip HTML from content to render in PDF cleanly
                    var plainText = document.createElement("div");
                    plainText.innerHTML = sanitizeHTML(step.content);
                    var textLines = doc.splitTextToSize(plainText.innerText || plainText.textContent || "", 680);
                    doc.text(textLines, 60, 535);
                }

                // Save the PDF
                doc.save("SIVO_Guided_Tour.pdf");

                // Restore original state
                currentTourStep = originalStep;
                renderTourStep();

            } catch (err) {
                console.error("PDF generation failed:", err);
                alert("Failed to generate PDF. Check console for details.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
function tourNext() {

        function updateMinimapViewport() {
            if (!isMinimapEnabled) return;
            var option = myChart.getOption();
            if (!option || !option.series || option.series.length === 0) return;
            var zoom = option.series[0].zoom || 1;
            var viewport = document.getElementById('minimap-viewport');
            var vpWidth = 150 / zoom;
            var vpHeight = 150 / zoom;
            var left = (150 - vpWidth) / 2;
            var top = (150 - vpHeight) / 2;
            viewport.style.width = vpWidth + 'px';
            viewport.style.height = vpHeight + 'px';
            viewport.style.left = left + 'px';
            viewport.style.top = top + 'px';
        }

        function exportSnapshot() {
            if (renderMode === 'svg') {
                var container = document.getElementById('sivo-native-overlay-svg-container');
                if (!container) return;
                var svgClone = container.querySelector('svg').cloneNode(true);
                var source = new XMLSerializer().serializeToString(svgClone);
                if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
                    source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
                }
                if(!source.match(/^<svg[^>]+"http\:\/\/www\.w3\.org\/1999\/xlink"/)){
                    source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
                }
                source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
                var url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
                var downloadLink = document.createElement("a");
                downloadLink.href = url;
                downloadLink.download = "sivo-snapshot.svg";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            } else {
                var imgData = myChart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#fff' });
                var downloadLink = document.createElement("a");
                downloadLink.href = imgData;
                downloadLink.download = "sivo-snapshot.png";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            }
        }

        function initLayerLegend(toggles) {
            var legendContainer = document.getElementById('layer-legend');
            var legendContent = document.getElementById('layer-legend-content');
            if (!toggles || toggles.length === 0) {
                legendContainer.style.display = 'none';
                return;
            }
            legendContainer.style.display = 'block';
            legendContent.innerHTML = '';
            toggles.forEach(function(toggle) {
                var label = document.createElement('label');
                label.className = 'layer-toggle';
                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = toggle.default_visible;
                checkbox.dataset.elementIds = JSON.stringify(toggle.element_ids);
                checkbox.addEventListener('change', function(e) {
                    var isVisible = e.target.checked;
                    var ids = JSON.parse(e.target.dataset.elementIds);
                    if (renderMode === 'svg') {
                        var overlayGroup = document.getElementById('sivo-global-transform-group');
                        if (overlayGroup) {
                            ids.forEach(function(id) {
                                var node = overlayGroup.querySelector(`[id="${id}"], [name="${id}"]`);
                                if (node) node.style.display = isVisible ? '' : 'none';
                            });
                        }
                    }
                    var currentOption = myChart.getOption();
                    if (currentOption && currentOption.series && currentOption.series[0].data) {
                        var seriesData = currentOption.series[0].data;
                        var updated = false;
                        for (var i = 0; i < seriesData.length; i++) {
                            if (ids.includes(seriesData[i].name)) {
                                if (!seriesData[i].itemStyle) seriesData[i].itemStyle = {};
                                seriesData[i].itemStyle.opacity = isVisible ? 1 : 0;
                                updated = true;
                            }
                        }
                        if (updated) myChart.setOption({ series: [{ data: seriesData }] });
                    }
                });
                var span = document.createElement('span');
                span.innerText = toggle.label;
                label.appendChild(checkbox);
                label.appendChild(span);
                legendContent.appendChild(label);
                if (!toggle.default_visible) {
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
        }

        function initSearch(view) {
            var searchContainer = document.getElementById('sivo-search-container');
            var searchInput = document.getElementById('sivo-search-input');
            var searchResults = document.getElementById('sivo-search-results');

            if (!view.enable_search) {
                searchContainer.style.display = 'none';
                return;
            }

            searchContainer.style.display = 'block';

            // Build search index globally so the event listener doesn't trap old closure scope on re-render
            window.sivoSearchIndex = [];

            // Helper to strip HTML tags for search display
            function stripHtml(html) {
                var tmp = document.createElement("DIV");
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || "";
            }

            echartsData.forEach(function(item) {
                var rawTitle = item.tooltip || item.name;
                // Strip HTML from title so we don't accidentally render images/blockquotes in the tiny search dropdown
                var title = stripHtml(rawTitle);

                var subtitle = item.name !== rawTitle ? item.name : '';
                window.sivoSearchIndex.push({
                    id: item.name,
                    title: title,
                    subtitle: subtitle,
                    searchStr: (title + ' ' + subtitle).toLowerCase()
                });
            });

            window.sivoRenderSearchResults = function(query) {
                if (!query) {
                    searchResults.style.display = 'none';
                    return;
                }

                var q = query.toLowerCase();
                var results = window.sivoSearchIndex.filter(item => item.searchStr.includes(q)).slice(0, 10); // Limit to 10

                if (results.length === 0) {
                    searchResults.innerHTML = '<div class="sivo-search-result-item"><span class="sivo-search-result-subtitle">No results found</span></div>';
                    searchResults.style.display = 'block';
                    return;
                }

                searchResults.innerHTML = '';
                results.forEach(function(item) {
                    var el = document.createElement('div');
                    el.className = 'sivo-search-result-item';
                    el.innerHTML = `<div class="sivo-search-result-title">${item.title}</div><div class="sivo-search-result-subtitle">${item.subtitle}</div>`;

                    el.addEventListener('mousedown', function(e) {
                        e.preventDefault(); // Prevent input blur
                        window.sivoSelectSearchResult(item.id);
                    });

                    searchResults.appendChild(el);
                });
                searchResults.style.display = 'block';
            }

            window.sivoSelectSearchResult = function(elementId) {
                searchInput.value = '';
                searchResults.style.display = 'none';
                searchInput.blur();

                // Focus element
                myChart.dispatchAction({ type: 'geoSelect', name: elementId });

                // Force highlight by fading everything else
                applyFadeUnselected(elementId, true);

                // Check if it has a specific overlay bound center
                var viewMeta = overlaysData[elementId];
                if (viewMeta && viewMeta.coord) {
                    myChart.setOption({ series: [{ center: viewMeta.coord, zoom: 3.0 }] });
                } else {
                    // Trigger click to center map if ECharts handles it, or trigger panel logic
                    myChart.trigger('click', { componentType: 'series', name: elementId });

                    // Show tooltip
                    myChart.dispatchAction({ type: 'showTip', name: elementId });
                }
            }

            // Using oninput/onfocus/onblur directly to safely overwrite any old closure references
            // without stacking up event listeners on re-render.
            searchInput.oninput = function(e) {
                window.sivoRenderSearchResults(e.target.value);
            };

            searchInput.onfocus = function(e) {
                if (e.target.value) window.sivoRenderSearchResults(e.target.value);
            };

            searchInput.onblur = function(e) {
                setTimeout(() => searchResults.style.display = 'none', 100);
            };
        }

        function downloadDataCSV() {
            var csvContent = "data:text/csv;charset=utf-8,";

            if (dataBinding && dataBinding.data) {
                csvContent += "Region," + dataBinding.key + "\n";
                for (var name in dataBinding.data) {
                    var val = dataBinding.data[name][dataBinding.key];
                    if (val !== undefined) {
                        csvContent += `"${name}",${val}\n`;
                    }
                }
            } else if (timelineBinding && timelineBinding.data) {
                var firstTimeKey = Object.keys(timelineBinding.data)[0];
                var keys = ["Region"];
                var timelineKeys = Object.keys(timelineBinding.data);
                keys = keys.concat(timelineKeys);
                csvContent += keys.join(",") + "\n";

                // Collect all regions
                var regions = new Set();
                timelineKeys.forEach(tKey => {
                    Object.keys(timelineBinding.data[tKey]).forEach(r => regions.add(r));
                });

                regions.forEach(r => {
                    var row = [`"${r}"`];
                    timelineKeys.forEach(tKey => {
                        var val = timelineBinding.data[tKey][r] ? timelineBinding.data[tKey][r][timelineBinding.key] : "";
                        row.push(val !== undefined ? val : "");
                    });
                    csvContent += row.join(",") + "\n";
                });
            } else {
                alert("No data to download.");
                return;
            }

            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            var view = viewsData[currentViewId];
            link.setAttribute("download", (view.title ? view.title.replace(/\s+/g, '_').toLowerCase() : "sivo_data") + ".csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

            var name = params.name;
            var dataIndex = echartsData.findIndex(item => item.name === name);
            if (dataIndex !== -1 && echartsData[dataIndex].context_menu && echartsData[dataIndex].context_menu.length > 0) {
