<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVO Interactive Graphic</title>
    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
        }
        #chart-container {
            flex: 1;
            height: 100%;
        }
        #info-panel {
            width: 300px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            display: none;
            transition: all 0.3s ease;
        }
        #info-panel.active {
            display: block;
        }
        .close-btn {
            float: right;
            cursor: pointer;
            font-weight: bold;
            color: #888;
        }
        .close-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>
    <div id="info-panel">
        <span class="close-btn" onclick="closePanel()">×</span>
        <div id="info-content"></div>
    </div>

    <script>
        var chartDom = document.getElementById('chart-container');
        var myChart = echarts.init(chartDom);
        var option;

        // The SVG content injected from Python
        var svgStr = "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"400\" height=\"400\">\n  <g id=\"scene\" name=\"scene\">\n    <rect id=\"background\" width=\"400\" height=\"400\" fill=\"#f0f0f0\" name=\"background\"/>\n    <circle id=\"sun\" cx=\"300\" cy=\"100\" r=\"50\" fill=\"gold\" name=\"sun\"/>\n    <polygon id=\"mountain1\" points=\"0,400 150,200 300,400\" fill=\"#a0a0a0\" name=\"mountain1\"/>\n    <polygon id=\"mountain2\" points=\"150,400 250,250 400,400\" fill=\"#808080\" name=\"mountain2\"/>\n    <rect id=\"house\" x=\"50\" y=\"300\" width=\"100\" height=\"100\" fill=\"brown\" name=\"house\"/>\n    <polygon id=\"roof\" points=\"50,300 100,250 150,300\" fill=\"red\" name=\"roof\"/>\n    <path id=\"river\" d=\"M 200 400 Q 250 350 300 400\" fill=\"blue\" stroke=\"blue\" stroke-width=\"5\" name=\"river\"/>\n  </g>\n</svg>";

        // Register the SVG map
        echarts.registerMap('sivo_map', { svg: svgStr });

        // Mappings for tooltips and HTML content
        var echartsData = [{"name": "scene", "value": 1}, {"name": "background", "value": 1}, {"name": "sun", "value": 1, "tooltip": "The Sun", "itemStyle": {"areaColor": "#ffcc00"}}, {"name": "mountain1", "value": 1, "tooltip": "Left Mountain", "itemStyle": {"areaColor": "#8c8c8c"}}, {"name": "mountain2", "value": 1}, {"name": "house", "value": 1, "tooltip": "A small house", "itemStyle": {"areaColor": "#a52a2a"}}, {"name": "roof", "value": 1}, {"name": "river", "value": 1, "tooltip": "Blue River", "itemStyle": {"areaColor": "#0000ff"}}];
        var htmlMappings = {"sun": "<h3>The Sun</h3><p>The star at the center of the Solar System.</p>", "mountain1": "<h3>Left Mountain</h3><p>A tall, majestic mountain.</p>", "house": "<h3>Cozy House</h3><p>This is where someone lives.</p>", "river": "<h3>River</h3><p>A flowing body of water.</p>"};

        option = {
            tooltip: {
                trigger: 'item',
                formatter: function (params) {
                    // Check if a custom tooltip is defined in echartsData
                    var dataIndex = echartsData.findIndex(item => item.name === params.name);
                    if (dataIndex !== -1 && echartsData[dataIndex].tooltip) {
                        return echartsData[dataIndex].tooltip;
                    }
                    return params.name;
                }
            },
            series: [
                {
                    name: 'SIVO Series',
                    type: 'map',
                    map: 'sivo_map',
                    roam: true, // Enable zoom and pan
                    itemStyle: {
                        borderColor: '#999',
                        borderWidth: 1,
                        areaColor: '#eee'
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#ffd700', // Highlight color
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        },
                        label: {
                            show: false
                        }
                    },
                    select: {
                        itemStyle: {
                            areaColor: '#ff8c00'
                        }
                    },
                    data: echartsData
                }
            ]
        };

        myChart.setOption(option);

        // Handle click events
        myChart.on('click', function (params) {
            var infoPanel = document.getElementById('info-panel');
            var infoContent = document.getElementById('info-content');

            var name = params.name;
            if (htmlMappings[name]) {
                infoContent.innerHTML = htmlMappings[name];
                infoPanel.classList.add('active');
            } else {
                infoContent.innerHTML = '<h3>' + name + '</h3><p>No additional information available.</p>';
                infoPanel.classList.add('active');
            }
        });

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }

        // Handle window resize
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
