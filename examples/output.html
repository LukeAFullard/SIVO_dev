<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVO Interactive Graphic</title>
    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
        }
        #chart-container {
            flex: 1;
            height: 100%;
        }
        #info-panel {
            width: 300px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            display: none;
            transition: all 0.3s ease;
        }
        #info-panel.active {
            display: block;
        }
        .close-btn {
            float: right;
            cursor: pointer;
            font-weight: bold;
            color: #888;
        }
        .close-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>
    <div id="info-panel">
        <span class="close-btn" onclick="closePanel()">×</span>
        <div id="info-content-host"></div>
    </div>

    <script>
        var chartDom = document.getElementById('chart-container');
        var myChart = echarts.init(chartDom);
        var option;

        // The SVG content injected from Python
        var svgStr = "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 500 500\">\n  <rect id=\"buildingA\" x=\"50\" y=\"50\" width=\"150\" height=\"150\" fill=\"#cccccc\" stroke=\"#333333\" stroke-width=\"2\" name=\"buildingA\"/>\n  <rect id=\"buildingB\" x=\"250\" y=\"50\" width=\"200\" height=\"100\" fill=\"#cccccc\" stroke=\"#333333\" stroke-width=\"2\" name=\"buildingB\"/>\n  <circle id=\"fountain\" cx=\"250\" cy=\"300\" r=\"40\" fill=\"#aaccff\" stroke=\"#333333\" stroke-width=\"2\" name=\"fountain\"/>\n  <path id=\"pathway\" d=\"M 125 200 L 125 300 L 210 300\" fill=\"none\" stroke=\"#666666\" stroke-width=\"10\" name=\"pathway\"/>\n</svg>";

        // Register the SVG map
        echarts.registerMap('sivo_map', { svg: svgStr });

        // Mappings for tooltips and HTML content
        var echartsData = [{"name": "buildingA", "value": 1, "tooltip": "Main Admin", "itemStyle": {"areaColor": "#ffcccc"}}, {"name": "buildingB", "value": 1, "tooltip": "Engineering Block", "itemStyle": {"areaColor": "#ccffcc"}}, {"name": "fountain", "value": 1, "tooltip": "Relaxation Zone", "itemStyle": {"areaColor": "#ccccff", "borderColor": "#0000ff", "borderWidth": 3}, "emphasis": {"itemStyle": {"areaColor": "#aaaaff", "shadowBlur": 15, "shadowColor": "#aaaaff", "shadowOffsetX": 0, "shadowOffsetY": 0}}}, {"name": "pathway", "value": 1}];
        var actionsManifest = {"buildingA": [{"action_type": "tooltip", "content": "<h3>Building A</h3><p>Main Administrative Building.</p><p>Capacity: 500</p>", "title": "Main Admin"}], "buildingB": [{"action_type": "tooltip", "content": "<h3>Building B</h3><p>Engineering & Sciences.</p><ul><li>Labs</li><li>Classrooms</li></ul>", "title": "Engineering Block"}], "fountain": [{"action_type": "tooltip", "content": "\n        <style>\n          h3 { color: darkblue; }\n          .fountain-desc { border: 1px solid blue; padding: 5px; }\n        </style>\n        <h3>Central Fountain</h3>\n        <p class=\"fountain-desc\">A nice place to relax. Note this CSS does not bleed out due to Shadow DOM!</p>\n        ", "title": "Relaxation Zone"}]};

        option = {
            tooltip: {
                trigger: 'item',
                formatter: function (params) {
                    var dataIndex = echartsData.findIndex(item => item.name === params.name);
                    if (dataIndex !== -1 && echartsData[dataIndex].tooltip) {
                        return echartsData[dataIndex].tooltip;
                    }
                    return params.name;
                }
            },
            series: [
                {
                    name: 'SIVO Series',
                    type: 'map',
                    map: 'sivo_map',
                    roam: true, // Enable zoom and pan
                    itemStyle: {
                        borderColor: '#999',
                        borderWidth: 1,
                        areaColor: '#eee'
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#ffd700', // Highlight color
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        },
                        label: {
                            show: false
                        }
                    },
                    select: {
                        itemStyle: {
                            areaColor: '#ff8c00'
                        }
                    },
                    data: echartsData
                }
            ]
        };

        myChart.setOption(option);

        // Setup Shadow DOM for info-content
        var infoContentHost = document.getElementById('info-content-host');
        var infoContentShadow = infoContentHost.attachShadow({mode: 'open'});
        var infoContent = document.createElement('div');
        infoContentShadow.appendChild(infoContent);

        // Handle click events
        myChart.on('click', function (params) {
            var infoPanel = document.getElementById('info-panel');
            var name = params.name;

            var elementActions = actionsManifest[name];
            var htmlContent = '';
            var hasInteraction = false;

            if (elementActions) {
                elementActions.forEach(function(action) {
                    if (action.action_type === 'tooltip') {
                        htmlContent += action.content;
                        hasInteraction = true;
                    } else if (action.action_type === 'url') {
                        window.open(action.url, action.target);
                    } else if (action.action_type === 'drilldown') {
                        console.log('DrillDown to:', action.target_svg);
                        // Optional: trigger drilldown logic here
                        alert('Drilling down to ' + action.target_svg);
                    } else if (action.action_type === 'callback') {
                        console.log('Triggering callback:', action.event_name, action.payload);
                    }
                });
            }

            if (hasInteraction && htmlContent) {
                infoContent.innerHTML = htmlContent;
                infoPanel.classList.add('active');
            } else if (!hasInteraction && !elementActions) {
                infoContent.innerHTML = '<h3>' + name + '</h3><p>No additional information available.</p>';
                infoPanel.classList.add('active');
            } else {
                closePanel();
            }
        });

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }

        // Handle window resize
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
