<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVO Interactive Graphic</title>
    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
        }
        #chart-container {
            flex: 1;
            height: 100%;
        }
        #info-panel {
            width: 300px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            display: none;
            transition: all 0.3s ease;
        }
        #info-panel.active {
            display: block;
        }
        .close-btn {
            float: right;
            cursor: pointer;
            font-weight: bold;
            color: #888;
        }
        .close-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>
    <div id="info-panel">
        <span class="close-btn" onclick="closePanel()">×</span>
        <div id="info-content"></div>
    </div>

    <script>
        var chartDom = document.getElementById('chart-container');
        var myChart = echarts.init(chartDom);
        var option;

        // The SVG content injected from Python
        var svgStr = "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 500 500\">\n  <rect id=\"buildingA\" x=\"50\" y=\"50\" width=\"150\" height=\"150\" fill=\"#cccccc\" stroke=\"#333333\" stroke-width=\"2\" name=\"buildingA\"/>\n  <rect id=\"buildingB\" x=\"250\" y=\"50\" width=\"200\" height=\"100\" fill=\"#cccccc\" stroke=\"#333333\" stroke-width=\"2\" name=\"buildingB\"/>\n  <circle id=\"fountain\" cx=\"250\" cy=\"300\" r=\"40\" fill=\"#aaccff\" stroke=\"#333333\" stroke-width=\"2\" name=\"fountain\"/>\n  <path id=\"pathway\" d=\"M 125 200 L 125 300 L 210 300\" fill=\"none\" stroke=\"#666666\" stroke-width=\"10\" name=\"pathway\"/>\n</svg>";

        // Register the SVG map
        echarts.registerMap('sivo_map', { svg: svgStr });

        // Mappings for tooltips and HTML content
        var echartsData = [{"name": "buildingA", "value": 1, "tooltip": "Main Admin", "itemStyle": {"areaColor": "#ffcccc"}}, {"name": "buildingB", "value": 1, "tooltip": "Engineering Block", "itemStyle": {"areaColor": "#ccffcc"}}, {"name": "fountain", "value": 1, "tooltip": "Relaxation Zone", "itemStyle": {"areaColor": "#ccccff"}}, {"name": "pathway", "value": 1}];
        var htmlMappings = {"buildingA": "<h3>Building A</h3><p>Main Administrative Building.</p><p>Capacity: 500</p>", "buildingB": "<h3>Building B</h3><p>Engineering & Sciences.</p><ul><li>Labs</li><li>Classrooms</li></ul>", "fountain": "<h3>Central Fountain</h3><p>A nice place to relax.</p>"};

        option = {
            tooltip: {
                trigger: 'item',
                formatter: function (params) {
                    // Check if a custom tooltip is defined in echartsData
                    var dataIndex = echartsData.findIndex(item => item.name === params.name);
                    if (dataIndex !== -1 && echartsData[dataIndex].tooltip) {
                        return echartsData[dataIndex].tooltip;
                    }
                    return params.name;
                }
            },
            series: [
                {
                    name: 'SIVO Series',
                    type: 'map',
                    map: 'sivo_map',
                    roam: true, // Enable zoom and pan
                    itemStyle: {
                        borderColor: '#999',
                        borderWidth: 1,
                        areaColor: '#eee'
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#ffd700', // Highlight color
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        },
                        label: {
                            show: false
                        }
                    },
                    select: {
                        itemStyle: {
                            areaColor: '#ff8c00'
                        }
                    },
                    data: echartsData
                }
            ]
        };

        myChart.setOption(option);

        // Handle click events
        myChart.on('click', function (params) {
            var infoPanel = document.getElementById('info-panel');
            var infoContent = document.getElementById('info-content');

            var name = params.name;
            if (htmlMappings[name]) {
                infoContent.innerHTML = htmlMappings[name];
                infoPanel.classList.add('active');
            } else {
                infoContent.innerHTML = '<h3>' + name + '</h3><p>No additional information available.</p>';
                infoPanel.classList.add('active');
            }
        });

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }

        // Handle window resize
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
