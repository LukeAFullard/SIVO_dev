<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Simplified abstract map of locations -->
    <rect id="background" x="0" y="0" width="500" height="500" fill="#f8fafc" />

    <circle id="hq" cx="150" cy="150" r="30" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
    <text x="150" y="200" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#334155" pointer-events="none">Headquarters</text>

    <circle id="branch1" cx="350" cy="100" r="20" fill="#10b981" stroke="#059669" stroke-width="2" />
    <text x="350" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#334155" pointer-events="none">London Branch</text>

    <circle id="branch2" cx="250" cy="350" r="20" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
    <text x="250" y="390" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#334155" pointer-events="none">Tokyo Branch</text>
</svg>