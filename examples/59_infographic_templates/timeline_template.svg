<svg width="1000" height="1200" viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f0f4f8; }
      .line { stroke: #cbd5e1; stroke-width: 4; stroke-dasharray: 8 8; }
      .node { fill: #ffffff; stroke: #3b82f6; stroke-width: 4; rx: 20; ry: 20; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; rx: 8; ry: 8; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
    </style>
  </defs>

  <rect class="bg" width="1000" height="1200" />

  <rect id="header_area" class="card" x="50" y="40" width="900" height="120" />

  <!-- Central Timeline Line -->
  <line class="line" x1="500" y1="200" x2="500" y2="1100" />

  <!-- Node 1 -->
  <circle id="node_1_dot" class="node" cx="500" cy="280" r="20" />
  <rect id="node_1_card" class="card" x="100" y="220" width="350" height="120" />
  <line x1="450" y1="280" x2="480" y2="280" stroke="#cbd5e1" stroke-width="2" />

  <!-- Node 2 -->
  <circle id="node_2_dot" class="node" cx="500" cy="480" r="20" />
  <rect id="node_2_card" class="card" x="550" y="420" width="350" height="120" />
  <line x1="520" y1="480" x2="550" y2="480" stroke="#cbd5e1" stroke-width="2" />

  <!-- Node 3 -->
  <circle id="node_3_dot" class="node" cx="500" cy="680" r="20" />
  <rect id="node_3_card" class="card" x="100" y="620" width="350" height="120" />
  <line x1="450" y1="680" x2="480" y2="680" stroke="#cbd5e1" stroke-width="2" />

  <!-- Node 4 -->
  <circle id="node_4_dot" class="node" cx="500" cy="880" r="20" />
  <rect id="node_4_card" class="card" x="550" y="820" width="350" height="120" />
  <line x1="520" y1="880" x2="550" y2="880" stroke="#cbd5e1" stroke-width="2" />

</svg>
